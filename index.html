{ id:310, cat:"R6過去問", diff:"★★☆", q:"労働安全衛生法における足場の手すりの高さとして正しいものはどれか。", choices:["A: 75cm以上","B: 80cm以上","C: 85cm以上","D: 90cm以上"], ans:2, exp:"足場の手すりの高さは85cm以上（C=正）。75cmは頻出の引っかけ。さらに中桟（35〜50cm）の設置も必要。2015年改正で強化。" },
{ id:311, cat:"R6過去問", diff:"★★★", q:"騒音規制法における特定建設作業の届出先として正しいものはどれか。", choices:["A: 国土交通大臣","B: 都道府県知事","C: 市町村長","D: 労働基準監督署長"], ans:2, exp:"特定建設作業の届出は作業開始7日前までに市町村長に届け出る（C=正）。都道府県知事ではないことに注意。振動規制法も同様に市町村長。" },
{ id:312, cat:"R6過去問", diff:"★★☆", q:"コンクリートの打込みにおいて、練混ぜから打込み終了までの時間制限として正しいものはどれか（外気温25℃以上の場合）。", choices:["A: 1時間以内","B: 1.5時間以内","C: 2時間以内","D: 2.5時間以内"], ans:1, exp:"外気温25℃以上の場合は1.5時間以内、25℃未満の場合は2時間以内（B=正）。時間超過するとワーカビリティーの低下やコールドジョイントの原因となる。" },
{ id:313, cat:"R6過去問", diff:"★★★", q:"盛土の品質管理における締固め度Dcの管理基準値として正しいものはどれか。", choices:["A: 85%以上","B: 90%以上","C: 94%以上","D: 97%以上"], ans:1, exp:"土工における締固め度Dcの管理基準は90%以上（B=正）。94%はアスファルト舗装の締固め管理基準。混同しないよう注意。" },
{ id:314, cat:"R6過去問", diff:"★★☆", q:"砂防えん堤の水通しを設ける位置として正しいものはどれか。", choices:["A: 本えん堤の袖部","B: 本えん堤の中央部","C: 副えん堤の中央部","D: 前庭部"], ans:1, exp:"水通し（洪水吐き）は本えん堤の中央部に設ける（B=正）。袖部は水通しより高くして越流を防ぐ。副えん堤は下流の洗掘防止。" },
{ id:315, cat:"R6過去問", diff:"★★★", q:"建設リサイクル法の対象となる解体工事の規模要件として正しいものはどれか。", choices:["A: 延べ面積50㎡以上","B: 延べ面積80㎡以上","C: 延べ面積100㎡以上","D: 延べ面積500㎡以上"], ans:1, exp:"建設リサイクル法の対象：解体は延べ面積80㎡以上（B=正）。新築・増改築は500㎡以上、土木工事は請負代金1億円以上。" },
{ id:316, cat:"R6過去問", diff:"★★☆", q:"労働基準法における時間外労働の割増賃金率として正しいものはどれか。", choices:["A: 15%以上","B: 20%以上","C: 25%以上","D: 30%以上"], ans:2, exp:"時間外労働の割増賃金率は25%以上（C=正）。休日労働は35%以上、深夜労働は25%以上。月60時間超の時間外は50%以上。" },
{ id:317, cat:"R6過去問", diff:"★★★", q:"ネットワーク工程表のクリティカルパスに関する記述として正しいものはどれか。", choices:["A: フリーフロートがゼロの作業を連ねた経路","B: 全作業のうち最も日数が少ない経路","C: トータルフロートがゼロの作業を連ねた最長経路","D: 全結合点の最遅時刻が最も大きい経路"], ans:2, exp:"クリティカルパスはトータルフロート（TF）がゼロの作業を連ねた最長経路（C=正）。この経路が工期を決定し、1日遅れると全体工期が延びる。" },
{ id:318, cat:"R6過去問", diff:"★★☆", q:"移動式クレーンの運転に免許が必要となるつり上げ荷重として正しいものはどれか。", choices:["A: 1t以上","B: 3t以上","C: 5t以上","D: 10t以上"], ans:1, exp:"つり上げ荷重3t以上の移動式クレーンは運転士免許が必要（B=正）。1t以上3t未満は技能講習、1t未満は特別教育。" },
{ id:319, cat:"R6過去問", diff:"★★★", q:"工程能力指数Cpが1.00〜1.33の場合の工程の評価として正しいものはどれか。", choices:["A: 工程能力は十分で余裕がある","B: 工程能力は良好だが余裕は少ない","C: 工程能力不足で規格外れのおそれがある","D: 工程能力は極めて不足している"], ans:1, exp:"Cp=1.00〜1.33は工程能力良好だが余裕は少ない（B=正）。Cp≧1.33で十分、Cp<1.00で不足。Cp=(規格上限-規格下限)/6σ。" },
{ id:320, cat:"R6過去問", diff:"★★☆", q:"掘削作業において地山の掘削作業主任者を選任しなければならない掘削面の高さはどれか。", choices:["A: 1m以上","B: 1.5m以上","C: 2m以上","D: 3m以上"], ans:2, exp:"掘削面の高さが2m以上の地山の掘削作業では、地山の掘削作業主任者を選任する義務がある（C=正）。深さ1.5m以上では昇降設備の設置が必要。" },
{ id:321, cat:"R5過去問", diff:"★★★", q:"コンクリートの凍害対策として最も有効なものはどれか。", choices:["A: 単位水量を増やす","B: AEコンクリートを使用する","C: W/Cを大きくする","D: 養生期間を短縮する"], ans:1, exp:"凍害対策はAEコンクリート（空気量4.5%程度）の使用が最も有効（B=正）。微細な気泡が凍結膨張圧を緩和する。W/Cは小さくし養生は十分に行う。" },
{ id:322, cat:"R5過去問", diff:"★★☆", q:"高さ2m以上の箇所で作業を行う場合の墜落防止措置として、最も優先すべきものはどれか。", choices:["A: 安全帯（墜落制止用器具）の使用","B: 防網（安全ネット）の設置","C: 作業床の設置","D: 監視員の配置"], ans:2, exp:"高さ2m以上の箇所では作業床の設置が最優先（C=正）。作業床の設置が困難な場合に安全帯やネット等の代替措置を講じる。" },
{ id:323, cat:"R5過去問", diff:"★★★", q:"軟弱地盤対策工法のうち、圧密促進工法に分類されるものはどれか。", choices:["A: 置換工法","B: サンドドレーン工法","C: 深層混合処理工法","D: サンドコンパクションパイル工法"], ans:1, exp:"サンドドレーン工法は砂の柱を設けて排水距離を短縮し圧密を促進する工法（B=正）。置換は軟弱土の除去、深層混合は固化、SCPは締固め工法。" },
{ id:324, cat:"R5過去問", diff:"★★☆", q:"鉄筋のガス圧接継手の検査において、ふくらみの直径の合格基準はどれか。", choices:["A: 鉄筋径の1.1倍以上","B: 鉄筋径の1.2倍以上","C: 鉄筋径の1.4倍以上","D: 鉄筋径の1.6倍以上"], ans:2, exp:"ガス圧接のふくらみの直径は鉄筋径の1.4倍以上が合格基準（C=正）。ふくらみの長さは1.1倍以上。圧接面のずれは鉄筋径の1/5以下。" },
{ id:325, cat:"R5過去問", diff:"★★★", q:"護岸の法覆工の施工方向として正しいものはどれか。", choices:["A: 下流側から上流側へ施工する","B: 上流側から下流側へ施工する","C: 中央部から両端部へ施工する","D: 施工方向に規定はない"], ans:1, exp:"護岸の法覆工は上流側から下流側に向かって施工する（B=正）。逆方向だと施工中に目地部から洗掘される危険がある。また法尻から上方へ施工するのが基本。" },
{ id:326, cat:"R5過去問", diff:"★★☆", q:"建設業法において主任技術者を配置しなければならない工事はどれか。", choices:["A: 請負金額500万円以上の工事のみ","B: 公共工事のみ","C: すべての建設工事","D: 特定建設業者が施工する工事のみ"], ans:2, exp:"建設業法により、すべての建設工事に主任技術者を配置する義務がある（C=正）。金額や公共・民間の別に関係なく全工事が対象。" },
{ id:327, cat:"R5過去問", diff:"★★★", q:"コンクリート標準示方書における鉄筋の水中構造物の最小かぶり厚さはどれか。", choices:["A: 40mm","B: 50mm","C: 60mm","D: 70mm"], ans:3, exp:"水中に設置するコンクリート構造物の最小かぶり厚さは70mm（D=正）。土中は60mm、屋外40mm、屋内30mm。水中が最も大きい。" },
{ id:328, cat:"R5過去問", diff:"★★☆", q:"コンクリート舗装の横収縮目地の間隔として標準的なものはどれか。", choices:["A: 3〜5m","B: 8〜10m","C: 15〜20m","D: 25〜30m"], ans:1, exp:"コンクリート舗装の横収縮目地は8〜10m間隔が標準（B=正）。膨張目地は120m以下の間隔。ダウエルバーで荷重伝達を確保する。" },
{ id:329, cat:"R5過去問", diff:"★★★", q:"特定元方事業者が行う作業場所の巡視の頻度として正しいものはどれか。", choices:["A: 週1回以上","B: 月2回以上","C: 毎作業日に少なくとも1回","D: 月1回以上"], ans:2, exp:"特定元方事業者は毎作業日に少なくとも1回、作業場所を巡視する義務がある（C=正）。協議組織の設置・運営、安全衛生教育の指導援助も義務。" },
{ id:330, cat:"R5過去問", diff:"★★☆", q:"道路のアスファルト舗装において、表層・基層の締固め度の管理基準値はどれか。", choices:["A: 基準密度の90%以上","B: 基準密度の92%以上","C: 基準密度の94%以上","D: 基準密度の96%以上"], ans:2, exp:"アスファルト舗装の表層・基層の締固め度は基準密度の94%以上（C=正）。土工の90%以上と混同しない。マーシャル密度との比較で管理。" },
{ id:331, cat:"R5過去問", diff:"★★★", q:"シールドトンネルにおけるセグメントの組立て後に行う裏込め注入の主な目的はどれか。", choices:["A: セグメントの防水","B: テールボイドの充填と地盤変位の抑制","C: セグメントの強度増加","D: シールド機の推進力増加"], ans:1, exp:"裏込め注入はシールド掘進後にセグメント外周に生じるテールボイド（隙間）を充填し、地盤変位（地表面沈下等）を抑制することが主目的（B=正）。" },
{ id:332, cat:"R5過去問", diff:"★★☆", q:"振動規制法における特定建設作業の規制基準値はどれか。", choices:["A: 65dB以下","B: 70dB以下","C: 75dB以下","D: 85dB以下"], ans:2, exp:"振動規制法の規制基準は75dB以下（C=正）。騒音規制法は85dB以下。「騒音85・振動75」とセットで覚える。" },
{ id:333, cat:"R5過去問", diff:"★★★", q:"暑中コンクリートの適用条件として正しいものはどれか。", choices:["A: 日平均気温が20℃を超える場合","B: 日平均気温が25℃を超える場合","C: 日平均気温が30℃を超える場合","D: 日最高気温が25℃を超える場合"], ans:1, exp:"暑中コンクリートは日平均気温が25℃を超えることが予想される場合に適用（B=正）。練上がり温度は35℃以下が標準。寒中は日平均4℃以下。" },
{ id:334, cat:"R5過去問", diff:"★★☆", q:"産業廃棄物管理票（マニフェスト）のE票の返送確認期限はどれか。", choices:["A: 60日以内","B: 90日以内","C: 180日以内","D: 365日以内"], ans:2, exp:"E票（最終処分終了確認）は180日以内（C=正）。B2票（運搬終了）とD票（処分終了）は90日以内。保存期間は5年間。" },
{ id:335, cat:"R5過去問", diff:"★★★", q:"既製杭の中掘り工法に関する記述として正しいものはどれか。", choices:["A: 杭の外側を掘削しながら沈設する工法","B: 杭の中空部をオーガーで掘削しながら沈設する工法","C: 杭を直接ハンマーで打撃して沈設する工法","D: 杭の周囲にウォータージェットを噴射して沈設する工法"], ans:1, exp:"中掘り工法は杭の中空部にオーガーを挿入して土を掘削排出しながら杭を沈設する工法（B=正）。低騒音・低振動で市街地に適する。" },
{ id:336, cat:"R5過去問", diff:"★★☆", q:"施工計画において指定仮設と任意仮設に関する記述として正しいものはどれか。", choices:["A: 指定仮設は受注者が自由に変更できる","B: 任意仮設は発注者の承諾なく変更できる","C: 指定仮設も任意仮設も発注者の承諾が必要","D: 仮設には指定と任意の区分はない"], ans:1, exp:"任意仮設は受注者の責任と判断で計画・変更が可能（B=正）。指定仮設は発注者が設計を指定しているため変更には発注者の承諾が必要。" },
{ id:337, cat:"R5過去問", diff:"★★★", q:"X̄-R管理図において連続9点が中心線の片側に並んだ場合の判定として正しいものはどれか。", choices:["A: 工程は安定している","B: 工程に異常の兆候がある","C: 管理限界線を変更すべきである","D: データを削除すべきである"], ans:1, exp:"連続9点が中心線の片側に並ぶ現象（連）は工程に偏り・異常の兆候があることを示す（B=正）。原因を調査し対策を講じる必要がある。" },
{ id:338, cat:"R5過去問", diff:"★★☆", q:"フィルダムのゾーン型における遮水機能を持つ部分の名称はどれか。", choices:["A: シェル","B: フィルター","C: コア","D: リップラップ"], ans:2, exp:"ゾーン型フィルダムの遮水機能を担う中心部をコア（C=正）。粘性土等の低透水性材料で構成。シェルは保護材、フィルターは遷移層、リップラップは法面保護。" },
{ id:339, cat:"R5過去問", diff:"★★★", q:"公共工事における一括下請負に関する記述として正しいものはどれか。", choices:["A: 発注者の承諾があれば可能","B: 元請の判断で自由に行える","C: 全面的に禁止されている","D: 請負金額の50%以下なら可能"], ans:2, exp:"公共工事における一括下請負は発注者の承諾の有無にかかわらず全面禁止（C=正）。民間工事では発注者の書面による事前承諾があれば可能。" },
{ id:340, cat:"R5過去問", diff:"★★☆", q:"建設業許可の有効期間として正しいものはどれか。", choices:["A: 3年","B: 5年","C: 7年","D: 10年"], ans:1, exp:"建設業許可の有効期間は5年（B=正）。更新は有効期間満了の30日前までに申請する必要がある。更新しないと許可は失効する。" },
{ id:341, cat:"R4過去問", diff:"★★★", q:"コンクリートのアルカリシリカ反応（ASR）の抑制対策として最も有効なものはどれか。", choices:["A: 普通ポルトランドセメントを使用する","B: 高炉セメントB種（スラグ量40%以上）を使用する","C: 早強ポルトランドセメントを使用する","D: W/Cを大きくする"], ans:1, exp:"ASR対策として高炉セメントB種（高炉スラグ量40%以上）の使用が最も有効（B=正）。低アルカリ型セメントも有効。普通・早強はASR抑制効果が低い。" },
{ id:342, cat:"R4過去問", diff:"★★☆", q:"土の標準貫入試験で使用するハンマーの質量と落下高さの組合せとして正しいものはどれか。", choices:["A: 質量63.5kg、落下高さ76cm","B: 質量76kg、落下高さ63.5cm","C: 質量63.5kg、落下高さ30cm","D: 質量30kg、落下高さ76cm"], ans:0, exp:"標準貫入試験は質量63.5kgのハンマーを76cmの高さから自由落下させる（A=正）。サンプラーを30cm貫入させるのに要する打撃回数がN値。" },
{ id:343, cat:"R4過去問", diff:"★★★", q:"有効応力の原理（テルツァーギの原理）として正しい式はどれか。", choices:["A: 全応力＝有効応力＋間隙水圧","B: 全応力＝有効応力−間隙水圧","C: 有効応力＝全応力＋間隙水圧","D: 間隙水圧＝有効応力＋全応力"], ans:0, exp:"テルツァーギの有効応力の原理：σ=σ'+u（全応力＝有効応力＋間隙水圧）（A=正）。土のせん断強度・圧縮は有効応力に支配される。" },
{ id:344, cat:"R4過去問", diff:"★★☆", q:"寒中コンクリートの適用条件として正しいものはどれか。", choices:["A: 日平均気温が0℃以下","B: 日平均気温が4℃以下","C: 日平均気温が10℃以下","D: 日最低気温が0℃以下"], ans:1, exp:"寒中コンクリートは日平均気温が4℃以下になることが予想される場合に適用（B=正）。暑中は25℃超。養生温度は5℃以上保持し初期凍害を防ぐ。" },
{ id:345, cat:"R4過去問", diff:"★★★", q:"土留め支保工の部材のうち、切りばりの役割として正しいものはどれか。", choices:["A: 矢板を背面から支える水平部材","B: 掘削底面の地盤を安定させる部材","C: 矢板の変形を防ぐ鉛直部材","D: 地下水を排水する部材"], ans:0, exp:"切りばりは向かい合う矢板間に設置する水平部材で、土圧による矢板の変形を防止する（A=正）。腹起し→矢板に沿わせる水平部材、火打ち→隅角部の斜め部材。" },
{ id:346, cat:"R4過去問", diff:"★★☆", q:"重力式コンクリートダムの安定条件に含まれないものはどれか。", choices:["A: 転倒に対する安全","B: 滑動に対する安全","C: 堤体応力が許容値以内","D: 透水係数が基準値以下"], ans:3, exp:"重力式ダムの安定条件は①転倒に対する安全②滑動に対する安全③堤体・基礎の応力が許容値以内（D=含まれない）。透水係数はフィルダムのコア材の要件。" },
{ id:347, cat:"R4過去問", diff:"★★★", q:"道路の舗装設計で用いるTA法（等値換算厚さ法）における表層・基層の等値換算係数はどれか。", choices:["A: 0.55","B: 0.80","C: 1.00","D: 1.20"], ans:2, exp:"TA法における表層・基層の等値換算係数は1.00（C=正）。上層路盤（粒調砕石）は0.55、下層路盤（クラッシャーラン）は0.25が標準的な値。" },
{ id:348, cat:"R4過去問", diff:"★★☆", q:"型枠支保工の組立て等作業主任者を選任すべき条件として正しいものはどれか。", choices:["A: すべての型枠支保工の組立て","B: 支柱の高さが2m以上の場合","C: 支柱の高さが3.5m以上の場合","D: コンクリートの打込み量が50m³以上の場合"], ans:0, exp:"型枠支保工の組立て又は解体の作業には、規模に関わらず型枠支保工の組立て等作業主任者を選任する義務がある（A=正）。" },
{ id:349, cat:"R4過去問", diff:"★★★", q:"建設業法における監理技術者の専任が必要な請負代金の額として正しいものはどれか。", choices:["A: 2,500万円以上","B: 3,500万円以上","C: 4,500万円以上","D: 7,000万円以上"], ans:1, exp:"主任技術者・監理技術者の専任義務は請負代金3,500万円以上（建築一式は7,000万円以上）の重要な建設工事（B=正）。" },
{ id:350, cat:"R4過去問", diff:"★★☆", q:"建設工事に伴う産業廃棄物の排出事業者は誰か。", choices:["A: 発注者","B: 元請業者","C: 下請業者","D: 産業廃棄物処理業者"], ans:1, exp:"建設工事の産業廃棄物は元請業者が排出事業者として処理責任を負う（B=正）。下請から発生した廃棄物も元請の責任。廃棄物処理法の重要規定。" },
{ id:351, cat:"R4過去問", diff:"★★★", q:"コンクリートのスランプ試験において、スランプ8cm以上の場合の許容差はどれか。", choices:["A: ±1.0cm","B: ±1.5cm","C: ±2.0cm","D: ±2.5cm"], ans:3, exp:"スランプ8cm以上の場合の許容差は±2.5cm（D=正）。スランプ5〜8cmの場合は±1.5cm。スランプコーンの高さは30cm。" },
{ id:352, cat:"R4過去問", diff:"★★☆", q:"道路法における道路の占用許可の申請先として正しいものはどれか。", choices:["A: 警察署長","B: 道路管理者","C: 都道府県知事","D: 国土交通大臣"], ans:1, exp:"道路占用許可は道路管理者（国・都道府県・市町村の長）に申請（B=正）。道路使用許可（道路交通法）の申請先は所轄警察署長。混同注意。" },
{ id:353, cat:"R4過去問", diff:"★★★", q:"ウェルポイント工法の吸引揚程の限界として最も適切なものはどれか。", choices:["A: 約3m","B: 約6m","C: 約10m","D: 約15m"], ans:1, exp:"ウェルポイント工法の吸引揚程は理論上約10mだが、実用上は約6m程度が限界（B=正）。それ以上はディープウェル工法を適用する。" },
{ id:354, cat:"R4過去問", diff:"★★☆", q:"高所作業車の運転技能講習が必要となる作業床の高さはどれか。", choices:["A: 2m以上","B: 5m以上","C: 10m以上","D: 20m以上"], ans:2, exp:"作業床の高さ10m以上の高所作業車は運転技能講習修了者が操作する（C=正）。10m未満は特別教育で可。アウトリガーは最大限張出し。" },
{ id:355, cat:"R4過去問", diff:"★★★", q:"バーチャート工程表の短所として正しいものはどれか。", choices:["A: 作成が困難である","B: 各作業の日数が分かりにくい","C: 作業間の相互関係が不明確である","D: 全体の進捗が把握できない"], ans:2, exp:"バーチャートは作成が容易で各作業の日数は明確だが、作業間の相互関係（先行・後続）が不明確でクリティカルパスが把握できない（C=正）。" },
{ id:356, cat:"R4過去問", diff:"★★☆", q:"石灰安定処理が最も有効な土質はどれか。", choices:["A: 砂質土","B: 礫質土","C: 含水比の高い粘性土","D: 有機質土"], ans:2, exp:"石灰安定処理は含水比の高い粘性土に最も有効（C=正）。石灰のイオン交換・ポゾラン反応により含水比を低下させ強度を改善する。有機質土にはセメントが不向き。" },
{ id:357, cat:"R4過去問", diff:"★★★", q:"海洋構造物に使用するコンクリートの水セメント比（W/C）の上限として正しいものはどれか。", choices:["A: 45%以下","B: 50%以下","C: 55%以下","D: 60%以下"], ans:0, exp:"海洋構造物のW/C上限は45%以下（A=正）。道路橋は55%以下、一般構造物は65%以下。海洋環境は塩害・凍害が厳しいため最も低い値。" },
{ id:358, cat:"R4過去問", diff:"★★☆", q:"建設リサイクル法におけるコンクリート塊の再資源化目標はどれか。", choices:["A: 70%以上","B: 80%以上","C: 90%以上","D: 95%以上"], ans:2, exp:"コンクリート塊の再資源化目標は90%以上（C=正）。アスファルト・コンクリートも90%以上。建設発生木材は70%以上（再資源化+縮減）。" },
{ id:359, cat:"R4過去問", diff:"★★★", q:"建設業法において、2つ以上の都道府県に営業所を設ける場合に必要な許可はどれか。", choices:["A: 都道府県知事許可","B: 国土交通大臣許可","C: 市町村長許可","D: 地方整備局長許可"], ans:1, exp:"2つ以上の都道府県に営業所を設ける場合は国土交通大臣許可（B=正）。1つの都道府県のみは知事許可。許可の有効期間は5年。" },
{ id:360, cat:"R4過去問", diff:"★★☆", q:"酸素欠乏の定義として正しい酸素濃度はどれか。", choices:["A: 15%未満","B: 16%未満","C: 18%未満","D: 20%未満"], ans:2, exp:"酸素欠乏とは空気中の酸素濃度が18%未満の状態（C=正）。作業前に酸素濃度を測定し18%以上を確認。第2種は硫化水素10ppm以下も確認する。" },
{ id:361, cat:"R3過去問", diff:"★★★", q:"普通ポルトランドセメントを使用したコンクリートの湿潤養生期間として正しいものはどれか（日平均気温10℃以上15℃未満）。", choices:["A: 3日以上","B: 5日以上","C: 7日以上","D: 9日以上"], ans:2, exp:"普通ポルトランドセメントの湿潤養生：15℃以上→5日、10℃以上→7日（C=正）、5℃以上→9日。早強は約60%（15℃以上→3日）。" },
{ id:362, cat:"R3過去問", diff:"★★☆", q:"N値から判定される地盤の状態として、N値が4未満の場合の判定はどれか。", choices:["A: 極めて硬い","B: 中程度","C: やや軟弱","D: 軟弱"], ans:3, exp:"N値4未満は軟弱地盤（D=正）。N値4〜10→やや軟弱、10〜30→中程度、50以上→極めて硬い。N値は地盤の硬軟を示す最も基本的な指標。" },
{ id:363, cat:"R3過去問", diff:"★★★", q:"コンクリートの中性化速度に関する記述として正しいものはどれか。", choices:["A: W/Cが大きいほど中性化は遅い","B: 中性化深さは経過時間の平方根に比例する","C: CO₂濃度が低いほど中性化は早い","D: かぶりが小さいほど中性化の影響を受けにくい"], ans:1, exp:"中性化深さは経過年数の平方根に比例する（√t則）（B=正）。W/Cが大きいほど組織が粗く中性化は早い。CO₂濃度が高いほど早い。かぶりが大きいほど鉄筋への影響は遅い。" },
{ id:364, cat:"R3過去問", diff:"★★☆", q:"深さ1.5m以上の掘削作業で設置が義務付けられるものはどれか。", choices:["A: 安全帯取付け設備","B: 昇降設備","C: 照明設備","D: 換気設備"], ans:1, exp:"深さ1.5m以上の掘削では昇降設備の設置が義務（B=正）。深さ2m以上で崩壊防止措置、掘削面高さ2m以上で掘削作業主任者の選任が必要。" },
{ id:365, cat:"R3過去問", diff:"★★★", q:"コンクリートの打込み時の1層の厚さの標準として正しいものはどれか。", choices:["A: 20〜30cm以下","B: 40〜50cm以下","C: 60〜70cm以下","D: 規定はない"], ans:1, exp:"コンクリートの打込み1層の厚さは40〜50cm以下が標準（B=正）。各層は確実に締め固め、層間にコールドジョイントが生じないようにする。" },
{ id:366, cat:"R3過去問", diff:"★★☆", q:"建設業法における軽微な建設工事（許可不要）の基準として、建築一式工事以外の工事はどれか。", choices:["A: 請負代金300万円未満","B: 請負代金500万円未満","C: 請負代金1,000万円未満","D: 請負代金1,500万円未満"], ans:1, exp:"建築一式工事以外の軽微な工事は請負代金500万円未満（B=正）。建築一式は1,500万円未満（または延床150㎡未満の木造住宅）。" },
{ id:367, cat:"R3過去問", diff:"★★★", q:"液状化が発生しやすい地盤条件として正しいものはどれか。", choices:["A: 乾燥した粘性土地盤","B: 地下水位が高い緩い砂質地盤","C: N値が50以上の硬い地盤","D: 岩盤"], ans:1, exp:"液状化は地下水位が高い飽和した緩い砂質地盤で地震時に発生しやすい（B=正）。N値が小さい（緩い）砂地盤ほど危険。粘性土や硬い地盤は一般に液状化しにくい。" },
{ id:368, cat:"R3過去問", diff:"★★☆", q:"アスファルト舗装の合材製造温度として正しいものはどれか。", choices:["A: 100〜120℃","B: 120〜140℃","C: 140〜160℃","D: 160〜180℃"], ans:3, exp:"アスファルト混合物の製造温度は160〜180℃（D=正）。敷均し110℃以上、初転圧110〜140℃、二次転圧70〜90℃、仕上げ50℃以上。" },
{ id:369, cat:"R3過去問", diff:"★★★", q:"玉掛け技能講習が必要となるクレーンのつり上げ荷重はどれか。", choices:["A: 0.5t以上","B: 1t以上","C: 3t以上","D: 5t以上"], ans:1, exp:"つり上げ荷重1t以上のクレーンの玉掛け作業には玉掛け技能講習修了が必要（B=正）。1t未満は特別教育。玉掛けはクレーン運転とは別の資格。" },
{ id:370, cat:"R3過去問", diff:"★★☆", q:"パレート図の説明として正しいものはどれか。", choices:["A: 不良項目を出現頻度の大きい順に棒グラフで並べ累積曲線を加えた図","B: 2変数の関係を点で表した図","C: データの分布を柱状に表した図","D: 時間的変化を折れ線で表した図"], ans:0, exp:"パレート図は不良項目を出現頻度の大きい順に左から棒グラフで表し、累積曲線を加えた図（A=正）。重点管理すべき項目を特定するのに有効。Bは散布図、Cはヒストグラム。" },
{ id:371, cat:"R3過去問", diff:"★★★", q:"フルハーネス型墜落制止用器具の使用が原則必要となる高さはどれか。", choices:["A: 2m以上","B: 5m以上","C: 6.75m超","D: 10m以上"], ans:2, exp:"高さ6.75m超の箇所ではフルハーネス型墜落制止用器具の使用が原則（C=正）。2019年2月施行。使用には特別教育が必要。6.75m以下は胴ベルト型も可。" },
{ id:372, cat:"R3過去問", diff:"★★☆", q:"コンクリートのフレッシュ時の塩化物イオン量の上限として正しいものはどれか。", choices:["A: 0.10kg/m³以下","B: 0.20kg/m³以下","C: 0.30kg/m³以下","D: 0.50kg/m³以下"], ans:2, exp:"JIS A 5308によりフレッシュコンクリート中の塩化物イオン量は0.30kg/m³以下（C=正）。海砂使用時は特に注意が必要。塩化物は鉄筋腐食の原因。" },
{ id:373, cat:"R3過去問", diff:"★★★", q:"36協定（時間外・休日労働に関する協定）の届出先として正しいものはどれか。", choices:["A: 都道府県知事","B: 市町村長","C: 所轄労働基準監督署長","D: 厚生労働大臣"], ans:2, exp:"36協定は所轄労働基準監督署長に届け出る（C=正）。労使間で書面により締結し届出て初めて効力が発生する。上限：原則月45時間・年360時間。" },
{ id:374, cat:"R3過去問", diff:"★★☆", q:"コンクリートの引張強度は圧縮強度の何分の一程度か。", choices:["A: 約1/3〜1/5","B: 約1/5〜1/7","C: 約1/10〜1/13","D: 約1/20〜1/25"], ans:2, exp:"コンクリートの引張強度は圧縮強度の約1/10〜1/13程度と極めて小さい（C=正）。そのため鉄筋で引張力を負担させる鉄筋コンクリート構造が用いられる。" },
{ id:375, cat:"R3過去問", diff:"★★★", q:"急傾斜地崩壊危険区域の指定基準における傾斜角と高さの条件として正しいものはどれか。", choices:["A: 傾斜角20度以上、高さ3m以上","B: 傾斜角30度以上、高さ5m以上","C: 傾斜角40度以上、高さ10m以上","D: 傾斜角45度以上、高さ15m以上"], ans:1, exp:"急傾斜地崩壊危険区域は傾斜角30度以上、高さ5m以上の急傾斜地で崩壊のおそれがある区域（B=正）。区域内では崩壊を助長する行為が制限される。" },
{ id:376, cat:"R3過去問", diff:"★★☆", q:"建設工事における新規入場者教育の実施時期として正しいものはどれか。", choices:["A: 月に1回まとめて実施する","B: 現場に新たに入場する都度実施する","C: 工事完了時に実施する","D: 年に1回実施する"], ans:1, exp:"新規入場者教育は現場に新たに入場する作業員に対し、入場の都度実施する（B=正）。現場のルール・危険箇所・緊急連絡先等を教育する。" },
{ id:377, cat:"R3過去問", diff:"★★★", q:"マスコンクリートにおいて温度ひび割れを防止するために有効な対策として誤っているものはどれか。", choices:["A: 低熱ポルトランドセメントを使用する","B: パイプクーリングを実施する","C: 単位セメント量を増やす","D: 打込み温度を下げる"], ans:2, exp:"単位セメント量を増やすと水和熱が増大し温度ひび割れのリスクが高まる（C=誤り）。低熱セメントの使用、パイプクーリング、打込み温度の低減が有効な対策。" },
{ id:378, cat:"R3過去問", diff:"★★☆", q:"騒音規制法における特定建設作業の規制基準値はどれか。", choices:["A: 75dB以下","B: 80dB以下","C: 85dB以下","D: 90dB以下"], ans:2, exp:"騒音規制法の特定建設作業の規制基準は85dB以下（C=正）。振動規制法は75dB以下。届出は作業開始7日前までに市町村長へ。" },
{ id:379, cat:"R3過去問", diff:"★★★", q:"RCD工法（ローラー締固めダムコンクリート工法）の説明として正しいものはどれか。", choices:["A: コンクリートをポンプで圧送してダムを構築する工法","B: 超硬練りコンクリートをブルドーザーで敷均しローラーで締め固める工法","C: プレキャストコンクリートパネルを組み立てる工法","D: 水中コンクリートを使用する工法"], ans:1, exp:"RCD工法はスランプゼロの超硬練りコンクリートをダンプで運搬、ブルドーザーで敷均し、振動ローラーで締め固める合理化施工法（B=正）。重力式ダムに適用。" },
{ id:380, cat:"R3過去問", diff:"★★☆", q:"年次有給休暇の付与に関して、6ヶ月間継続勤務し全労働日の8割以上出勤した場合の付与日数はどれか。", choices:["A: 5日","B: 10日","C: 15日","D: 20日"], ans:1, exp:"6ヶ月間継続勤務し全労働日の8割以上出勤した労働者に10日の年次有給休暇を付与（B=正）。以後1年ごとに1〜2日ずつ増加し、最大20日。" },,
{ id:401, cat:"土質・基礎", diff:"★★☆", q:"土の含水比の定義として正しいものはどれか。", choices:["A: 土粒子の質量に対する水の質量の百分率","B: 土全体の体積に対する水の体積の百分率","C: 土全体の質量に対する水の質量の百分率","D: 間隙の体積に対する水の体積の百分率"], ans:0, exp:"含水比w=水の質量/土粒子の質量×100（A=正）。Cは含水率、Dは飽和度の定義。" },
{ id:402, cat:"土質・基礎", diff:"★★★", q:"砂質土の内部摩擦角φに関する記述として正しいものはどれか。", choices:["A: 砂質土はφ=0で粘着力cのみで抵抗する","B: 緩い砂ほど内部摩擦角が大きい","C: 密な砂ほど内部摩擦角が大きい","D: 内部摩擦角は含水比に関係しない"], ans:2, exp:"密実な砂ほどかみ合い効果が大きく内部摩擦角φが大きくなる（C=正）。φ=0はCU条件の粘性土の話。" },
{ id:403, cat:"土質・基礎", diff:"★★☆", q:"ボイリングに関する記述として正しいものはどれか。", choices:["A: 掘削底面で上向き浸透力が有効応力を上回り砂が噴き出す現象","B: 堤体内の水みちに沿って土粒子が流出する現象","C: 地震時に砂地盤が液状になる現象","D: 粘性土地盤が隆起する現象"], ans:0, exp:"ボイリングは掘削底面で上向き浸透水圧が土の有効重量を超え砂が沸騰状に噴出する現象（A=正）。Bはパイピング。" },
{ id:404, cat:"土質・基礎", diff:"★★★", q:"パイピングに関する記述として正しいものはどれか。", choices:["A: 浸透水により土粒子が水みちに沿って流出し空洞が拡大する現象","B: 地表面が凍上により隆起する現象","C: 軟弱粘土が圧密により沈下する現象","D: 地震により砂が液状化する現象"], ans:0, exp:"パイピングは浸透水により土粒子が流出し水みちが拡大・貫通する現象（A=正）。堤防破壊の主要因の一つ。" },
{ id:405, cat:"土質・基礎", diff:"★★☆", q:"粘性土の一軸圧縮試験に関する記述として正しいものはどれか。", choices:["A: 側圧を加えずに軸方向に圧縮して強度を求める試験","B: 三方向から等しい圧力を加える試験","C: 繰返し荷重を加えて疲労強度を求める試験","D: 試料を水中で行う試験"], ans:0, exp:"一軸圧縮試験は供試体に側圧を加えず軸方向に圧縮し、非排水せん断強度qu/2を求める試験（A=正）。" },
{ id:406, cat:"土質・基礎", diff:"★★★", q:"サンドコンパクションパイル工法の効果として正しいものはどれか。", choices:["A: 砂杭の打設により周辺地盤を締め固め密度を増加させる","B: 地盤にセメントを注入して固化する","C: 軟弱土を良質土に置き換える","D: 地下水を排水して地盤を乾燥させる"], ans:0, exp:"SCP工法は振動により砂杭を造成し周辺地盤の密度を増加させる締固め工法（A=正）。液状化対策にも有効。" },
{ id:407, cat:"土質・基礎", diff:"★★☆", q:"地盤のせん断破壊に対する安全率が最も低い条件はどれか。", choices:["A: 盛土直後の飽和粘性土地盤","B: 長期間放置された砂質土地盤","C: 圧密完了後の粘性土地盤","D: 岩盤上の地盤"], ans:0, exp:"盛土直後の飽和粘性土は過剰間隙水圧が高く有効応力が低い最も危険な状態（A=正）。時間経過で圧密が進み安全率が上昇。" },
{ id:408, cat:"土質・基礎", diff:"★★★", q:"プレロード工法に関する記述として正しいものはどれか。", choices:["A: 設計荷重以上の荷重を事前に載荷し圧密を促進する工法","B: 地盤を凍結して強度を高める工法","C: 地盤に鉄筋を挿入する工法","D: 地表面にシートを敷設する工法"], ans:0, exp:"プレロード工法は構造物の設計荷重以上の荷重をあらかじめ載荷し圧密沈下を促進する工法（A=正）。載荷除去後に構造物を構築。" },
{ id:409, cat:"土質・基礎", diff:"★★☆", q:"ヒービングに関する記述として正しいものはどれか。", choices:["A: 軟弱粘性土の掘削時に底面が膨れ上がる現象","B: 砂地盤で水が噴出する現象","C: 岩盤が風化して膨張する現象","D: 盛土法面が滑動する現象"], ans:0, exp:"ヒービングは軟弱粘性土の掘削時に背面の土の重量により掘削底面が膨れ上がる現象（A=正）。対策は矢板の根入れ延長等。" },
{ id:410, cat:"土質・基礎", diff:"★★★", q:"バイブロフローテーション工法の適用地盤として最も適切なものはどれか。", choices:["A: 有機質土","B: 高含水比の粘性土","C: 緩い砂質地盤","D: 岩盤"], ans:2, exp:"バイブロフローテーション工法は振動と注水で緩い砂質地盤を締め固める工法（C=正）。粘性土には適用困難。" },
{ id:411, cat:"土質・基礎", diff:"★★☆", q:"ウェルポイント工法の排水限界深さとして適切なものはどれか。", choices:["A: 約2m","B: 約6m","C: 約15m","D: 約30m"], ans:1, exp:"ウェルポイント工法の排水限界は吸引揚程の制約から約6m程度（B=正）。それ以上はディープウェル工法を適用。" },
{ id:412, cat:"土質・基礎", diff:"★★★", q:"負の周面摩擦力（ネガティブフリクション）が発生する条件として正しいものはどれか。", choices:["A: 杭周面の地盤が沈下して杭に下向きの力が作用する場合","B: 杭先端の支持力が不足している場合","C: 杭の施工時に孔壁が崩壊した場合","D: 地震時に杭が水平力を受ける場合"], ans:0, exp:"ネガティブフリクションは周辺地盤の圧密沈下により杭に下向きの摩擦力が作用する現象（A=正）。杭の設計荷重を増加させる。" },
{ id:413, cat:"コンクリート", diff:"★★☆", q:"コンクリートのブリーディングに関する記述として正しいものはどれか。", choices:["A: 練混ぜ水の一部が上面に浮上する現象","B: コンクリートが固まった後にひび割れる現象","C: コンクリートの色が変化する現象","D: 骨材が分離して沈降する現象"], ans:0, exp:"ブリーディングは固体粒子の沈降に伴い練混ぜ水の一部が表面に浮上する現象（A=正）。表面にレイタンスが堆積する。" },
{ id:414, cat:"コンクリート", diff:"★★★", q:"エントレインドエアとエントラップドエアの違いとして正しいものはどれか。", choices:["A: エントレインドエアはAE剤で意図的に連行した微細な気泡","B: エントレインドエアは練混ぜ時に自然に混入した粗い気泡","C: エントラップドエアは凍害対策の気泡","D: 両者に違いはない"], ans:0, exp:"エントレインドエアはAE剤で連行した径10〜250μmの微細気泡で凍害に有効（A=正）。エントラップドエアは自然混入の粗い気泡。" },
{ id:415, cat:"コンクリート", diff:"★★☆", q:"コンクリートの乾燥収縮に関する記述として正しいものはどれか。", choices:["A: 単位水量が多いほど乾燥収縮は大きい","B: 単位セメント量が少ないほど乾燥収縮は大きい","C: 骨材量が多いほど乾燥収縮は大きい","D: W/Cが小さいほど乾燥収縮は大きい"], ans:0, exp:"乾燥収縮は単位水量が多いほど大きくなる（A=正）。対策は単位水量の低減、収縮低減剤の使用、十分な養生。" },
{ id:416, cat:"コンクリート", diff:"★★★", q:"高炉セメントB種の特徴として誤っているものはどれか。", choices:["A: アルカリシリカ反応の抑制効果がある","B: 耐海水性に優れる","C: 初期強度が普通ポルトランドより高い","D: 水和熱が小さい"], ans:2, exp:"高炉セメントB種は初期強度が普通ポルトランドより低い（C=誤り）。長期強度は同等以上。ASR抑制・耐海水性・低水和熱が特徴。" },
{ id:417, cat:"コンクリート", diff:"★★☆", q:"コンクリートの圧縮強度試験に使用する供試体の標準寸法はどれか。", choices:["A: φ100mm×200mm","B: φ150mm×300mm","C: φ200mm×400mm","D: φ50mm×100mm"], ans:1, exp:"JIS A 1108に基づく標準供試体はφ150mm×300mmの円柱体（B=正）。高さ/直径比＝2が標準。" },
{ id:418, cat:"コンクリート", diff:"★★★", q:"マスコンクリートのパイプクーリングの目的として正しいものはどれか。", choices:["A: コンクリート内部の温度を下げ温度ひび割れを防止する","B: コンクリートの強度を向上させる","C: コンクリートの凍害を防止する","D: コンクリートの乾燥を促進する"], ans:0, exp:"パイプクーリングはコンクリート内部に冷却管を埋設し冷却水を通水して温度上昇を抑え温度ひび割れを防止する（A=正）。" },
{ id:419, cat:"コンクリート", diff:"★★☆", q:"コンクリートの中性化の進行速度に影響する因子として正しいものはどれか。", choices:["A: W/Cが大きいほど中性化が早い","B: 骨材の粒径が大きいほど中性化が早い","C: 鉄筋量が多いほど中性化が早い","D: コンクリートの打設高さが高いほど中性化が早い"], ans:0, exp:"W/Cが大きいとコンクリート組織が粗くなりCO₂の浸透が容易になるため中性化が早い（A=正）。" },
{ id:420, cat:"コンクリート", diff:"★★★", q:"コンクリートのワーカビリティーに影響する要因として誤っているものはどれか。", choices:["A: スランプ","B: 材料分離の抵抗性","C: 圧縮強度","D: ポンプ圧送性"], ans:2, exp:"ワーカビリティーは施工のしやすさの総称で、スランプ・材料分離抵抗性・ポンプ圧送性等が含まれる。圧縮強度は硬化後の性質で直接の要因ではない（C=誤り）。" },
{ id:421, cat:"コンクリート", diff:"★★☆", q:"AE減水剤の効果として正しいものはどれか。", choices:["A: 単位水量の低減と空気量の確保が同時にできる","B: コンクリートの色を改善する","C: 硬化時間を大幅に延長する","D: 鉄筋の腐食を防止する"], ans:0, exp:"AE減水剤は界面活性作用で単位水量を低減し、同時にAE効果で微細気泡を連行する混和剤（A=正）。最も一般的に使用される。" },

  if (state.specialFilter === '間違えた問題のみ') qs = qs.filter(q => state.answered[q.id] === false);

  return qs.length > 0 ? qs : [questions[0]];
}

function stats() {
  const total = Object.keys(state.answered).length;
  const correct = Object.values(state.answered).filter(Boolean).length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;
  return { total, correct, pct };
}

    const correct = catQs.filter(q => state.answered[q.id] === true);
    const wrong = catQs.filter(q => state.answered[q.id] === false);
    const pct = answered.length > 0 ? Math.round(correct.length / answered.length * 100) : 0;
    const progress = Math.round(answered.length / catQs.length * 100);

    // Determine status & advice
    let status, statusClass, advice;
    const isCurrentWeek = pd.week === currentWeek;
    const weekNote = isCurrentWeek ? `<div class="pl-advice-step" style="color:var(--gold)">📅 今週（第${pd.week}週）の学習範囲です！</div>` : '';
    
    if (answered.length === 0) {
      status = '未着手'; statusClass = 'pl-status-start';
      advice = weekNote + `<div class="pl-advice-step">まず問題演習で${catQs.length}問を1周しましょう</div>${pd.fcCount>0?`<div class="pl-advice-step">暗記カード${pd.fcCount}枚で基本数値を確認</div>`:''}`;
    } else if (progress < 50) {
      status = '学習中'; statusClass = 'pl-status-start';
      advice = weekNote + `<div class="pl-advice-step">残り${catQs.length - answered.length}問を解いて全問1周を完了</div><div class="pl-advice-step">暗記カードで数値を並行して暗記</div>`;
    } else if (pct < 50) {
      status = '要強化'; statusClass = 'pl-status-start';
      advice = weekNote + `<div class="pl-advice-step">要点整理で基礎知識を再確認</div><div class="pl-advice-step">間違えた${wrong.length}問を集中復習</div><div class="pl-advice-step">暗記カード＋数値ドリルで数値を固める</div>`;
    } else if (pct < 70) {
      status = '強化中'; statusClass = 'pl-status-progress';
      advice = weekNote + `<div class="pl-advice-step">間違えた${wrong.length}問を復習フィルターで再演習</div><div class="pl-advice-step">紛らわしい数値で混同しやすいペアを確認</div>`;
    } else if (pct < 85) {
      status = '良好'; statusClass = 'pl-status-good';
      advice = `<div class="pl-advice-step">仕上がり良好！模擬試験で実力を確認</div>${wrong.length>0?`<div class="pl-advice-step">間違えた${wrong.length}問だけ最終チェック</div>`:''}`;
    } else {
      status = '完成'; statusClass = 'pl-status-perfect';
      advice = `<div class="pl-advice-step">この分野は合格レベル到達！</div><div class="pl-advice-step">他の弱い分野に時間を振り向けましょう</div>`;
    }

    return { ...pd, total: catQs.length, answeredCount: answered.length, correctCount: correct.length, wrongCount: wrong.length, pct, progress, status, statusClass, advice };
  });

  return `

function renderQuiz() {
  const s = stats();
  const filtered = getFiltered();
  const idx = Math.min(state.qIndex, filtered.length - 1);
  const q = filtered[idx];
  const isAnswered = state.answered[q.id] !== undefined;
  const isCorrect = state.answered[q.id] === true;
  const keyLabels = ['A','B','C','D'];

  return `
<div class="quiz-layout">
  <div class="quiz-main">
    <div class="score-box">
      <div>
        <div style="font-size:12px;color:var(--muted)">正解率</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="score-num">${s.pct}%</span>
          <span style="font-size:12px;color:var(--muted)">(${s.correct}/${s.total}問)</span>
        </div>
      </div>
      <button class="btn btn-danger" onclick="resetQuiz()">リセット</button>
    </div>
    <div class="filter-row">
      ${cats.map(c=>`<button class="filter-btn ${state.catFilter===c && !state.specialFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
      <span style="width:1px;background:var(--border);margin:0 4px"></span>
      ${specialFilters.map(sf=>`<button class="filter-btn ${state.specialFilter===sf?'active':''}" onclick="setSpecialFilter('${sf}')" style="${state.specialFilter===sf?'':'border-color:var(--orange);color:var(--orange)'}">${sf}</button>`).join('')}
    </div>
    <div class="q-counter">問題 ${idx+1} / ${filtered.length} ｜ ${q.cat}</div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-cat">${q.cat}</span>
        <span class="q-diff">${q.diff}</span>
      </div>
      <div class="q-text">Q. ${q.q}</div>
      <div>
        ${q.choices.map((ch,i)=>{
          let cls = 'choice-btn';
          if (isAnswered) {
            cls += ' disabled';
            if (i === q.ans) cls += ' correct';
            else if (i === state.selected) cls += ' wrong';
          }
          return `<button class="${cls}" onclick="answer(${i})">${ch}<span class="key-hint">${keyLabels[i]}</span></button>`;
        }).join('')}
      </div>
      ${state.showExp && isAnswered ? `
      <div class="exp-box ${!isCorrect?'wrong':''}">
        <div class="exp-title ${!isCorrect?'wrong':''}">${isCorrect?'✅ 正解！':'❌ 不正解'}　正解：${q.choices[q.ans].substring(0,2)}</div>
        <div class="exp-text">${q.exp}</div>
      </div>` : ''}
    </div>
    <div class="nav-row">
      <button class="btn btn-default" onclick="prevQ()">◀ 前の問題</button>
      <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${((idx+1)/filtered.length)*100}%;background:var(--gold)"></div></div>
      <button class="btn btn-primary" onclick="nextQ()">次の問題 ▶</button>
    </div>
  </div>
  <div class="quiz-sidebar-panel">
    <div class="qs-panel">
      <div class="qs-title">📋 問題一覧 (${filtered.length}問)</div>
      <div class="qs-grid">
        ${filtered.slice(0, 100).map((fq,fi)=>{
          let dotCls = 'qs-dot';
          if (fi === idx) dotCls += ' current';
          else if (state.answered[fq.id] === true) dotCls += ' correct';
          else if (state.answered[fq.id] === false) dotCls += ' wrong';
          return `<div class="${dotCls}" onclick="jumpQ(${fi})" title="問題${fi+1}">${fi+1}</div>`;
        }).join('')}
      </div>
      ${filtered.length > 100 ? `<div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center">先頭100問を表示</div>` : ''}

function answer(i) {
  const filtered = getFiltered();
  const q = filtered[Math.min(state.qIndex, filtered.length-1)];
  if (state.answered[q.id] !== undefined) return;
  state.selected = i;
  state.showExp = true;
  state.answered[q.id] = (i === q.ans);
  sv(); render();
}

function nextQ() {
  const filtered = getFiltered();
  state.qIndex = (state.qIndex + 1) % filtered.length;
  state.selected = null; state.showExp = false;

function prevQ() {
  const filtered = getFiltered();
  state.qIndex = (state.qIndex - 1 + filtered.length) % filtered.length;
  state.selected = null; state.showExp = false;
  render();
}

function jumpQ(i) {

document.addEventListener('keydown', function(e) {
  // Tab switching: 1-4
  if (e.key === '1') { switchTab('home'); return; }
  if (e.key === '2') { switchTab('curriculum'); return; }
  if (e.key === '3') { switchTab('keypoints'); return; }
  if (e.key === '4') { switchTab('quiz'); return; }
  if (e.key === '5') { switchTab('mock'); return; }
  if (e.key === '6') { switchTab('memory'); return; }
  if (e.key === '7') { switchTab('expert'); return; }
  
  if (state.tab === 'memory') {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (state.memMode==='flashcard') flipCard(); }
    if (e.key === 'ArrowRight') { if (state.memMode==='flashcard') fcNext(); }
    if (e.key === 'ArrowLeft') { if (state.memMode==='flashcard') fcPrev(); }
    return;
  }
  if (state.tab === 'mock' && mockState.active) {
    const keyMap = { 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
    if (keyMap[e.key.toLowerCase()] !== undefined) { mockAnswer(keyMap[e.key.toLowerCase()]); return; }
    if (e.key === 'ArrowRight' || e.key === 'n') { mockNext(); return; }
    if (e.key === 'ArrowLeft' || e.key === 'p') { mockPrev(); return; }
    return;
  }
  if (state.tab !== 'quiz') return;
  
  // Answer keys
  const keyMap = { 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
  if (keyMap[e.key.toLowerCase()] !== undefined) {
    answer(keyMap[e.key.toLowerCase()]);
    return;
  }
  
  // Navigation
  if (e.key === 'ArrowRight' || e.key === 'n') { nextQ(); return; }
  if (e.key === 'ArrowLeft' || e.key === 'p') { prevQ(); return; }
  if (e.key === 'r' && e.ctrlKey) { e.preventDefault(); resetQuiz(); return; }
});

function updateCountdown() {
  const target = new Date('2026-07-05T09:00:00');
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) return;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  const pad = n => String(n).padStart(2,'0');
  const el = id => document.getElementById(id);
  if (el('cd-days')) el('cd-days').textContent = pad(days);
  if (el('cd-hours')) el('cd-hours').textContent = pad(hours);
  if (el('cd-mins')) el('cd-mins').textContent = pad(mins);
  if (el('cd-secs')) el('cd-secs').textContent = pad(secs);
}

// =================== MOCK EXAM ===================
let mockState = {
  active: false,
  questions: [],
  currentIndex: 0,
  answers: {},
  timeLeft: 0,
  timerId: null,
  session: 'am', // 'am' or 'pm'
  finished: false,
};

function startMock(session) {
  const allQs = [...questions];
  // Shuffle
  for (let i = allQs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allQs[i], allQs[j]] = [allQs[j], allQs[i]];
  }
  
  mockState.session = session;
  mockState.active = true;
  mockState.finished = false;
  mockState.currentIndex = 0;
  mockState.answers = {};
  
  if (session === 'am') {
    mockState.questions = allQs.slice(0, 40);
    mockState.timeLeft = 150 * 60; // 2h30m
  } else {
    mockState.questions = allQs.slice(0, 26);
    mockState.timeLeft = 120 * 60; // 2h
  }
  
  if (mockState.timerId) clearInterval(mockState.timerId);
  mockState.timerId = setInterval(() => {
    mockState.timeLeft--;
    updateMockTimer();
    if (mockState.timeLeft <= 0) {
      finishMock();
    }
  }, 1000);
  
  render();
}

function updateMockTimer() {
  const el = document.getElementById('mock-timer');
  if (!el) return;
  const m = Math.floor(mockState.timeLeft / 60);
  const s = mockState.timeLeft % 60;
  const pct = mockState.session === 'am' 
    ? (mockState.timeLeft / (150*60)) * 100
    : (mockState.timeLeft / (120*60)) * 100;
  el.innerHTML = `<span style="font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;color:${mockState.timeLeft<300?'var(--red)':'var(--gold)'}">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span>`;
  const bar = document.getElementById('mock-timer-bar');
  if (bar) bar.style.width = pct + '%';
}

function mockAnswer(i) {
  const q = mockState.questions[mockState.currentIndex];
  if (mockState.answers[q.id] !== undefined) return;
  mockState.answers[q.id] = i;
  render();
}

function mockNext() {
  if (mockState.currentIndex < mockState.questions.length - 1) {
    mockState.currentIndex++;
    render();
  }
}

function mockPrev() {
  if (mockState.currentIndex > 0) {
    mockState.currentIndex--;
    render();
  }
}

function mockJump(i) {
  mockState.currentIndex = i;
  render();
}

function finishMock() {
  if (mockState.timerId) clearInterval(mockState.timerId);
  mockState.timerId = null;
  mockState.active = false;
  mockState.finished = true;
  render();
}

function resetMock() {
  if (mockState.timerId) clearInterval(mockState.timerId);
  mockState.timerId = null;
  mockState.active = false;
  mockState.finished = false;
  mockState.questions = [];
  mockState.answers = {};
  render();
}

function renderMock() {
  if (mockState.finished) return renderMockResult();
  if (!mockState.active) return renderMockMenu();
  return renderMockExam();
}

// =================== MEMORY TOOL FUNCTIONS ===================
function renderMemory() {
  const mode = state.memMode;
  return `
<div class="mem-tabs">
  <button class="mem-tab ${mode==='flashcard'?'active':''}" onclick="setMemMode('flashcard')">📇 暗記カード</button>
  <button class="mem-tab ${mode==='drill'?'active':''}" onclick="setMemMode('drill')">⚡ 数値ドリル</button>
  <button class="mem-tab ${mode==='checklist'?'active':''}" onclick="setMemMode('checklist')">📋 直前チェックリスト</button>
  <button class="mem-tab ${mode==='confuse'?'active':''}" onclick="setMemMode('confuse')">🔄 紛らわしい数値</button>
</div>
${mode === 'flashcard' ? renderFlashcard() : mode === 'drill' ? renderDrill() : mode === 'checklist' ? renderChecklist() : renderConfuse()}`;
}

function setMemMode(m) { state.memMode = m; render(); }

// --- FLASHCARD ---
function renderFlashcard() {
  const fc = flashcards[state.fcIndex];
  return `
<div class="fc-container">
  <div class="fc-card ${state.fcFlipped?'flipped':''}" onclick="flipCard()">
    <div class="fc-inner">
      <div class="fc-front">
        <div class="fc-cat-tag">${fc.cat}</div>
        <div class="fc-label">▼ クリックで答えを表示</div>
        <div class="fc-question">${fc.q}</div>
        <div class="fc-hint">💡 タップまたはSpaceキーでめくる</div>
      </div>
      <div class="fc-back">
        <div class="fc-cat-tag">${fc.cat}</div>
        <div class="fc-label">✅ 答え</div>
        <div class="fc-answer">${fc.a}</div>
        ${fc.sub ? `<div class="fc-answer-sub">${fc.sub}</div>` : ''}
      </div>
    </div>
  </div>
</div>
<div class="fc-nav">
  <button class="btn btn-default" onclick="fcPrev()">◀ 前</button>
  <span class="fc-counter">${state.fcIndex + 1} / ${flashcards.length}</span>
  <button class="btn btn-primary" onclick="fcNext()">次 ▶</button>
  <button class="btn btn-default" onclick="fcShuffle()" style="margin-left:8px">🔀 シャッフル</button>
</div>
<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--muted)">
  <kbd style="font-family:'JetBrains Mono';font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px">Space</kbd> めくる ・
  <kbd style="font-family:'JetBrains Mono';font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px">←</kbd>
  <kbd style="font-family:'JetBrains Mono';font-size:10px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 5px">→</kbd> 前/次
</div>`;
}

function flipCard() { state.fcFlipped = !state.fcFlipped; render(); }
function fcNext() { state.fcIndex = (state.fcIndex + 1) % flashcards.length; state.fcFlipped = false; render(); }
function fcPrev() { state.fcIndex = (state.fcIndex - 1 + flashcards.length) % flashcards.length; state.fcFlipped = false; render(); }
function fcShuffle() {
  for (let i = flashcards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
  }
  state.fcIndex = 0; state.fcFlipped = false; render();
}

// --- NUMBER DRILL ---
function renderDrill() {
  const nd = numberDrill[state.ndIndex];
  const answered = state.ndAnswer !== null;
  const isCorrect = state.ndAnswer === nd.ans;
  const pct = state.ndTotal > 0 ? Math.round(state.ndCorrect / state.ndTotal * 100) : 0;
  
  return `
<div class="nd-score">
  <div class="nd-score-item"><div class="nd-score-num" style="color:var(--gold)">${state.ndTotal}</div><div class="nd-score-label">出題数</div></div>
  <div class="nd-score-item"><div class="nd-score-num" style="color:var(--green)">${state.ndCorrect}</div><div class="nd-score-label">正解</div></div>
  <div class="nd-score-item"><div class="nd-score-num" style="color:${pct>=70?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}">${pct}%</div><div class="nd-score-label">正解率</div></div>
</div>
${state.ndStreak >= 3 ? `<div class="nd-streak" style="text-align:center">🔥 ${state.ndStreak}連続正解！</div>` : ''}
<div class="nd-card">
  <div style="font-size:12px;color:var(--muted);margin-bottom:4px">この数値は何の基準？</div>
  <div class="nd-number">${nd.num}</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px">ヒント：${nd.hint}</div>
  <div class="nd-choices">
    ${nd.choices.map((ch,i) => {
      let cls = 'nd-choice';
      if (answered) {
        cls += ' nd-disabled';
        if (i === nd.ans) cls += ' nd-correct';
        else if (i === state.ndAnswer) cls += ' nd-wrong';
      }
      return `<button class="${cls}" onclick="ndAnswer(${i})">${ch}</button>`;
    }).join('')}
  </div>
  ${answered ? `<div style="margin-top:14px;font-size:13px;color:${isCorrect?'var(--green)':'var(--red)'}">
    ${isCorrect ? '✅ 正解！' : '❌ 不正解 → 正解：' + nd.choices[nd.ans]}
  </div>
  <button class="btn btn-primary" onclick="ndNext()" style="margin-top:12px;width:100%">次の数値 ▶</button>` : ''}
</div>
<div style="text-align:center;margin-top:12px">
  <button class="btn btn-default" onclick="ndReset()">スコアリセット</button>
</div>`;
}

function ndAnswer(i) {
  if (state.ndAnswer !== null) return;
  state.ndAnswer = i;
  state.ndTotal++;
  if (i === numberDrill[state.ndIndex].ans) { state.ndCorrect++; state.ndStreak++; }
  else { state.ndStreak = 0; }
  render();
}

function ndNext() {
  state.ndIndex = (state.ndIndex + 1) % numberDrill.length;
  if (state.ndIndex === 0) {
    // Shuffle when cycling
    for (let i = numberDrill.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [numberDrill[i], numberDrill[j]] = [numberDrill[j], numberDrill[i]];
    }
  }
  state.ndAnswer = null;
  render();
}

function ndReset() { state.ndCorrect = 0; state.ndTotal = 0; state.ndStreak = 0; state.ndAnswer = null; render(); }

function cpmInput(key, val) { state.cpmAnswers[key] = val; }
function cpmCheck() { state.cpmChecked = true; render(); }
function cpmNext() {
  state.cpmIndex = (state.cpmIndex + 1) % cpmProblems.length;
  state.cpmChecked = false; state.cpmAnswers = {}; render();
}

  state.cpmIndex = (state.cpmIndex - 1 + cpmProblems.length) % cpmProblems.length;
  state.cpmChecked = false; state.cpmAnswers = {}; render();
}

// --- FIB (Fill-in-blank) ---
function renderFIB() {
  const p = fibProblems[state.fibIndex];
  const answered = state.fibAnswer !== null;
  const pct = state.fibTotal > 0 ? Math.round(state.fibCorrect / state.fibTotal * 100) : 0;
  
  // Build display text with blanks
  let displayText = p.text;
  p.blanks.forEach((b, i) => {
    const marker = `【${String.fromCharCode(9312+i)}】`;
    const revealed = answered ? `<span class="fib-blank revealed">${b}</span>` : `<span class="fib-blank">？</span>`;
    displayText = displayText.replace(marker, revealed);
  });
  
  return `
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <span style="font-size:12px;color:var(--muted)">問題 ${state.fibIndex+1} / ${fibProblems.length}　｜　${p.cat}</span>
  <span style="font-size:12px;color:var(--muted)">正解率 <b style="color:var(--gold)">${pct}%</b>（${state.fibCorrect}/${state.fibTotal}）</span>
</div>
<div class="fib-card">
  <div style="font-size:11px;color:var(--gold);font-weight:600;margin-bottom:10px">${p.cat}</div>
  <div class="fib-text">${displayText}</div>
  
  ${!answered ? `
  <div style="font-size:12px;color:var(--muted);margin-top:14px;margin-bottom:8px">正しい語句の組み合わせを選んでください：</div>
  <div class="fib-choices">
    ${p.choices.map((ch,i) => {
      return `<button class="fib-choice" onclick="fibAnswer(${i})">${ch}</button>`;
    }).join('')}
  </div>` : `
  <div style="margin-top:14px;padding:12px 14px;border-radius:8px;background:${state.fibAnswer===0?'var(--green-bg)':'var(--red-bg)'};border:1px solid ${state.fibAnswer===0?'var(--green)':'var(--red)'}">
    <div style="font-size:13px;font-weight:700;color:${state.fibAnswer===0?'var(--green)':'var(--red)'}">${state.fibAnswer===0?'✅ 正解！':'❌ 不正解'}</div>
    <div style="font-size:12px;color:var(--sub);margin-top:4px">正解：<b>${p.blanks.join('、')}</b></div>
  </div>
  <button class="btn btn-primary" onclick="fibNext()" style="margin-top:12px;width:100%">次の問題 ▶</button>
  `}
</div>
<div class="nav-row">
  <button class="btn btn-default" onclick="fibPrev()">◀ 前</button>
  <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${((state.fibIndex+1)/fibProblems.length)*100}%;background:var(--gold)"></div></div>
  <button class="btn btn-default" onclick="fibNext()">次 ▶</button>
</div>`;
}

function fibAnswer(i) {
  // For simplicity: choice index 0 maps to first blank value match
  // We check if the selected choice is one of the blanks
  const p = fibProblems[state.fibIndex];
  const selected = p.choices[i];
  const isCorrect = p.blanks.includes(selected);
  state.fibAnswer = isCorrect ? 0 : 1;
  state.fibTotal++;
  if (isCorrect) state.fibCorrect++;
  render();
}

function fibNext() {
  state.fibIndex = (state.fibIndex + 1) % fibProblems.length;
  state.fibAnswer = null; render();
}
function fibPrev() {
  state.fibIndex = (state.fibIndex - 1 + fibProblems.length) % fibProblems.length;
  state.fibAnswer = null; render();
}

// --- NUMBER MASTER ---
function renderNumMaster() {
  const cats = Object.keys(numMasterData);
  const selCat = state.nmCat;
  
  if (!selCat) {
    // Show category selection
    const totalItems = Object.values(numMasterData).reduce((s,arr) => s + arr.length, 0);
    return `
<div style="font-size:13px;color:var(--sub);margin-bottom:14px;line-height:1.7">
  全<b style="color:var(--gold)">${totalItems}項目</b>の数値を分野別に完全マスター。カテゴリを選んでドリル開始！
</div>
<div class="nm-cat-grid">
  ${cats.map(cat => {
    const items = numMasterData[cat];
    return `<div class="nm-cat-card" onclick="startNumMaster('${cat}')">
      <div class="nm-cat-title">${cat}</div>
      <div class="nm-cat-count">${items.length}項目</div>
    </div>`;
  }).join('')}
</div>
<div style="margin-top:14px">
  <button class="btn btn-primary" onclick="startNumMasterAll()" style="width:100%">🔥 全カテゴリ一括チャレンジ（${totalItems}項目）</button>
</div>
<div style="margin-top:10px;text-align:center;font-size:12px;color:var(--muted)">正解率 <b style="color:var(--gold)">${state.nmTotal2>0?Math.round(state.nmCorrect2/state.nmTotal2*100):0}%</b>（${state.nmCorrect2}/${state.nmTotal2}）</div>`;
  }
  
  // Active drill
  const items = state._nmItems || numMasterData[selCat];
  if (!items || items.length === 0) { state.nmCat = null; return renderNumMaster(); }
  const idx = Math.min(state.nmIndex, items.length - 1);
  const item = items[idx];
  const answered = state.nmAnswer !== null;
  
  // Generate 3 wrong answers from other items
  const allItems = Object.values(numMasterData).flat();
  const wrongs = allItems.filter(x => x.num !== item.num).sort(() => Math.random()-0.5).slice(0,3);
  const choices = [item, ...wrongs].sort(() => Math.random()-0.5);
  // Store shuffled choices in state to prevent re-shuffle on render
  if (!state._nmChoices || state._nmChoicesFor !== idx) {
    state._nmChoices = choices;
    state._nmChoicesFor = idx;
  }
  
  return `
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <div>
    <button class="btn btn-default" onclick="state.nmCat=null;state._nmItems=null;render()" style="padding:6px 12px;font-size:12px">← カテゴリ選択に戻る</button>
    <span style="font-size:12px;color:var(--muted);margin-left:8px">${selCat}</span>
  </div>
  <span style="font-size:12px;color:var(--muted)">${idx+1} / ${items.length}</span>
</div>
<div class="nd-card">
  <div style="font-size:12px;color:var(--muted);margin-bottom:8px">この基準値の数値は？</div>
  <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.6">${item.q}</div>
  <div class="nd-choices">
    ${state._nmChoices.map((ch,i) => {
      let cls = 'nd-choice';
      if (answered) {
        cls += ' nd-disabled';
        if (ch.num === item.num) cls += ' nd-correct';
        else if (i === state.nmAnswer && ch.num !== item.num) cls += ' nd-wrong';
      }
      return `<button class="${cls}" onclick="nmAnswer(${i},'${ch.num}','${item.num}')">${ch.num}</button>`;
    }).join('')}
  </div>
  ${answered ? `<button class="btn btn-primary" onclick="nmNext()" style="margin-top:12px;width:100%">次へ ▶</button>` : ''}
</div>`;
}

function startNumMaster(cat) {
  state.nmCat = cat; state.nmIndex = 0; state.nmAnswer = null;
  state._nmItems = [...numMasterData[cat]].sort(() => Math.random()-0.5);
  state._nmChoices = null; render();
}
function startNumMasterAll() {
  state.nmCat = '全カテゴリ'; state.nmIndex = 0; state.nmAnswer = null;
  state._nmItems = Object.values(numMasterData).flat().sort(() => Math.random()-0.5);
  state._nmChoices = null; render();
}
function nmAnswer(i, selected, correct) {
  if (state.nmAnswer !== null) return;
  state.nmAnswer = i;
  state.nmTotal2++;
  if (selected === correct) state.nmCorrect2++;
  render();
}
function nmNext() {
  const items = state._nmItems || [];
  if (state.nmIndex >= items.length - 1) {
    state.nmCat = null; state._nmItems = null;
  } else {
    state.nmIndex++;
  }
  state.nmAnswer = null; state._nmChoices = null; render();
}



// =================== CONFUSABLE NUMBERS ===================
