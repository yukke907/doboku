<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>1級土木施工管理技士 試験対策 - Desktop Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f4f6fb;
    --bg3: #edf0f7;
    --bg4: #e4e9f4;
    --sidebar: #f0f3fa;
    --border: #d0d8ea;
    --border2: #b8c4d8;
    --gold: #b87820;
    --gold2: #9a6010;
    --gold-glow: rgba(184,120,32,0.10);
    --text: #1a2030;
    --muted: #5a6880;
    --sub: #2e3f5a;
    --green: #1a9e50;
    --green-bg: rgba(26,158,80,0.08);
    --red: #c82020;
    --red-bg: rgba(200,32,32,0.08);
    --blue: #1a72c8;
    --blue-bg: rgba(26,114,200,0.08);
    --orange: #c86010;
    --orange-bg: rgba(200,96,16,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; font-size: 16px; }

  /* === LAYOUT === */
  #app { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px; min-width: 260px; background: var(--sidebar);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    user-select: none;
  }
  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(240,176,64,0.06) 0%, transparent 100%);
  }
  .sidebar-header h1 {
    font-size: 17px; font-weight: 900; color: var(--gold);
    letter-spacing: 0.5px; line-height: 1.4;
  }
  .sidebar-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* COUNTDOWN in sidebar */
  .cd-row { display: flex; gap: 6px; margin-top: 12px; }
  .cd-box {
    flex: 1; background: var(--bg3); border: 1px solid rgba(240,176,64,0.25);
    border-radius: 6px; padding: 6px 4px; text-align: center;
  }
  .cd-num { font-size: 20px; font-weight: 900; color: var(--gold); display: block; line-height: 1; font-family: 'JetBrains Mono', monospace; }
  .cd-label { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* NAV */
  .nav-list { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--muted);
    transition: all 0.15s; margin-bottom: 2px; border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg4); color: var(--sub); }
  .nav-item.active {
    background: var(--gold-glow); color: var(--gold);
    border-color: rgba(240,176,64,0.2); font-weight: 700;
  }
  .nav-item .nav-icon { font-size: 18px; width: 24px; text-align: center; }
  .nav-item .nav-key {
    margin-left: auto; font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px; color: var(--muted);
  }

  /* SIDEBAR STATS */
  .sidebar-stats {
    padding: 14px 16px; border-top: 1px solid var(--border);
    background: rgba(240,176,64,0.03);
  }
  .sidebar-stats .ss-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; margin-bottom: 4px;
  }
  .sidebar-stats .ss-label { color: var(--muted); }
  .sidebar-stats .ss-val { color: var(--gold); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* === MAIN CONTENT === */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header {
    padding: 16px 32px 14px; border-bottom: 1px solid var(--border);
    background: var(--bg2); display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .main-header h2 { font-size: 20px; font-weight: 700; color: var(--text); }
  .main-header .subtitle { font-size: 14px; color: var(--muted); margin-top: 2px; }

  .content {
    flex: 1; overflow-y: auto; padding: 24px 32px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* === CARDS === */
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }
  .card-title {
    font-size: 16px; font-weight: 700; color: var(--gold);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }

  /* === HOME: STAT GRID === */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: var(--bg3); border-radius: 10px; padding: 16px 14px;
    text-align: center; border: 1px solid var(--border);
    transition: border-color 0.2s, transform 0.15s;
  }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .stat-num { font-size: 32px; font-weight: 900; display: block; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* PROGRESS BAR */
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  /* BADGES */
  .badge { display: inline-block; font-size: 10px; font-weight: 700; border-radius: 3px; padding: 2px 6px; margin-right: 6px; color: #fff; }
  .badge-S { background: var(--red); }
  .badge-A { background: var(--orange); }
  .badge-B { background: var(--blue); }

  /* INFO TABLE */
  .info-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .info-key { color: var(--muted); }
  .info-val { color: var(--text); font-weight: 600; text-align: right; max-width: 60%; }

  /* PRIORITY ITEMS */
  .priority-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .priority-item { padding: 12px; background: var(--bg3); border-radius: 8px; border: 1px solid var(--border); }
  .priority-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .priority-name { font-size: 12px; font-weight: 600; color: var(--sub); }
  .priority-note { font-size: 10px; color: var(--muted); }

  /* === CURRICULUM === */
  .week-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .week-card:hover { border-color: var(--border2); }
  .week-card.open { border-color: rgba(240,176,64,0.4); }
  .week-header {
    padding: 14px 20px; display: flex; justify-content: space-between;
    align-items: center; cursor: pointer; transition: background 0.15s;
  }
  .week-header:hover { background: rgba(240,176,64,0.03); }
  .week-title { font-size: 15px; font-weight: 600; color: var(--sub); }
  .week-meta { font-size: 12px; color: var(--muted); text-align: right; }
  .week-meta span { color: var(--gold); font-weight: 600; }
  .week-body { padding: 4px 20px 16px; }

  /* TOPIC DETAILS */
  .topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 1200px) { .topic-grid { grid-template-columns: 1fr; } }
  .topic-block { border-radius: 8px; overflow: hidden; }
  .topic-head {
    font-size: 14px; color: var(--sub); padding: 10px 14px;
    border-left: 3px solid var(--gold); background: rgba(240,176,64,0.03);
    cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; transition: all 0.15s; border-radius: 6px;
  }
  .topic-head:hover { background: rgba(240,176,64,0.06); }
  .topic-head.active { color: var(--gold); background: rgba(240,176,64,0.08); font-weight: 600; border-radius: 6px 6px 0 0; }
  .topic-arrow { font-size: 10px; color: var(--muted); margin-left: 8px; transition: transform 0.2s; }
  .topic-head.active .topic-arrow { transform: rotate(180deg); }
  .topic-detail {
    background: var(--bg3); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px; padding: 16px 18px;
    animation: fadeSlide 0.2s ease;
  }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .detail-section { margin-bottom: 10px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-label { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 4px; letter-spacing: 0.3px; }
  .detail-text { font-size: 14px; color: var(--sub); line-height: 1.8; }
  .detail-text .num { color: var(--red); font-weight: 700; }
  .detail-text .hl { color: var(--gold); font-weight: 600; }
  .detail-text .grn { color: var(--green); font-weight: 600; }
  .detail-tip {
    font-size: 12px; color: var(--orange); background: var(--orange-bg);
    border: 1px solid rgba(232,140,48,0.2); border-radius: 6px;
    padding: 10px 14px; margin-top: 8px; line-height: 1.7;
  }
  .detail-tip::before { content: "💡 "; }
  .detail-formula {
    font-size: 14px; color: var(--sub); background: var(--blue-bg);
    border: 1px solid rgba(64,152,232,0.2); border-radius: 6px;
    padding: 10px 14px; margin: 6px 0; font-family: 'JetBrains Mono', 'Noto Sans JP', monospace;
    line-height: 1.8;
  }

  /* === KEY POINTS === */
  .kp-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .kp-card:hover { border-color: var(--border2); }
  .kp-card.open { border-color: rgba(240,176,64,0.4); }
  .kp-header {
    padding: 14px 20px; display: flex; justify-content: space-between;
    align-items: center; cursor: pointer; transition: background 0.15s;
  }
  .kp-header:hover { background: rgba(240,176,64,0.03); }
  .kp-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .kp-body { padding: 4px 16px 16px; }
  .kp-items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 1100px) { .kp-items-grid { grid-template-columns: 1fr; } }
  .item-card {
    border-radius: 8px; padding: 14px 16px; background: var(--bg3);
    border: 1px solid var(--border); transition: border-color 0.15s;
  }
  .item-card:hover { border-color: var(--border2); }
  .item-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .item-text { font-size: 13px; color: var(--muted); line-height: 1.8; }

  /* === QUIZ === */
  .quiz-layout { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
  @media (max-width: 1100px) { .quiz-layout { grid-template-columns: 1fr; } }

  .quiz-main { }
  .quiz-sidebar-panel { }

  .score-box {
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 10px; padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .score-num { font-size: 28px; font-weight: 900; color: var(--gold); font-family: 'JetBrains Mono', monospace; }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--muted); font-size: 12px;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--sub); }
  .filter-btn.active {
    border-color: var(--gold); background: var(--gold); color: var(--bg);
    font-weight: 700;
  }

  .q-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 14px;
  }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .q-cat { font-size: 12px; background: var(--bg3); color: var(--gold); padding: 4px 10px; border-radius: 4px; font-weight: 600; }
  .q-diff { font-size: 13px; color: var(--gold); }
  .q-counter { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.8; color: var(--text); margin-bottom: 18px; }

  .choice-btn {
    width: 100%; text-align: left; border-radius: 8px; padding: 13px 16px;
    margin-bottom: 8px; font-size: 15px; cursor: pointer;
    transition: all 0.15s; line-height: 1.6;
    border: 1px solid var(--border); background: var(--bg3); color: var(--sub);
    font-family: 'Noto Sans JP', sans-serif; position: relative;
  }
  .choice-btn:hover:not(.disabled) { border-color: var(--border2); background: var(--bg4); }
  .choice-btn .key-hint {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 5px; color: var(--muted);
  }
  .choice-btn.correct { background: rgba(52,199,112,0.1); border-color: var(--green); color: #5fe090; }
  .choice-btn.wrong { background: rgba(232,72,72,0.1); border-color: var(--red); color: var(--red); }
  .choice-btn.disabled { cursor: default; }

  .exp-box {
    background: var(--bg3); border: 1px solid var(--green);
    border-radius: 10px; padding: 16px 18px; margin-top: 8px;
    animation: fadeSlide 0.2s ease;
  }
  .exp-box.wrong { border-color: var(--red); }
  .exp-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
  .exp-title.wrong { color: var(--red); }
  .exp-text { font-size: 14px; color: var(--muted); line-height: 1.8; }

  .nav-row {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .btn {
    padding: 10px 20px; border-radius: 6px; border: none;
    font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--gold); color: var(--bg); }
  .btn-primary:hover { background: var(--gold2); }
  .btn-default { background: var(--bg4); color: var(--text); border: 1px solid var(--border); }
  .btn-default:hover { border-color: var(--border2); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #d03838; }

  /* Quiz sidebar panel */
  .qs-panel {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; position: sticky; top: 0;
  }
  .qs-title { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
  .qs-grid {
    display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;
  }
  .qs-dot {
    width: 100%; aspect-ratio: 1; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg3); cursor: pointer; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    transition: all 0.1s;
  }
  .qs-dot:hover { border-color: var(--gold); }
  .qs-dot.current { border-color: var(--gold); background: var(--gold-glow); color: var(--gold); font-weight: 700; }
  .qs-dot.correct { background: rgba(52,199,112,0.15); border-color: rgba(52,199,112,0.4); color: var(--green); }
  .qs-dot.wrong { background: rgba(232,72,72,0.15); border-color: rgba(232,72,72,0.4); color: var(--red); }
  .qs-legend { display: flex; gap: 12px; margin-top: 10px; font-size: 10px; color: var(--muted); }
  .qs-legend span::before {
    content: ''; display: inline-block; width: 8px; height: 8px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  .qs-legend .leg-ok::before { background: var(--green); }
  .qs-legend .leg-ng::before { background: var(--red); }
  .qs-legend .leg-cur::before { background: var(--gold); }

  /* Keyboard shortcut hint bar */
  .kb-bar {
    padding: 8px 32px; border-top: 1px solid var(--border);
    background: var(--bg2); display: flex; gap: 16px; flex-shrink: 0;
    font-size: 11px; color: var(--muted);
  }
  .kb-bar kbd {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px; margin-right: 3px;
  }

  /* Two column home */
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 1100px) { .home-grid { grid-template-columns: 1fr; } }

  /* === PRIORITY LEARNING CARDS === */
  .pl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media (max-width: 1200px) { .pl-grid { grid-template-columns: repeat(2, 1fr); } }
  .pl-card {
    background: var(--bg3); border-radius: 10px; padding: 14px 16px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .pl-card:hover { transform: translateY(-2px); border-color: var(--border2); }
  .pl-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .pl-card.pl-s::before { background: var(--red); }
  .pl-card.pl-a::before { background: var(--orange); }
  .pl-card.pl-b::before { background: var(--blue); }
  .pl-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .pl-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .pl-rank {
    font-size: 11px; font-weight: 900; border-radius: 4px; padding: 2px 8px;
    flex-shrink: 0; margin-left: 8px;
  }
  .pl-rank-s { background: rgba(232,72,72,0.15); color: var(--red); border: 1px solid rgba(232,72,72,0.3); }
  .pl-rank-a { background: rgba(232,140,48,0.15); color: var(--orange); border: 1px solid rgba(232,140,48,0.3); }
  .pl-rank-b { background: rgba(64,152,232,0.15); color: var(--blue); border: 1px solid rgba(64,152,232,0.3); }
  .pl-rank-過 { background: rgba(155,89,182,0.15); color: #9b59b6; border: 1px solid rgba(155,89,182,0.3); }
  .pl-rank-★ { background: rgba(240,176,64,0.15); color: var(--gold); border: 1px solid rgba(240,176,64,0.3); }
  .pl-rank-横 { background: rgba(52,199,112,0.15); color: var(--green); border: 1px solid rgba(52,199,112,0.3); }
  .pl-stats { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .pl-pct {
    font-size: 22px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1;
  }
  .pl-pct-s { color: var(--red); }
  .pl-pct-a { color: var(--orange); }
  .pl-pct-b { color: var(--blue); }
  .pl-bar-wrap { flex: 1; }
  .pl-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .pl-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .pl-bar-fill-s { background: linear-gradient(90deg, var(--red), #f06060); }
  .pl-bar-fill-a { background: linear-gradient(90deg, var(--orange), #f0a050); }
  .pl-bar-fill-b { background: linear-gradient(90deg, var(--blue), #60b0f0); }
  .pl-bar-fill-過 { background: linear-gradient(90deg, #9b59b6, #bb77dd); }
  .pl-bar-fill-★ { background: linear-gradient(90deg, var(--gold), #f0c860); }
  .pl-bar-fill-横 { background: linear-gradient(90deg, var(--green), #60e090); }
  .pl-meta { display: flex; justify-content: space-between; align-items: center; }
  .pl-freq { font-size: 11px; color: var(--muted); }
  .pl-freq b { color: var(--sub); font-weight: 600; }
  .pl-tip { font-size: 10px; color: var(--muted); font-style: italic; }
  .pl-legend {
    display: flex; gap: 16px; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border); font-size: 11px; color: var(--muted);
  }
  .pl-legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .pl-legend-dot-s { background: var(--red); }
  .pl-legend-dot-a { background: var(--orange); }
  .pl-legend-dot-b { background: var(--blue); }

  /* ENHANCED PRIORITY CARDS */
  .pl-card-new {
    background: var(--bg3); border-radius: 10px; padding: 16px 18px;
    border: 1px solid var(--border); position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .pl-card-new:hover { border-color: var(--border2); }
  .pl-card-new::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  }
  .pl-card-new.pl-s::before { background: var(--red); }
  .pl-card-new.pl-a::before { background: var(--orange); }
  .pl-card-new.pl-b::before { background: var(--blue); }
  .pl-card-new.pl-過::before { background: #9b59b6; }
  .pl-card-new.pl-★::before { background: var(--gold); }
  .pl-card-new.pl-横::before { background: linear-gradient(180deg, var(--red), var(--blue)); }
  .pl-card-new.pl-★::before { background: var(--gold); }
  .pl-rank-★ { background: rgba(240,176,64,0.15); color: var(--gold); border: 1px solid rgba(240,176,64,0.3); }
  .pl-advice {
    font-size: 12px; line-height: 1.7; margin-top: 10px; padding: 10px 12px;
    border-radius: 6px; background: var(--bg); border: 1px solid var(--border);
  }
  .pl-advice-step { color: var(--sub); }
  .pl-advice-step::before { content: '→ '; color: var(--gold); font-weight: 700; }
  .pl-actions {
    display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
  }
  .pl-action-btn {
    padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--muted); font-size: 11px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .pl-action-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }
  .pl-status-tag {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    display: inline-block;
  }
  .pl-status-start { background: rgba(232,72,72,0.12); color: var(--red); }
  .pl-status-progress { background: rgba(232,140,48,0.12); color: var(--orange); }
  .pl-status-good { background: rgba(52,199,112,0.12); color: var(--green); }
  .pl-status-perfect { background: rgba(64,152,232,0.12); color: var(--blue); }

  /* === MEMORY TOOLS === */
  .mem-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .mem-tab {
    padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .mem-tab:hover { border-color: var(--border2); color: var(--sub); }
  .mem-tab.active { border-color: var(--gold); background: var(--gold-glow); color: var(--gold); }

  /* FLASHCARD */
  .fc-container { display: flex; justify-content: center; padding: 16px 0; }
  .fc-card {
    width: 520px; min-height: 260px; perspective: 1000px; cursor: pointer;
  }
  .fc-inner {
    position: relative; width: 100%; min-height: 260px;
    transition: transform 0.5s cubic-bezier(.4,.2,.2,1); transform-style: preserve-3d;
  }
  .fc-card.flipped .fc-inner { transform: rotateY(180deg); }
  .fc-front, .fc-back {
    position: absolute; width: 100%; min-height: 260px; backface-visibility: hidden;
    border-radius: 14px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 28px 32px; text-align: center;
  }
  .fc-front {
    background: linear-gradient(135deg, var(--bg4), var(--bg2));
    border: 2px solid var(--border2);
  }
  .fc-back {
    background: linear-gradient(135deg, #e8f8f0, #d4f0e4);
    border: 2px solid rgba(26,158,80,0.3); transform: rotateY(180deg);
  }
  .fc-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .fc-question { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.6; }
  .fc-answer { font-size: 22px; font-weight: 900; color: var(--green); line-height: 1.5; }
  .fc-answer-sub { font-size: 13px; color: var(--sub); margin-top: 8px; line-height: 1.6; }
  .fc-hint { font-size: 11px; color: var(--muted); margin-top: 12px; }
  .fc-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 16px; }
  .fc-counter { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .fc-cat-tag { font-size: 10px; background: var(--bg3); color: var(--gold); padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; }

  /* NUMBER DRILL */
  .nd-card {
    max-width: 600px; margin: 0 auto; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; text-align: center;
  }
  .nd-number {
    font-size: 56px; font-weight: 900; color: var(--gold);
    font-family: 'JetBrains Mono', monospace; margin: 16px 0; line-height: 1;
  }
  .nd-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
  .nd-choice {
    padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--sub); font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; text-align: center; line-height: 1.5;
  }
  .nd-choice:hover:not(.nd-disabled) { border-color: var(--border2); background: var(--bg4); }
  .nd-choice.nd-correct { background: rgba(52,199,112,0.12); border-color: var(--green); color: var(--green); }
  .nd-choice.nd-wrong { background: rgba(232,72,72,0.12); border-color: var(--red); color: var(--red); }
  .nd-choice.nd-disabled { cursor: default; }
  .nd-score { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; }
  .nd-score-item { text-align: center; }
  .nd-score-num { font-size: 28px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }
  .nd-score-label { font-size: 10px; color: var(--muted); }
  .nd-streak { font-size: 12px; color: var(--orange); margin-top: 8px; }

  /* CHECKLIST */
  .cl-section { margin-bottom: 16px; }
  .cl-section-title {
    font-size: 14px; font-weight: 700; padding: 10px 14px;
    border-radius: 8px 8px 0 0; display: flex; align-items: center; gap: 8px;
  }
  .cl-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cl-table th { background: var(--bg4); color: var(--muted); font-weight: 600; padding: 7px 12px; text-align: left; border: 1px solid var(--border); }
  .cl-table td { padding: 7px 12px; border: 1px solid var(--border); color: var(--sub); }
  .cl-table td:first-child { font-weight: 600; color: var(--text); white-space: nowrap; }
  .cl-table .cl-num { color: var(--red); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .cl-table tr:hover td { background: rgba(240,176,64,0.03); }

  /* === EXPERT MODE === */
  .ex-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .ex-tab {
    padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--muted); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .ex-tab:hover { border-color: var(--border2); color: var(--sub); }
  .ex-tab.active { border-color: var(--gold); background: var(--gold-glow); color: var(--gold); }

  /* CPM TRAINER */
  .cpm-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 14px;
  }
  .cpm-diagram {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; margin: 14px 0; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 2.2; color: var(--sub); overflow-x: auto;
  }
  .cpm-diagram .node {
    display: inline-block; width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg4); border: 2px solid var(--gold); color: var(--gold);
    text-align: center; line-height: 24px; font-weight: 700; font-size: 13px; margin: 0 2px;
  }
  .cpm-diagram .arrow { color: var(--muted); margin: 0 2px; }
  .cpm-diagram .dur { color: var(--blue); font-weight: 700; }
  .cpm-diagram .cp-hl { color: var(--red); font-weight: 700; }
  .cpm-input-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px; margin: 12px 0;
  }
  .cpm-input-item {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
  }
  .cpm-input-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .cpm-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px;
    padding: 6px 8px; text-align: center; outline: none;
  }
  .cpm-input:focus { border-color: var(--gold); }
  .cpm-input.cpm-ok { border-color: var(--green); background: rgba(52,199,112,0.08); }
  .cpm-input.cpm-ng { border-color: var(--red); background: rgba(232,72,72,0.08); }
  .cpm-result { padding: 14px 16px; border-radius: 8px; margin-top: 12px; font-size: 13px; line-height: 1.8; }
  .cpm-result.ok { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }
  .cpm-result.ng { background: var(--red-bg); border: 1px solid var(--red); color: var(--sub); }

  /* FILL-IN-BLANK */
  .fib-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; margin-bottom: 14px;
  }
  .fib-text { font-size: 15px; line-height: 2.0; color: var(--sub); }
  .fib-blank {
    display: inline-block; min-width: 80px; border-bottom: 2px dashed var(--gold);
    text-align: center; font-weight: 700; color: var(--gold); padding: 0 4px; margin: 0 2px;
  }
  .fib-blank.revealed { border-bottom-style: solid; }
  .fib-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .fib-choice {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--sub); font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; text-align: center;
  }
  .fib-choice:hover:not(.fib-disabled) { border-color: var(--border2); }
  .fib-choice.fib-correct { background: rgba(52,199,112,0.12); border-color: var(--green); color: var(--green); }
  .fib-choice.fib-wrong { background: rgba(232,72,72,0.12); border-color: var(--red); color: var(--red); }
  .fib-choice.fib-disabled { cursor: default; opacity: 0.7; }

  /* NUMBER MASTER */
  .nm-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .nm-cat-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; cursor: pointer; transition: all 0.15s;
  }
  .nm-cat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .nm-cat-card.nm-active { border-color: var(--gold); background: var(--gold-glow); }
  .nm-cat-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .nm-cat-count { font-size: 11px; color: var(--muted); }

  /* CONFUSABLE NUMBERS TABLE */
  .cn-pair {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 0;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 10px;
  }
  .cn-left, .cn-right {
    padding: 14px 16px;
  }
  .cn-left { background: rgba(232,72,72,0.04); }
  .cn-right { background: rgba(64,152,232,0.04); }
  .cn-vs {
    display: flex; align-items: center; justify-content: center;
    background: var(--bg3); padding: 0 12px; font-size: 14px; font-weight: 900;
    color: var(--gold); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }
  .cn-val { font-size: 22px; font-weight: 900; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
  .cn-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .cn-tip { font-size: 11px; color: var(--orange); background: var(--orange-bg); border: 1px solid rgba(232,140,48,0.2); border-radius: 6px; padding: 8px 12px; margin-top: 6px; }
  .cn-tip::before { content: "💡 "; }

  /* TECHNIQUE GUIDE */
  .tg-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px; margin-bottom: 12px;
  }
  .tg-title { font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .tg-text { font-size: 13px; color: var(--sub); line-height: 1.9; }
  .tg-example {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin: 8px 0; font-size: 12px; color: var(--sub); line-height: 1.8;
  }
  .tg-example .tg-q { color: var(--text); font-weight: 600; }
  .tg-example .tg-ok { color: var(--green); }
  .tg-example .tg-ng { color: var(--red); text-decoration: line-through; }
  .tg-do { color: var(--green); font-weight: 600; }
  .tg-dont { color: var(--red); font-weight: 600; }

  /* ===================================================
     MOBILE STYLES (max-width: 768px)
     - サイドバーを非表示にしてボトムナビに置き換え
     - グリッドを1列化、パディング縮小、タップ領域拡大
  =================================================== */

  /* モバイル用ボトムナビ（デフォルト非表示） */
  .mobile-bottom-nav {
    display: none;
  }

  /* モバイル用トップバー（デフォルト非表示） */
  .mobile-top-bar {
    display: none;
  }

  @media (max-width: 768px) {
    /* body/htmlのoverflowをリセット */
    html, body { overflow: hidden; height: 100%; font-size: 15px; }

    /* アプリ全体レイアウト */
    #app { flex-direction: column; height: 100vh; }

    /* サイドバー非表示 */
    .sidebar { display: none; }

    /* メインエリアを全幅に */
    .main { width: 100%; height: 100%; }

    /* トップヘッダー調整 */
    .main-header {
      padding: 10px 16px 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .main-header h2 { font-size: 16px; }
    .main-header .subtitle { font-size: 12px; }

    /* コンテンツのパディングと下余白（ボトムナビ分） */
    .content {
      padding: 14px 14px 80px;
      -webkit-overflow-scrolling: touch;
    }

    /* キーボードショートカットバー非表示 */
    .kb-bar { display: none; }

    /* ===== ボトムナビゲーション ===== */
    .mobile-bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--sidebar);
      border-top: 1px solid var(--border);
      z-index: 1000;
      height: 60px;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .mob-nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4px 2px; cursor: pointer;
      color: var(--muted); font-size: 9px; font-weight: 600;
      border: none; background: none;
      font-family: 'Noto Sans JP', sans-serif;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      gap: 2px;
    }
    .mob-nav-item .mob-icon { font-size: 20px; line-height: 1; }
    .mob-nav-item.active { color: var(--gold); }
    .mob-nav-item:active { opacity: 0.7; }

    /* ===== カード・グリッドのレスポンシブ化 ===== */
    .stat-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px; }
    .home-grid { grid-template-columns: 1fr !important; }
    .priority-grid { grid-template-columns: 1fr !important; }
    .topic-grid { grid-template-columns: 1fr !important; }
    .kp-items-grid { grid-template-columns: 1fr !important; }
    .quiz-layout { grid-template-columns: 1fr !important; }
    .pl-grid { grid-template-columns: 1fr !important; }
    .nm-cat-grid { grid-template-columns: 1fr !important; }
    .fib-choices { grid-template-columns: 1fr !important; }
    .nd-choices { grid-template-columns: 1fr !important; }
    .cpm-input-grid { grid-template-columns: 1fr 1fr !important; }

    /* フラッシュカード */
    .fc-card { width: 100%; }
    .fc-question { font-size: 16px; }
    .fc-answer { font-size: 18px; }

    /* クイズ問題テキスト */
    .q-text { font-size: 15px; }
    .choice-btn { padding: 14px 16px; font-size: 14px; min-height: 52px; }
    .choice-btn .key-hint { display: none; } /* スマホではキーヒント非表示 */

    /* カードパディング縮小 */
    .card { padding: 14px; }
    .week-header { padding: 12px 14px; }
    .week-body { padding: 4px 14px 14px; }
    .kp-header { padding: 12px 14px; }
    .kp-body { padding: 4px 12px 14px; }
    .q-card { padding: 16px; }
    .tg-card { padding: 14px 16px; }
    .cpm-card { padding: 16px; }
    .fib-card { padding: 16px; }
    .exp-box { padding: 12px 14px; }

    /* 数値ドリルのスコア */
    .nd-score { gap: 16px; }
    .nd-score-num { font-size: 22px; }
    .score-box { padding: 12px 14px; }

    /* メムタブ */
    .mem-tabs { flex-wrap: wrap; gap: 6px; }
    .mem-tab { padding: 8px 12px; font-size: 12px; }
    .ex-tabs { flex-wrap: wrap; }
    .ex-tab { padding: 8px 12px; font-size: 12px; }

    /* フィルターボタン */
    .filter-row { gap: 6px; }
    .filter-btn { padding: 8px 12px; font-size: 13px; min-height: 40px; }

    /* ボタン */
    .btn { padding: 12px 18px; font-size: 14px; min-height: 46px; }
    .nav-row { flex-wrap: wrap; gap: 8px; }

    /* 数値ドリルのカード */
    .nd-card { padding: 20px 16px; }
    .nd-number { font-size: 44px; }
    .nd-choice { padding: 14px 12px; font-size: 14px; min-height: 52px; }

    /* 優先学習カード */
    .pl-pct { font-size: 18px; }
    .pl-actions { gap: 8px; }
    .pl-action-btn { padding: 8px 12px; font-size: 12px; }

    /* qs-panel（クイズサイドパネル）非表示 */
    .quiz-sidebar-panel { display: none; }

    /* confusable numbersの左右配置維持 */
    .cn-pair { grid-template-columns: 1fr auto 1fr; }
    .cn-val { font-size: 18px; }

    /* チェックリストテーブル */
    .cl-table { font-size: 11px; }
    .cl-table th, .cl-table td { padding: 6px 8px; }
    .cl-section-title { font-size: 13px; }

    /* ステータスバーとホームグリッド統計 */
    .stat-num { font-size: 26px; }
    .stat-label { font-size: 12px; }

    /* sidebar-statsをホームページ内に移動したように見せる */
    .sidebar-stats { display: none; }

    /* 模擬試験関連 */
    .qs-panel { display: none; }
  }

  /* iPhone SE等の小画面 */
  @media (max-width: 375px) {
    .mob-nav-item { font-size: 8px; }
    .mob-icon { font-size: 18px !important; }
    .content { padding: 12px 10px 80px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .nd-number { font-size: 36px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- MOBILE BOTTOM NAV -->
  <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
    <button class="mob-nav-item active" onclick="switchTabMobile('home')" id="mob-home">
      <span class="mob-icon">🏠</span>ホーム
    </button>
    <button class="mob-nav-item" onclick="switchTabMobile('curriculum')" id="mob-curriculum">
      <span class="mob-icon">📅</span>計画
    </button>
    <button class="mob-nav-item" onclick="switchTabMobile('keypoints')" id="mob-keypoints">
      <span class="mob-icon">🔑</span>要点
    </button>
    <button class="mob-nav-item" onclick="switchTabMobile('quiz')" id="mob-quiz">
      <span class="mob-icon">📝</span>演習
    </button>
    <button class="mob-nav-item" onclick="switchTabMobile('mock')" id="mob-mock">
      <span class="mob-icon">🎯</span>模試
    </button>

      <span class="mob-icon">🧠</span>暗記
    </button>
    <button class="mob-nav-item" onclick="switchTabMobile('expert')" id="mob-expert">
      <span class="mob-icon">🏆</span>上級
    </button>
  </nav>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>🏗️ 1級土木施工管理技士</h1>
      <p>学科試験対策アプリ ─ Desktop Edition</p>
      <div class="cd-row">
        <div class="cd-box"><span class="cd-num" id="cd-days">--</span><span class="cd-label">日</span></div>
        <div class="cd-box"><span class="cd-num" id="cd-hours">--</span><span class="cd-label">時間</span></div>
        <div class="cd-box"><span class="cd-num" id="cd-mins">--</span><span class="cd-label">分</span></div>
        <div class="cd-box"><span class="cd-num" id="cd-secs">--</span><span class="cd-label">秒</span></div>
      </div>
    </div>
    <div class="nav-list">
      <div class="nav-item active" onclick="switchTab('home',this)" id="nav-home">
        <span class="nav-icon">🏠</span> ホーム <span class="nav-key">1</span>
      </div>
      <div class="nav-item" onclick="switchTab('curriculum',this)" id="nav-curriculum">
        <span class="nav-icon">📅</span> 学習計画 <span class="nav-key">2</span>
      </div>
      <div class="nav-item" onclick="switchTab('keypoints',this)" id="nav-keypoints">

<script>
// =================== DATA ===================
const curriculum=[{week:1,title:"土質・基礎工学",dates:"〜4/20",priority:"S",hours:12,topics:[{name:"土の基本的性質（粒度・コンシステンシー）",detail:{points:"土は粒径により<span class='hl'>礫</span>（2mm以上）、<span class='hl'>砂</span>（0.075〜2mm）、<span class='hl'>シルト</span>（0.005〜0.075mm）、<span class='hl'>粘土</span>（0.005mm以下）に区分されます。粒度分布の良否は<span class='hl'>均等係数Uc</span>と<span class='hl'>曲率係数Uc'</span>で判定します。",formula:"均等係数 Uc = D<sub>60</sub> / D<sub>10</sub><br>Uc ≧ <span class='num'>10</span> → 良級配（粒度分布が良い）<br>塑性指数 PI = LL − PL<br>PI &gt; <span class='num'>17</span> → 膨張性粘土に注意",tip:"液性限界(LL)・塑性限界(PL)の試験方法と数値の意味は頻出。「液性限界＝含水比が高い方」と覚える。コンシステンシー指数Icの出題にも注意。"}},{name:"土の締固め・CBR試験",detail:{points:"締固めは土を密にして強度・安定性を高める作業です。<span class='hl'>締固め曲線</span>において、<span class='hl'>最適含水比wopt</span>で<span class='hl'>最大乾燥密度γdmax</span>が得られます。CBR（California Bearing Ratio）は路床・路盤の支持力を評価する指標です。",formula:"締固め度 Dc = γ<sub>d</sub> / γ<sub>dmax</sub> × 100<br>管理基準：Dc ≧ <span class='num'>90%</span>（土工）<br>CBR = 試験荷重 / 標準荷重 × 100<br>路床設計CBR ≧ <span class='num'>3</span>（最低基準）",tip:"締固め曲線の形状（含水比と乾燥密度の関係）はグラフで出題されることが多い。砂質土は粒度が良いほど締固めやすく、粘性土は含水比管理が重要。CBR試験は「貫入量2.5mmと5.0mmの大きい方」を採用することを覚えておく。"}},{name:"地盤調査（標準貫入試験・サウンディング）",detail:{points:"<span class='hl'>標準貫入試験（SPT）</span>は最も基本的な原位置試験です。<span class='num'>63.5kg</span>のハンマーを<span class='num'>76cm</span>から落下させ、サンプラーを<span class='num'>30cm</span>貫入させるのに要する打撃回数が<span class='hl'>N値</span>です。N値で地盤の硬軟・締まり具合を判定します。",formula:"N &lt; <span class='num'>4</span> → 軟弱地盤<br>N = <span class='num'>4〜10</span> → やや軟弱<br>N = <span class='num'>10〜30</span> → 中程度<br>N &gt; <span class='num'>50</span> → 非常に硬い（極密）",tip:"SPTの3つの数値「63.5kg・76cm・30cm」は必ず暗記。スウェーデン式サウンディング（SWS）は荷重1kN+回転で軟弱地盤調査に使用。ボーリング調査との違いも整理しておく。"}},{name:"基礎形式（直接基礎・杭基礎）",detail:{points:"基礎は<span class='hl'>直接基礎</span>（浅い基礎）と<span class='hl'>杭基礎</span>（深い基礎）に大別されます。直接基礎は支持層が浅い場合に用い、杭基礎は支持層が深い場合に使用します。杭には<span class='hl'>支持杭</span>（先端支持力主体）と<span class='hl'>摩擦杭</span>（周面摩擦力主体）があります。",formula:"直接基礎の支持力：<br>q<sub>u</sub> = αcN<sub>c</sub> + βγ₁BN<sub>γ</sub> + γ₂D<sub>f</sub>N<sub>q</sub><br>杭の支持力 = 先端支持力 + 周面摩擦力<br>R<sub>a</sub> = R<sub>p</sub> + R<sub>f</sub>",tip:"既成杭（PHC杭など）と場所打ち杭（オールケーシング・リバースサーキュレーション・アースドリル）の施工法の違いは頻出。ネガティブフリクション（負の周面摩擦力）も要注意。"}}]},{week:2,title:"コンクリート工学",dates:"4/21〜4/27",priority:"S",hours:14,topics:[{name:"コンクリートの配合設計",detail:{points:"配合設計は所要の<span class='hl'>強度</span>・<span class='hl'>耐久性</span>・<span class='hl'>ワーカビリティー</span>を満たすように、セメント・水・骨材・混和材料の割合を決める作業です。<span class='hl'>水セメント比(W/C)</span>が最も重要な指標で、小さいほど高強度・高耐久になります。",formula:"W/C 上限：<br>一般構造物 → <span class='num'>65%</span>以下<br>道路橋 → <span class='num'>55%</span>以下<br>海洋構造物 → <span class='num'>45%</span>以下<br>配合強度 f'<sub>cr</sub> = f'<sub>ck</sub> + 1.73σ（変動係数考慮）",tip:"W/Cの上限値は環境条件ごとの違いが頻出。「海洋＝45%・道路橋＝55%・一般＝65%」と段階的に覚える。単位水量は185kg/m³以下が目安。s/a（細骨材率）の意味も押さえる。"}},{name:"各種コンクリート（寒中・暑中・水中）",detail:{points:"特殊環境下のコンクリートには適用条件と管理基準があります。<span class='hl'>寒中コンクリート</span>は日平均気温<span class='num'>4℃以下</span>、<span class='hl'>暑中コンクリート</span>は日平均気温<span class='num'>25℃超</span>で適用されます。水中コンクリートは水中不分離性混和剤を使用します。",formula:"寒中：打設温度 <span class='num'>5〜20℃</span>、養生温度 <span class='num'>5℃以上</span>保持<br>暑中：練上がり温度 <span class='num'>35℃以下</span><br>マスコン：セメント水和熱による温度ひび割れ防止<br>　内部と表面の温度差 <span class='num'>20℃以下</span> に管理",tip:"寒中の「4℃以下」と暑中の「25℃超」はセットで暗記。寒中コンクリートの初期養生終了は圧縮強度5N/mm²以上。水中コンクリートのスランプは13〜18cmで水セメント比50%以下。"}},{name:"鉄筋のかぶり・継手・定着",detail:{points:"<span class='hl'>かぶり厚さ</span>は鉄筋を保護し耐久性を確保するための最小寸法です。<span class='hl'>継手</span>は鉄筋の接合部で、重ね継手・ガス圧接・機械式継手があります。<span class='hl'>定着</span>は鉄筋端部をコンクリートに固定する長さです。",formula:"最小かぶり厚さ：<br>土中 → <span class='num'>60mm</span>｜水中 → <span class='num'>70mm</span><br>屋外（柱・梁） → <span class='num'>40mm</span><br>屋内（柱・梁） → <span class='num'>30mm</span><br>ガス圧接：鉄筋径 <span class='num'>1.4倍</span>以上のふくらみ",tip:"かぶり厚さは土木学会の規定値を暗記。ガス圧接は「ふくらみの直径が鉄筋径の1.4倍以上、長さ1.1倍以上」が合格基準。重ね継手長は鉄筋径の20〜40倍が目安。継手位置は応力の小さい箇所に設ける。"}},{name:"コンクリートの耐久性・劣化機構",detail:{points:"コンクリートの主な劣化要因は<span class='hl'>中性化</span>・<span class='hl'>塩害</span>・<span class='hl'>凍害</span>・<span class='hl'>アルカリシリカ反応(ASR)</span>・<span class='hl'>化学的侵食</span>です。それぞれの機構を理解し、対策を覚えることが重要です。",formula:"中性化：CO₂がCa(OH)₂と反応 → pH低下 → 鉄筋腐食<br>塩害：Cl⁻が鉄筋まで浸透 → 不動態被膜破壊<br>凍害：凍結融解の繰り返し → スケーリング・ポップアウト<br>ASR：反応性骨材＋アルカリ → 膨張ひび割れ",tip:"中性化対策は「W/Cを小さく・かぶりを大きく」。塩害対策はW/C45%以下+防食鉄筋。凍害対策はAEコンクリート（空気量4.5%前後）。ASR対策は低アルカリセメントまたは高炉セメントB種の使用。"}}]},{week:3,title:"鋼構造・道路・舗装",dates:"4/28〜5/4",priority:"A",hours:10,topics:[{name:"鋼材の性質・溶接・ボルト接合",detail:{points:"土木構造用鋼材はSS400、SM490等が使用されます。<span class='hl'>溶接</span>では完全溶込み溶接と隅肉溶接が代表的です。<span class='hl'>高力ボルト接合</span>には摩擦接合・引張接合・支圧接合があり、摩擦接合が最も一般的です。",formula:"降伏点：SS400 → <span class='num'>245N/mm²以上</span><br>引張強さ：SS400 → <span class='num'>400〜510N/mm²</span><br>高力ボルト締付け軸力：<br>F10T（M22）→ 約<span class='num'>205kN</span>",tip:"溶接欠陥の種類（ブローホール・アンダーカット・溶込み不良・割れ）は頻出。高力ボルトはトルシア形が主流で、ピンテール破断で締付け完了を確認。摩擦面の処理（黒皮除去・すべり係数0.40以上）も重要。"}},{name:"道路の構成・路床・路盤設計",detail:{points:"道路舗装は上から<span class='hl'>表層→基層→上層路盤→下層路盤→路床</span>の5層構造です。路床は舗装の直下約<span class='num'>1m</span>の土を指し、設計CBRで舗装厚を決定します。路盤は粒状材料やセメント安定処理材で構築します。",formula:"路床設計CBR ≧ <span class='num'>3</span>（最低基準）<br>CBR &lt; 3 → 路床改良が必要<br>TA法（等値換算厚さ）：<br>TA = Σ(各層の厚さ × 等値換算係数)<br>表層・基層 → 係数 <span class='num'>1.0</span>",tip:"路床の設計CBRは「現場CBR試験の結果を小さい方から並べて下から○番目」で決定。路盤材料はクラッシャーラン（下層路盤）と粒度調整砕石（上層路盤）が基本。舗装設計は交通量区分（N1〜N7）と設計CBRの組み合わせ。"}},{name:"アスファルト舗装の施工管理",detail:{points:"アスファルト舗装は<span class='hl'>温度管理</span>が最重要です。プラントでの製造温度から各工程の温度基準を順守します。締固めは<span class='hl'>初転圧→二次転圧→仕上げ転圧</span>の順で行い、各段階で使用するローラーが異なります。",formula:"合材製造温度：<span class='num'>160〜180℃</span><br>敷均し温度：<span class='num'>110℃以上</span><br>初転圧：<span class='num'>110〜140℃</span>（ロードローラー10〜12t）<br>二次転圧：<span class='num'>70〜90℃</span>（タイヤローラー）<br>仕上げ転圧：<span class='num'>50℃以上</span>（タンデムローラー）",tip:"温度管理の数値は段階ごとに確実に暗記。締固め度は基準密度の94%以上（表層・基層）。初転圧はヘアクラックが入らない範囲の高温で実施。横継目の重ね幅は15cm以上が目安。"}},{name:"コンクリート舗装",detail:{points:"コンクリート舗装は高耐久・低維持管理が特徴ですが、<span class='hl'>目地</span>の設計が重要です。横収縮目地は<span class='num'>8〜10m</span>間隔、膨張目地は<span class='num'>120m以下</span>の間隔で設けます。施工法にはセットフォーム工法とスリップフォーム工法があります。",formula:"版厚：普通道路 → <span class='num'>15〜30cm</span><br>曲げ強度：<span class='num'>4.4N/mm²</span>（28日強度）<br>横収縮目地間隔：<span class='num'>8〜10m</span><br>膨張目地間隔：<span class='num'>120m以下</span><br>鉄網位置：版厚の<span class='num'>1/3</span>（上面寄り）",tip:"コンクリート舗装はアスファルト舗装と比較した特徴の問題が多い。養生期間（現場養生14日以上が目安）、ダウエルバー（荷重伝達装置）の役割も押さえる。"}}]},{week:4,title:"河川・砂防・ダム",dates:"5/5〜5/11",priority:"A",hours:10,topics:[{name:"河川護岸の構造・施工",detail:{points:"護岸は<span class='hl'>法覆工</span>（のり面保護）、<span class='hl'>基礎工</span>（法覆工の基礎）、<span class='hl'>根固工</span>（法尻保護）で構成されます。施工方向は<span class='hl'>上流→下流</span>、<span class='hl'>法尻→上方</span>が原則です。",formula:"法覆工の種類：<br>コンクリートブロック積（練積み＞空積み）<br>かごマット工（透水性あり）<br>連節ブロック（屈とう性あり）<br>根入れ深さ：最深河床高 − <span class='num'>1.0m</span>以上",tip:"施工方向「上流→下流・下→上」は頻出の引っかけ問題。練積みと空積みの違い（止水性・強度）も重要。護岸背面の排水処理（フィルター材設置）を忘れずに。"}},{name:"砂防ダム・砂防施設",detail:{points:"砂防えん堤は土砂の流出を抑制する施設です。<span class='hl'>水通し</span>は本えん堤の<span class='hl'>中央部</span>に設け、<span class='hl'>袖部</span>は水通しより高くします。<span class='hl'>副えん堤</span>は本えん堤の下流に設置し、越流水による洗掘を防ぎます。",formula:"前庭保護工の構成：<br>① 水叩き（コンクリート版）<br>② 副えん堤（垂直壁）<br>③ 護床工<br>袖部高さ ≧ 水通し天端高<br>えん堤勾配：上流面 <span class='num'>1:0.2</span>、下流面 <span class='num'>1:0.2</span>",tip:"水通しの位置は「本えん堤中央部」が正解（袖部ではない）。砂防えん堤と治山ダムの目的の違い、床固工との違いも整理しておく。"}},{name:"フィルダム・重力式ダム",detail:{points:"<span class='hl'>重力式コンクリートダム</span>は自重で水圧に抵抗する形式です。<span class='hl'>フィルダム</span>は土や岩石を材料とし、<span class='hl'>ゾーン型</span>（コア＋シェル）が一般的です。RCD工法（ローラー締固めコンクリート）は重力式ダムの合理化施工法です。",formula:"重力式ダムの安定条件：<br>① 転倒に対する安全率 ≧ <span class='num'>4.0</span><br>② 滑動に対する安全率 ≧ <span class='num'>4.0</span><br>③ 基礎地盤内の応力が許容値以内<br>フィルダム：コア材料は透水係数 <span class='num'>10⁻⁵cm/s</span>以下",tip:"ダムの形式ごとの特徴（重力式・アーチ式・フィル）と適用地形の関係が頻出。RCD工法の「超硬練りコンクリートをブルドーザーで敷均しローラーで締固め」という手順を覚える。"}},{name:"河川法の基礎知識",detail:{points:"<span class='hl'>河川法</span>では河川を<span class='hl'>一級河川</span>（国土交通大臣管理）と<span class='hl'>二級河川</span>（都道府県知事管理）に分類します。河川区域内での工事・占用には<span class='hl'>河川管理者の許可</span>が必要です。",formula:"河川法の許可行為：<br>① 土地の占用（第24条）<br>② 土石等の採取（第25条）<br>③ 工作物の新築等（第26条）<br>④ 土地の掘削等（第27条）<br>→ すべて河川管理者の許可が必要",tip:"一級河川の指定区間は都道府県知事が管理を行う場合がある点に注意。河川保全区域と河川区域の違いも整理。準用河川（市町村長管理）の存在も押さえておく。"}}]},{week:5,title:"トンネル・海岸・港湾",dates:"5/12〜5/18",priority:"B",hours:8,topics:[{name:"山岳トンネル（NATM）",detail:{points:"<span class='hl'>NATM</span>（New Austrian Tunnelling Method）は地山自体を支保構造の一部として利用する工法です。一次支保工として<span class='hl'>吹付けコンクリート</span>・<span class='hl'>ロックボルト</span>・<span class='hl'>鋼製支保工</span>を組み合わせ、<span class='hl'>計測管理</span>で安定を確認しながら施工します。",formula:"吹付けコンクリート厚さ：<span class='num'>5〜20cm</span><br>ロックボルト長さ：<span class='num'>3〜6m</span>（一般的）<br>掘削工法：<br>全断面掘削 → 良好な地山<br>ベンチカット → 普通〜軟弱地山<br>導坑先進 → 軟弱地山",tip:"NATMの基本原理「地山を支保構造の一部として利用」は最重要。計測管理（内空変位・天端沈下・地中変位）は必須であり「補助的手段」ではない。支保パターン（D-Ⅰ〜D-Ⅲ、CⅠ〜CⅡ等）の概念も理解する。"}},{name:"シールドトンネル",detail:{points:"<span class='hl'>シールドトンネル</span>は円筒形の掘削機（シールド）で掘り進みながら<span class='hl'>セグメント</span>を組み立てる工法です。都市部の軟弱地盤で多用されます。<span class='hl'>泥水式</span>と<span class='hl'>土圧式</span>が代表的な分類です。",formula:"泥水式：切羽安定に泥水圧を利用<br>　→ 砂礫・玉石に有利<br>土圧式：掘削土砂自体で切羽安定<br>　→ 粘性土・シルトに有利<br>セグメント種類：RC・鋼製・合成・ダクタイル",tip:"泥水式と土圧式の適用地盤の違いが頻出。セグメントの組立方向（リング方向・キーセグメント）、テールボイドへの裏込め注入の目的も重要。近年は大断面・長距離が増加。"}},{name:"海岸保全施設",detail:{points:"海岸保全施設は<span class='hl'>侵食対策</span>と<span class='hl'>高潮・津波対策</span>に分類されます。侵食対策には<span class='hl'>離岸堤</span>・<span class='hl'>突堤</span>・<span class='hl'>養浜</span>・<span class='hl'>人工リーフ</span>等があります。高潮対策には海岸堤防・護岸・水門等があります。",formula:"離岸堤：汀線に平行に設置 → 波のエネルギー減衰<br>突堤：汀線に直角に設置 → 漂砂の捕捉<br>養浜：砂を補給して海岸を回復<br>人工リーフ：海面下に没水構造物を設置",tip:"離岸堤と突堤の設置方向の違い（平行 vs 直角）は基本。養浜は自然環境への影響が少ない工法として注目。海岸法の管理体制（都道府県知事の認可）も整理。"}},{name:"港湾構造物（重力式・矢板式）",detail:{points:"港湾の岸壁は<span class='hl'>重力式</span>（ケーソン式等）と<span class='hl'>矢板式</span>に大別されます。重力式は自重で土圧・水圧に抵抗し、矢板式は鋼矢板の曲げ剛性と控え工で抵抗します。",formula:"重力式（ケーソン式）：<br>水深が深い → 大型ケーソンを据付<br>矢板式：<br>控え工（タイロッド＋控え壁）で安定<br>適用水深：矢板式 <span class='num'>〜10m</span>程度<br>　重力式 <span class='num'>10m以上</span>も可",tip:"ケーソンの据付手順（注水沈設→中詰め→蓋コンクリート）が出題されることがある。港湾のバース設計（必要水深・係留施設）の基本概念も押さえる。"}}]},{week:6,title:"施工計画・工程管理",dates:"5/19〜5/25",priority:"S",hours:12,topics:[{name:"施工計画の立案手順",detail:{points:"施工計画は<span class='hl'>事前調査→基本方針の決定→詳細計画の作成</span>の手順で立案します。施工計画書には工程計画・品質計画・安全計画・環境計画等が含まれます。仮設計画は<span class='hl'>指定仮設</span>（発注者指定）と<span class='hl'>任意仮設</span>（受注者提案）に区分されます。",formula:"施工計画書の主な記載事項：<br>① 工事概要　② 計画工程表<br>③ 現場組織表　④ 主要機械<br>⑤ 施工方法　⑥ 品質管理計画<br>⑦ 安全管理計画　⑧ 環境対策",tip:"施工計画の立案手順は「まず事前調査ありき」が重要。指定仮設の変更は発注者の承諾が必要だが、任意仮設は受注者の判断で変更可能。この区分は頻出。"}},{name:"ネットワーク工程表（CPM）",detail:{points:"<span class='hl'>ネットワーク工程表</span>は作業の相互関係を矢線（アクティビティ）と結合点（イベント）で表します。<span class='hl'>クリティカルパス</span>はTF=0の作業を結んだ最長経路で、工期を決定します。",formula:"TF（トータルフロート） = LF − EF = LS − ES<br>FF（フリーフロート） = 後続最早開始 − 当該最早完了<br>クリティカルパス → TF = <span class='num'>0</span> の経路<br>CPの遅れ → 工期全体の遅れに直結",tip:"ネットワーク工程表の計算問題は最頻出。最早開始(ES)・最早完了(EF)は前進計算、最遅開始(LS)・最遅完了(LF)は後退計算。ダミー（破線矢印）は所要日数ゼロの仮想作業。フロートの計算を確実に。"}},{name:"バーチャート・ガントチャート",detail:{points:"<span class='hl'>バーチャート（横線式工程表）</span>は各作業の開始・終了時期を横棒で表し、最も広く使われる工程表です。<span class='hl'>ガントチャート</span>は各作業の進捗率を表します。それぞれの長所・短所を理解することが重要です。",formula:"バーチャートの特徴：<br>○ 作成が容易・各作業の所要日数が明確<br>× 作業間の相互関係が不明確<br>× クリティカルパスが把握できない<br>ガントチャート：進捗率の把握に有利",tip:"工程表の種類と特徴の比較は頻出。「ネットワーク式は相互関係が明確だがバーチャートはそうでない」がポイント。出来高累計曲線（Sカーブ）との組み合わせで進捗管理を行う。バナナ曲線（許容範囲の上下限）も覚える。"}},{name:"工程管理のポイント",detail:{points:"工程管理は<span class='hl'>PDCA</span>（計画→実行→検討→処置）サイクルで行います。工程の遅れに対しては<span class='hl'>工法変更</span>・<span class='hl'>施工班の増強</span>・<span class='hl'>作業時間延長</span>等の対策を検討します。<span class='hl'>クラッシング</span>（費用増加による短縮）と<span class='hl'>ファストトラッキング</span>（工程の並行化）が代表的手法です。",formula:"工程短縮の手法：<br>① クラッシング → CPの作業に資源追加<br>② ファストトラッキング → 作業の並行化<br>③ 工法変更 → 機械化・大型化<br>費用と工期：直接費↑・間接費↓の最適点",tip:"工期短縮はクリティカルパス上の作業を対象とすること（CP以外を短縮しても工期は変わらない）。「時間−費用」のトレードオフ関係の理解が重要。間接費は工期に比例して増加する。"}}]},{week:7,title:"品質管理・安全管理",dates:"5/26〜6/1",priority:"S",hours:14,topics:[{name:"品質管理の統計手法（X̄-R管理図）",detail:{points:"<span class='hl'>X̄-R管理図</span>はロットの平均値(X̄)とばらつきの範囲(R)を管理する統計手法です。<span class='hl'>管理限界線</span>（UCL・LCL）を超えたデータは工程に異常があることを示します。QC7つ道具の理解も重要です。",formula:"UCL = X̄ + A₂ · R̄<br>LCL = X̄ − A₂ · R̄<br>管理外の判定基準：<br>① 点が管理限界線の外に出る<br>② 連続<span class='num'>9点</span>が中心線の片側に並ぶ<br>③ 連続<span class='num'>6点</span>が増加または減少する",tip:"管理図の異常判定ルールは暗記必須。QC7つ道具（パレート図・特性要因図・ヒストグラム・管理図・散布図・チェックシート・層別）の各用途も頻出。ヒストグラムの型（正規分布型・二山型・絶壁型等）と原因の関係も重要。"}},{name:"ISO 9001の概念",detail:{points:"<span class='hl'>ISO 9001</span>は品質マネジメントシステム（QMS）の国際規格です。<span class='hl'>PDCAサイクル</span>に基づく継続的改善が基本理念です。プロセスアプローチにより、業務プロセスの管理と改善を行います。",formula:"ISO 9001の7つの品質管理の原則：<br>① 顧客重視　② リーダーシップ<br>③ 人々の積極的参加　④ プロセスアプローチ<br>⑤ 改善　⑥ 客観的事実に基づく意思決定<br>⑦ 関係性管理",tip:"ISO 9001は「製品の品質を直接保証するものではなく、品質管理の仕組みを保証する規格」であることがポイント。ISO 14001（環境）との違いも整理。内部監査・マネジメントレビューの意味も理解する。"}},{name:"労働安全衛生法の重要条文",detail:{points:"<span class='hl'>労働安全衛生法</span>は事業者に安全衛生管理体制の構築を義務付けています。<span class='hl'>特定元方事業者</span>には協議組織の設置、<span class='hl'>毎作業日1回以上</span>の作業場所巡視等が義務付けられています。",formula:"安全衛生管理体制（常時使用する労働者数）：<br>総括安全衛生管理者 → <span class='num'>100人</span>以上<br>安全管理者 → <span class='num'>50人</span>以上<br>衛生管理者 → <span class='num'>50人</span>以上<br>産業医 → <span class='num'>50人</span>以上<br>安全衛生推進者 → <span class='num'>10〜49人</span>",tip:"作業主任者が必要な作業（型枠支保工・足場組立・掘削・土留め支保工等）は具体的に暗記。特別教育が必要な作業（高さ2m以上のフルハーネス、酸素欠乏危険作業等）との違いも整理。新規入場者教育も重要。"}},{name:"足場・型枠・掘削の安全基準",detail:{points:"<span class='hl'>足場</span>は高さ2m以上で作業床設置が義務。<span class='hl'>型枠支保工</span>は支柱の沈下・変形防止措置が必要。<span class='hl'>掘削</span>は深さに応じた安全対策が求められます。いずれも数値基準の暗記が重要です。",formula:"足場：作業床幅 ≧ <span class='num'>40cm</span>｜手すり ≧ <span class='num'>85cm</span>＋中桟<br>壁つなぎ（枠組）：垂直 <span class='num'>5m</span>・水平 <span class='num'>5.5m</span>以内<br>掘削：深さ <span class='num'>2m以上</span> → 崩壊防止措置<br>深さ <span class='num'>1.5m以上</span> → 昇降設備<br>型枠支保工：高さ <span class='num'>3.5m以上</span> → 水平つなぎ2方向",tip:"足場の手すり高さ「85cm」は「75cm」と引っかけ問題が出る。掘削の法面勾配は土質による（砂→35°以下、硬い粘土→75°以下等）。明り掘削と地山の掘削作業主任者の選任基準の違いも確認。"}}]},{week:8,title:"法規（建設業法・労基法）",dates:"6/2〜6/8",priority:"S",hours:12,topics:[{name:"建設業法（許可・主任技術者・監理技術者）",detail:{points:"<span class='hl'>建設業許可</span>は営業所の設置状況で国土交通大臣許可と知事許可に分かれます。すべての工事に<span class='hl'>主任技術者</span>を配置し、一定規模以上の下請け工事では<span class='hl'>監理技術者</span>を配置します。",formula:"許可区分：<br>2以上の都道府県に営業所 → <span class='hl'>大臣許可</span><br>1つの都道府県のみ → <span class='hl'>知事許可</span><br>特定建設業（監理技術者必要）：<br>下請け総額 <span class='num'>4,500万円</span>以上<br>（建築一式 <span class='num'>7,000万円</span>以上）<br>専任義務：<span class='num'>3,500万円</span>以上（建築一式<span class='num'>7,000万円</span>以上）",tip:"許可の有効期間は「5年」。主任技術者と監理技術者の違いは「下請けの金額規模」で区分。監理技術者資格証の携帯・提示義務がある。2022年改正で金額基準が改定された点に注意。"}},{name:"労働基準法（労働時間・休日・割増賃金）",detail:{points:"<span class='hl'>労働基準法</span>は労働条件の最低基準を定めています。法定労働時間は<span class='num'>1日8時間・週40時間</span>で、<span class='hl'>36協定</span>により時間外労働が可能になります。建設業にも2024年4月から時間外労働の上限規制が適用されています。",formula:"割増賃金率：<br>時間外労働 → <span class='num'>25%</span>以上<br>深夜労働（22〜5時） → <span class='num'>25%</span>以上<br>休日労働 → <span class='num'>35%</span>以上<br>月<span class='num'>60時間</span>超の時間外 → <span class='num'>50%</span>以上",tip:"割増賃金率の数値は確実に暗記。建設業の時間外労働上限規制（月45時間・年360時間、特別条項で年720時間以内）が適用開始。年次有給休暇の付与日数（6ヶ月勤務→10日）も重要。"}},{name:"道路法・河川法の重要規定",detail:{points:"<span class='hl'>道路法</span>では道路の占用・工事に許可制度があります。<span class='hl'>河川法</span>では河川区域内の行為に河川管理者の許可が必要です。どちらも許可申請の手続きと規制内容が出題されます。",formula:"道路占用許可（道路法第32条）：<br>電柱・水道管・ガス管等の継続使用 → 道路管理者許可<br>道路使用許可（道路交通法第77条）：<br>工事・作業等 → 所轄警察署長許可<br>※ 両方必要な場合はどちらかに一括申請可",tip:"「道路占用許可」（道路法・道路管理者）と「道路使用許可」（道路交通法・警察）の違いは超頻出。河川法の許可行為（24〜27条）も条文番号と内容をセットで覚える。"}},{name:"騒音・振動規制法",detail:{points:"<span class='hl'>騒音規制法</span>と<span class='hl'>振動規制法</span>は特定建設作業に対する規制を定めています。作業開始<span class='num'>7日前</span>までに<span class='hl'>市町村長</span>に届出が必要です。",formula:"騒音規制法：基準値 <span class='num'>85dB</span>以下<br>振動規制法：基準値 <span class='num'>75dB</span>以下<br>届出：作業開始 <span class='num'>7日前</span>まで → 市町村長<br>第1号区域：<span class='num'>7〜19時</span>（日祝休日禁止）<br>第2号区域：<span class='num'>6〜22時</span>（日祝可）<br>1日の作業時間：10時間（1号）/14時間（2号）以内",tip:"騒音「85dB」と振動「75dB」をセットで暗記。届出先は「市町村長」（都道府県知事ではない）。連続作業日数は「6日以内」。特定建設作業の具体例（くい打ち・さく岩機・バックホウ等）も押さえる。"}}]},{week:9,title:"環境管理・測量",dates:"6/9〜6/15",priority:"A",hours:8,topics:[{name:"建設副産物・廃棄物処理法",detail:{points:"建設工事で発生する廃棄物は<span class='hl'>産業廃棄物</span>として適正処理が義務付けられます。<span class='hl'>排出事業者責任</span>の原則により、元請業者が処理責任を負います。<span class='hl'>マニフェスト制度</span>（産業廃棄物管理票）による管理が必要です。",formula:"マニフェストの返送確認期限：<br>B2票（運搬終了）→ <span class='num'>90日</span>以内<br>D票（処分終了）→ <span class='num'>90日</span>以内<br>E票（最終処分終了）→ <span class='num'>180日</span>以内<br>産業廃棄物管理票の保存期間 → <span class='num'>5年間</span>",tip:"排出事業者は「元請業者」（下請ではない）が重要ポイント。マニフェストの返送期限と確認義務は頻出。特別管理産業廃棄物（廃石綿・廃PCB等）は通常より厳しい管理基準。電子マニフェストも増加傾向。"}},{name:"騒音・振動対策",detail:{points:"建設工事における<span class='hl'>騒音対策</span>は発生源対策・伝搬経路対策・受音側対策に分類されます。<span class='hl'>低騒音型建設機械</span>の使用や<span class='hl'>防音壁</span>の設置が代表的な対策です。",formula:"低騒音型建設機械：国交省指定機械の使用<br>低振動型建設機械：同上<br>防音壁の効果：<span class='num'>5〜15dB</span>程度の低減<br>防音シート：<span class='num'>3〜10dB</span>程度の低減<br>作業時間帯の配慮：早朝・夜間を避ける",tip:"低騒音型・低振動型建設機械には国交省の指定制度がある。騒音・振動対策は「発生源→伝搬経路→受音側」の順序で検討する。住民への事前説明・苦情対応体制の整備も重要な管理項目。"}},{name:"測量の基本（トータルステーション）",detail:{points:"<span class='hl'>トータルステーション（TS）</span>は角度と距離を同時に測定できる測量機器です。建設現場では<span class='hl'>水準測量</span>・<span class='hl'>距離測量</span>・<span class='hl'>角測量</span>を組み合わせて位置を決定します。近年は<span class='hl'>GNSS測量</span>も普及しています。",formula:"水準測量の許容誤差（1級）：<br>往復差 → <span class='num'>2.5mm√S</span>（Sはkm単位）<br>TS測量の精度：<br>角度 → 1〜5秒<br>距離 → ±(2mm+2ppm×D)<br>GNSS：干渉測位 → mm〜cm精度",tip:"水準測量と三角測量（トラバース測量）の原理の違いを理解する。TSの据付手順（整準・求心・視準）や器械高・目標高の測定ミス防止策も実務的に出題される。GNSSのRTK測位は即時性が高い。"}},{name:"建設リサイクル法",detail:{points:"<span class='hl'>建設リサイクル法</span>は特定建設資材の分別解体と再資源化を義務付ける法律です。対象工事は規模要件があり、届出制です。対象資材は<span class='hl'>コンクリート</span>・<span class='hl'>アスファルト・コンクリート</span>・<span class='hl'>木材</span>の3種類です。",formula:"対象工事の規模要件：<br>解体工事 → 延床面積 <span class='num'>80㎡</span>以上<br>新築・増改築 → 延床面積 <span class='num'>500㎡</span>以上<br>土木工事 → 請負代金 <span class='num'>1億円</span>以上<br>修繕・模様替え → 請負代金 <span class='num'>1億円</span>以上<br>届出：工事着手 <span class='num'>7日前</span>まで → 都道府県知事",tip:"再資源化目標率の暗記：コンクリート塊90%以上、アスファルト・コンクリート90%以上、建設発生木材70%以上。届出先は「都道府県知事」（騒音振動の「市町村長」と混同しない）。特定建設資材に「土砂」は含まれない点に注意。"}}]},{week:10,title:"総復習・弱点補強",dates:"6/16〜6/22",priority:"S",hours:16,topics:[{name:"S・A優先分野の再確認",detail:{points:"S評価（土質・コンクリート・施工管理・品質安全・法規）の分野は出題数が多く合否を左右します。<span class='hl'>数値の暗記が曖昧な箇所</span>を重点的に復習します。各分野の<span class='hl'>頻出テーマ上位3つ</span>を再確認しましょう。",formula:"重点復習ポイント：<br>① コンクリートのW/C上限値（45/55/65%）<br>② 足場の安全基準数値（85cm・40cm等）<br>③ 建設業法の金額基準（4,500万/7,000万円）<br>④ ネットワーク工程表の計算<br>⑤ N値による地盤判定",tip:"この段階では新しい範囲に手を広げず、既習範囲の精度を上げることに集中する。間違えた問題をノートにまとめ、同じミスを繰り返さないことが最重要。"}},{name:"過去問演習（土質・コンクリート）",detail:{points:"過去問は<span class='hl'>直近5年分</span>を中心に演習します。土質・コンクリート分野は毎年<span class='num'>10〜14問</span>出題される最重要分野です。出題傾向を把握し、<span class='hl'>選択肢ごとの正誤理由</span>を説明できるレベルまで学習します。",formula:"効果的な過去問演習法：<br>① 本番同様の時間制限で解く<br>② 全選択肢の正誤を判断する<br>③ 間違えた問題は解説を精読<br>④ 類題をまとめて弱点を補強<br>⑤ 3回以上繰り返し演習",tip:"「正解を選べた」だけでなく「不正解の選択肢がなぜ間違いか」を説明できるようにする。過去問の焼き直しが多いので、5年分を完璧にすれば本番の6割以上はカバーできる。"}},{name:"法規の暗記強化",detail:{points:"法規分野は<span class='hl'>正確な数値の暗記</span>が勝負です。建設業法・労働安全衛生法・労働基準法の<span class='hl'>金額基準・日数・人数</span>を混同しないように整理します。語呂合わせやカードで反復暗記が効果的です。",formula:"暗記必須の数値リスト：<br>建設業法：4,500万/7,000万/3,500万/500万/1,500万<br>労安法：100人/50人/10人/2m/1.5m/85cm<br>騒音：85dB/7日前/市町村長<br>リサイクル：80㎡/500㎡/1億円/7日前",tip:"数値は「似た数字のグループ」でまとめて比較暗記すると混同しにくい。例：「7日前」は騒音届出もリサイクル届出も同じ。「4,500万」は特定建設業の下請け基準と施工体制台帳の基準。"}},{name:"模擬試験①",detail:{points:"本番と同じ条件で模擬試験を実施します。<span class='hl'>午前：2時間30分</span>（61問中40問選択）、<span class='hl'>午後：2時間</span>（必須20問＋選択6問）。時間配分と問題選択の練習が主な目的です。",formula:"時間配分の目安：<br>午前（150分・40問）→ 1問あたり <span class='num'>3〜4分</span><br>午後（120分・26問）→ 1問あたり <span class='num'>4〜5分</span><br>見直し時間 → <span class='num'>15〜20分</span>確保<br>合格基準 → 各区分<span class='num'>60%</span>以上",tip:"選択問題は得意分野から先に解く。迷った問題にはマークを付けて後で戻る。マークシートの塗りミスに注意（特に選択問題の番号飛ばし）。本番同様に休憩時間の過ごし方もシミュレーション。"}}]},{week:11,title:"直前対策・模擬試験",dates:"6/23〜6/29",priority:"S",hours:20,topics:[{name:"模擬試験②③",detail:{points:"2回目・3回目の模擬試験は<span class='hl'>本番を想定した緊張感</span>の中で実施します。1回目の反省を活かし、<span class='hl'>時間配分の最適化</span>と<span class='hl'>問題選択の戦略</span>を確立させます。",formula:"目標スコア（合格ライン60%超を目指す）：<br>午前：40問中 <span class='num'>28問</span>以上正解（70%）<br>午後：26問中 <span class='num'>18問</span>以上正解（70%）<br>※ 60%が合格ラインなので<span class='num'>10%のマージン</span>を確保",tip:"本番では緊張で実力の80〜90%しか出せないため、模擬試験では70%以上を安定して取れることが目標。3回分の結果を比較して弱点分野の改善状況を確認する。"}},{name:"間違えた問題の徹底解析",detail:{points:"模擬試験や過去問で間違えた問題を<span class='hl'>分野別・原因別</span>に分類します。<span class='hl'>知識不足</span>・<span class='hl'>勘違い</span>・<span class='hl'>ケアレスミス</span>のどれが原因かを分析し、対策を講じます。",formula:"間違いの分類と対策：<br>① 知識不足 → 該当範囲の教科書を再読<br>② 数値の混同 → 比較表を作成して整理<br>③ 問題文の読み間違い → 「誤り」「正しい」に下線<br>④ 消去法の失敗 → 全選択肢を検証する習慣",tip:"「誤っているものはどれか」と「正しいものはどれか」の読み違いは本番でも多い。問題文の指示語に必ずマーカーを引く習慣をつける。間違いノートは試験当日の最終確認にも使える。"}},{name:"重要公式・数値の最終確認",detail:{points:"<span class='hl'>試験に出る公式と数値</span>を一覧にまとめ、最終確認します。特に<span class='hl'>締固め度</span>・<span class='hl'>工程能力指数</span>・<span class='hl'>ネットワーク計算</span>・<span class='hl'>W/C上限値</span>は計算問題として出題されるため確実に。",formula:"最重要公式まとめ：<br>Dc = γd/γdmax × 100 ≧ <span class='num'>90%</span><br>Cp = (SU−SL)/6σ ≧ <span class='num'>1.33</span>で優秀<br>TF = LF − EF（クリティカルパス: TF=0）<br>N値：63.5kg × 76cm → 30cm貫入打撃数",tip:"公式は「意味を理解した上で暗記」する。単なる丸暗記は応用問題に対応できない。計算問題は配点が高い傾向があるので、確実に得点できるよう反復練習する。"}},{name:"試験当日の時間配分確認",detail:{points:"試験当日のスケジュールと持ち物を最終確認します。<span class='hl'>会場へのアクセス</span>・<span class='hl'>持ち物チェックリスト</span>・<span class='hl'>各科目の時間配分</span>を確定させます。",formula:"試験当日チェックリスト：<br>□ 受験票　□ 身分証明書<br>□ 筆記用具（HB鉛筆・消しゴム）<br>□ 時計（通信機能なし）<br>□ 昼食・飲料<br>□ 参考書（最終確認用）<br>□ 体温調節できる上着",tip:"試験会場には30分前に到着する余裕を持つ。マークシート用の鉛筆は複数本用意。電卓は使用不可。午前と午後の間の休憩時間は暗記事項の最終確認に充てる。"}}]},{week:12,title:"最終仕上げ",dates:"6/30〜7/4",priority:"A",hours:8,topics:[{name:"暗記カード最終確認",detail:{points:"これまで作成した暗記カード・間違いノートの<span class='hl'>最終通し読み</span>を行います。新しい内容は追加せず、<span class='hl'>既知の知識の定着確認</span>に徹します。",formula:"最終確認の優先順位：<br>① S分野の数値（W/C・N値・足場基準等）<br>② 法規の金額基準・届出期限<br>③ 間違いノートの頻出ミス項目<br>④ 公式の適用条件<br>⑤ 紛らわしい用語の区別",tip:"この時期に新しい問題集に手を出すのは逆効果。自信のある範囲を再確認して「これだけやった」という安心感を持つことが精神的にも重要。"}},{name:"法規の条文最終チェック",detail:{points:"法規は<span class='hl'>直前の暗記</span>が最も効果的な分野です。建設業法・労安法・環境法規の<span class='hl'>重要条文と数値</span>を集中的に復習します。",formula:"直前暗記チェックリスト：<br>□ 建設業許可区分（大臣/知事、一般/特定）<br>□ 主任技術者・監理技術者の配置基準<br>□ 安全管理体制の人数基準<br>□ 騒音85dB・振動75dB<br>□ リサイクル法の規模要件",tip:"法規は「最後に見たものが記憶に残りやすい」ので、試験前日と当日朝に集中的に確認する。特に金額基準は改正されている場合があるので最新の数値を確認。"}},{name:"体調管理・持ち物準備",detail:{points:"試験3日前からは<span class='hl'>体調管理を最優先</span>にします。睡眠時間を十分に確保し、消化の良い食事を心がけます。持ち物は前日までにすべて準備します。",formula:"体調管理のポイント：<br>① 睡眠：7〜8時間確保<br>② 食事：消化の良いもの中心<br>③ 運動：軽いストレッチ程度<br>④ 勉強：1日2〜3時間の軽い復習<br>⑤ カフェイン：試験前日は控えめに",tip:"試験は長丁場（午前2.5時間＋午後2時間）なので体力・集中力の維持が重要。試験会場の室温に対応できるよう上着は必ず持参。"}},{name:"前日は軽い復習のみ",detail:{points:"試験前日は<span class='hl'>暗記カードの流し読み</span>程度に留めます。<span class='hl'>自信を持って試験に臨む</span>ための心理的準備が最も重要です。早めに就寝しましょう。",formula:"前日スケジュール例：<br>午前：暗記カード・間違いノート最終確認（2h）<br>午後：持ち物準備・会場アクセス再確認<br>夕方：リラックス（散歩・入浴等）<br>就寝：22時まで（7時間以上の睡眠確保）",tip:"前日に新しい問題を解いて間違えると不安になるので避ける。12週間やってきた自分を信じること。試験開始直後は深呼吸してから取り組む。"}}]}];

const keyPoints=[{category:"土質・基礎",icon:"⛰️",color:"#c0392b",items:[{title:"土の粒度区分",content:"礫：2mm以上｜砂：0.075〜2mm\nシルト：0.005〜0.075mm｜粘土：0.005mm以下\n均等係数Uc=D60/D10≧10で良級配\n曲率係数Uc'=1〜3で良級配"},{title:"コンシステンシー限界",content:"液性限界(LL)→塑性限界(PL)→収縮限界(SL)\n塑性指数PI=LL-PL\nPI>17→膨張性粘土に注意\nコンシステンシー指数Ic=(LL-w)/(LL-PL)"},{title:"標準貫入試験（SPT）",content:"ハンマー重量：63.5kg｜落下高さ：76cm\n30cm貫入に要する打撃回数=N値\nN<4→軟弱｜N=4〜10→やや軟弱\nN=10〜30→中程度｜N>50→極密"},{title:"締固め管理",content:"締固め度Dc=γd/γdmax×100\n管理基準：Dc≧90%（土工）\n最適含水比woptで最大乾燥密度γdmax\n1層の仕上り厚さ：30cm以下が基本"},{title:"有効応力の原理",content:"テルツァーギの原理：σ=σ'+u\n全応力＝有効応力＋間隙水圧\nせん断強度・圧縮は有効応力に支配\n間隙水圧が増加→有効応力が減少"},{title:"圧密",content:"粘性土が荷重により長期間かけて沈下する現象\n圧密係数Cv→圧密速度を表す\n圧密降伏応力→過去の最大有効応力\n砂質土は瞬時に圧密完了（粘土は長期間）"},{title:"液状化",content:"地下水位が高い飽和砂質地盤で発生\nN値が小さい（緩い）砂ほど危険\n対策：締固め・排水・固化処理\n粘性土・岩盤では発生しにくい"},{title:"軟弱地盤対策",content:"サンドドレーン→圧密排水促進\nプレロード→事前圧密沈下\nSCP（サンドコンパクション）→砂杭で密度増加\n深層混合処理→セメント固化\n置換→軟弱土を良質土に入替"},{title:"杭基礎",content:"支持杭→先端支持力が主体\n摩擦杭→周面摩擦力が主体\n許容支持力Ra=(Rp+Rf)/安全率\n場所打ち杭：オールケーシング・リバース・アースドリル\n既製杭：PHC杭（遠心力成形）"},{title:"土圧",content:"主働土圧：壁が土から離れる方向の土圧\n受働土圧：壁が土に向かう方向の土圧\n静止土圧：壁が動かない状態\n大小関係：受働＞静止＞主働\nクーロン・ランキンの土圧論"},{title:"法面保護",content:"植生工→切土・盛土法面に適用可\nモルタル吹付→風化・侵食防止\nコンクリート張工→不透水\n法面排水工→法面保護の重要な一部\n地すべり：抑制工（排水等）＋抑止工（杭等）"},{title:"土留め工",content:"親杭横矢板工法→硬質地盤に適用\n鋼矢板工法→止水性あり\n柱列式連続壁→大規模掘削に適用\n腹起し→矢板に沿わせる水平部材\n切りばり→向かい合う矢板間の水平部材"},{title:"盛土の施工管理",content:"一層の敷均し厚さ：30cm以下（仕上り厚さ）\n撒出し→敷均し→締固め→転圧\n含水比の管理→wopt付近で施工\n法面の締固め→小型の締固め機械使用\n品質管理：現場密度試験（砂置換法等）"},{title:"地盤改良工法の分類",content:"置換工法→軟弱土を除去して良質土で置換\n表層処理工法→サンドマット・敷設材\n載荷重工法→プレロード・サーチャージ\n締固め工法→SCP・バイブロフローテーション\n固結工法→深層混合処理・薬液注入"}]},{category:"コンクリート",icon:"🏗️",color:"#2980b9",items:[{title:"水セメント比（W/C）上限",content:"一般構造物：65%以下\n道路橋：55%以下\n海洋構造物：45%以下\nW/C小さい→強度UP・耐久性UP\nW/C大きい→乾燥収縮・中性化が増大"},{title:"スランプ・空気量",content:"スランプ：5〜18cm（一般）\n許容差：±2.5cm（8cm以上）｜±1.5cm（5〜8cm）\n空気量：4.5±1.5%（普通コンクリート）\nスランプコーンの高さ：30cm"},{title:"鉄筋のかぶり厚さ",content:"土中：60mm｜水中：70mm\n屋外（柱・梁）：40mm｜屋内：30mm\nかぶり→鉄筋保護・耐久性確保\n中性化・塩害対策の基本"},{title:"湿潤養生期間",content:"普通ポルトランドセメント：\n15℃以上→5日｜10℃以上→7日｜5℃以上→9日\n早強：15℃以上→3日\n混合B種：15℃以上→14日\n養生＝水和反応に必要な水分保持"},{title:"寒中・暑中コンクリート",content:"寒中：日平均気温4℃以下で適用\n打設温度5〜20℃、養生温度5℃以上\n養生終了：圧縮強度5N/mm²以上\n暑中：日平均気温25℃超で適用\n練上がり温度35℃以下"},{title:"配合設計の基本",content:"単位水量：185kg/m³以下が目安\n細骨材率(s/a)：全骨材に占める細骨材の容積%\n配合強度f'cr=f'ck+1.73σ\nAE減水剤→単位水量低減\n高性能AE減水剤→高強度用"},{title:"打込み・締固め",content:"1層の厚さ：40〜50cm以下\n自由落下高さ：1.5m以下\n内部振動機の挿入間隔：50〜60cm以下\n練混ぜ→打込み：25℃以上→1.5h以内\n25℃未満→2h以内"},{title:"打継目",content:"せん断力の小さい位置に設ける\n旧面のレイタンス除去→モルタル敷き\nできるだけ少なくする\nコールドジョイント防止が重要"},{title:"ガス圧接継手",content:"ふくらみ直径：鉄筋径の1.4倍以上\nふくらみ長さ：鉄筋径の1.1倍以上\n圧接面のグラインダー研磨必要\n継手位置は応力の小さい箇所に配置\n同一断面への集中を避ける"},{title:"劣化機構",content:"中性化：CO₂→Ca(OH)₂と反応→pH低下→鉄筋腐食\n塩害：Cl⁻が不動態被膜破壊→鉄筋腐食\n凍害：凍結融解の繰返し→スケーリング\nASR：反応性骨材＋アルカリ→膨張ひび割れ\n化学的侵食：硫酸塩→エトリンガイト膨張"},{title:"対策まとめ",content:"中性化対策→W/C小さく・かぶり大きく\n塩害対策→W/C45%以下・防食鉄筋\n凍害対策→AEコンクリート（空気量4.5%）\nASR対策→高炉セメントB種（スラグ40%以上）\nマスコン→低熱セメント・パイプクーリング"},{title:"非破壊試験",content:"シュミットハンマー→反発度から圧縮強度推定\n超音波法→内部欠陥の検出\n電磁波レーダー→鉄筋位置探査\n赤外線法→浮き・剥離の検出\nフェノールフタレイン→中性化深さ測定"},{title:"セメントの種類と特徴",content:"普通ポルトランド→一般的に最多使用\n早強ポルトランド→初期強度が高い（3日で普通の7日相当）\n高炉セメントB種→ASR抑制・耐海水性・水和熱低減\n低熱ポルトランド→マスコンに有利（水和熱小）\nフライアッシュセメント→長期強度・水密性向上"},{title:"コンクリートのひび割れ",content:"乾燥収縮ひび割れ→W/C・単位水量が大きいと発生\n温度ひび割れ→マスコン・セメント水和熱\n沈みひび割れ→ブリーディングによる沈降\nアルカリシリカ反応→膨張ひび割れ（亀甲状）\n対策：配合設計・養生・ひび割れ誘発目地"},{title:"フレッシュコンクリートの性質",content:"ワーカビリティー→施工のしやすさの総称\nコンシステンシー→変形・流動に対する抵抗性\nブリーディング→練混ぜ水の一部が上昇する現象\nレイタンス→ブリーディングで表面に堆積する微粒子\n塩化物イオン量→0.30kg/m³以下（JIS A 5308）"}]},{category:"鋼構造・道路・舗装",icon:"🛣️",color:"#d35400",items:[{title:"鋼材の基本性質",content:"SS400：降伏点245N/mm²以上、引張400〜510N/mm²\nSM490：溶接構造用（靭性保証）\n応力-ひずみ曲線：弾性→降伏→ひずみ硬化→破断\nヤング係数：2.0×10⁵ N/mm²（鋼材共通）\n線膨張係数：12×10⁻⁶/℃"},{title:"溶接の種類と欠陥",content:"完全溶込み溶接→突合せ溶接（主要部材）\n隅肉溶接→重ね・T継手\n欠陥：ブローホール・アンダーカット・溶込み不良・割れ\n非破壊検査：UT（超音波）・RT（放射線）・MT（磁粉）・PT（浸透）\n溶接後の残留応力→焼鈍しで低減"},{title:"高力ボルト接合",content:"摩擦接合→すべり摩擦力で応力伝達（最も一般的）\n引張接合→ボルト軸方向の引張力で伝達\nトルシア形高力ボルト→ピンテール破断で締付完了\n摩擦面処理：黒皮除去・すべり係数0.40以上\nF10T（M22）→締付軸力約205kN"},{title:"道路舗装の5層構造",content:"表層→基層→上層路盤→下層路盤→路床\n路床：舗装直下約1mの土\n設計CBR→路床の支持力評価\nCBR<3→路床改良が必要\n路盤材料：クラッシャーラン（下層）、粒調砕石（上層）"},{title:"アスファルト舗装の温度管理",content:"合材製造温度：160〜180℃\n敷均し温度：110℃以上\n初転圧：110〜140℃（ロードローラー10〜12t）\n二次転圧：70〜90℃（タイヤローラー）\n仕上げ転圧：50℃以上（タンデムローラー）"},{title:"アスファルト舗装の品質管理",content:"締固め度：基準密度の94%以上（表層・基層）\nマーシャル安定度試験→配合設計の基本試験\n現場透水量試験→舗装の水密性確認\n平坦性→3mプロフィルメーター\n横継目の重ね幅：15cm以上が目安"},{title:"TA法（等値換算厚さ法）",content:"TA = Σ（各層の厚さ × 等値換算係数）\n表層・基層→係数1.00\n上層路盤（粒調砕石）→係数0.55\n下層路盤（クラッシャーラン）→係数0.25\nセメント安定処理→係数0.55"},{title:"コンクリート舗装",content:"横収縮目地：8〜10m間隔\n膨張目地：120m以下の間隔\n版厚：15〜30cm（普通道路）\n曲げ強度：4.4N/mm²（28日）\n養生期間：現場養生14日以上\nダウエルバー→荷重伝達装置"},{title:"道路の計画・設計",content:"設計速度→道路の幾何構造を決定する基本値\n交通量区分：N1〜N7（大型車交通量で区分）\n設計CBRと交通量区分で舗装厚決定\n路肩・中央帯・車道幅員は道路構造令で規定\n曲線部：片勾配・拡幅・緩和曲線"}]},{category:"河川・砂防・ダム",icon:"🌊",color:"#16a085",items:[{title:"河川護岸の構成",content:"法覆工→のり面保護\n基礎工→法覆工の基礎\n根固工→法尻部の洗掘防止\n施工方向：上流→下流、法尻→上方\n練積み＞空積み（止水性・強度）"},{title:"護岸の種類",content:"コンクリートブロック積→練積み・空積み\nかごマット工→透水性あり・屈とう性\n連節ブロック→屈とう性に優れ法面変形に追従\n石積み→現在も使用される\n護岸背面→フィルター材設置で排水処理"},{title:"砂防えん堤",content:"水通し→本えん堤の中央部に設置\n袖部→水通しより高くする（越流防止）\n副えん堤→下流の洗掘防止\n前庭保護工：水叩き＋副えん堤＋護床工\nえん堤勾配：上流面1:0.2、下流面1:0.2"},{title:"ダムの形式",content:"重力式→自重で水圧に抵抗（広い谷向き）\nアーチ式→両岸の岩盤に水圧伝達（狭い谷・強固岩盤）\nフィルダム→土・岩を材料（ゾーン型：コア＋シェル）\nRCD工法→超硬練りコンクリートをローラー締固め\n重力式安定条件：転倒・滑動・応力の3条件"},{title:"重力式ダムの安定条件",content:"① 転倒に対する安全率≧4.0\n② 滑動に対する安全率≧4.0\n③ 基礎地盤内の応力が許容値以内\nフィルダムのコア材→透水係数10⁻⁵cm/s以下\n洪水吐き→すべてのダムに必須"},{title:"河川法の基礎",content:"一級河川→国土交通大臣管理\n二級河川→都道府県知事管理\n準用河川→市町村長管理\n河川区域内→許可が必要\n第24条（占用）25条（採取）26条（新築）27条（掘削）"},{title:"河川堤防",content:"表法（川表）→河川側の法面\n裏法（川裏）→堤内地（居住地）側\n天端幅→堤防の重要度により3〜6m程度\n計画高水位（HWL）＋余裕高＝堤防高さ\n浸透対策：ドレーン工（排水）、止水矢板（遮断）"},{title:"地すべり対策工",content:"抑制工→原因を除去（排水工・排土工・横ボーリング）\n抑止工→構造物で抑止（杭打ち工・アンカー工）\n対策の順序：抑制工を優先、必要に応じ抑止工\n地下水排除→最も基本的な抑制工\n集水井工・排水トンネル工も抑制工に分類"},{title:"砂防施設の種類",content:"砂防えん堤→土砂捕捉・流速減勢\n床固工→河床低下防止・縦断勾配安定\n水制→流水方向制御・河岸侵食防止\n導流工→土石流を安全方向に誘導\n遊砂地→土砂を堆積させる"},{title:"洪水調節",content:"ダムによる洪水調節→ピーク流量の低減\n遊水地→洪水を一時貯留\n放水路→河川水を別水系に分派\n堤防→計画高水流量を安全に流下\n河道掘削→流下能力の向上"}]},{category:"トンネル・海岸・港湾",icon:"🚇",color:"#2c3e50",items:[{title:"NATM工法の基本",content:"地山自体を支保構造の一部として利用\n一次支保工：吹付け＋ロックボルト＋鋼製支保工\n計測管理は必須（「補助的手段」は誤り）\n吹付けコンクリート厚：5〜20cm\nロックボルト長さ：3〜6m（一般的）"},{title:"トンネル掘削工法",content:"全断面掘削→良好な地山に適用\nベンチカット→普通〜やや不良な地山\n導坑先進→軟弱な地山\n発破工法→岩盤掘削\nTBM工法→回転カッターで機械掘削（低騒音）"},{title:"トンネルの計測管理",content:"A計測（日常管理・必須）：\n→天端沈下・内空変位・地表面沈下\nB計測（精密計測・選択）：\n→地中変位・支保工応力・ロックボルト軸力\n計測結果で支保パターンの変更判断"},{title:"シールドトンネル",content:"泥水式→泥水圧で切羽安定（砂礫・玉石に有利）\n土圧式→掘削土で切羽安定（粘性土・シルトに有利）\nセグメント→覆工構成部材（RC・鋼製・合成）\n裏込め注入→テールボイド充填・地盤変位抑制\n都市部の軟弱地盤で多用"},{title:"補助工法",content:"フォアパイリング→切羽前方を先受け（鋼管等）\n薬液注入→地盤固化・止水\nAGF（長尺鋼管先受け）→大断面・軟弱地山\n水抜きボーリング→湧水対策\nウレタン注入→漏水止め"},{title:"海岸保全施設（侵食対策）",content:"離岸堤→汀線に平行に設置（波エネルギー減衰）\n突堤→汀線に直角に設置（漂砂捕捉）\n養浜→砂を補給して海岸回復（環境に優しい）\n人工リーフ→海面下の没水構造物（景観良好）\nヘッドランド→T字型の制御構造物"},{title:"港湾構造物",content:"重力式（ケーソン式）→自重で土圧・水圧に抵抗\n→水深10m以上も可\n矢板式→鋼矢板＋控え工（タイロッド＋控え壁）\n→水深〜10m程度\nケーソン据付：注水沈設→中詰め→蓋コンクリート"},{title:"防波堤・消波工",content:"防波堤→港内の静穏度確保（外洋の波を遮断）\n消波ブロック→波エネルギーを減衰（テトラポッド等）\n混成堤→捨石マウンド上にケーソン据付\n直立堤→硬い地盤に直接設置\n傾斜堤→捨石のみで構成"},{title:"沈埋トンネル・開削工法",content:"沈埋トンネル→陸上製作の函体を水底に沈設連結\n→海峡横断等に使用\n開削トンネル→地表から掘削→構造物築造→埋戻し\n→都市部の浅い位置に多用\n推進工法→管体を地中に押し込む（開削不要）"}]},{category:"施工管理",icon:"📊",color:"#27ae60",items:[{title:"ネットワーク工程表",content:"クリティカルパス：TF=0の経路（最長経路）\nTF=LF-EF=LS-ES（トータルフロート）\nFF=後続最早開始-当該最早完了（フリーフロート）\nCPの遅れ→全体工期が延びる\nダミー→所要日数ゼロの仮想作業（先行関係のみ）"},{title:"バーチャート・Sカーブ",content:"バーチャート：各作業を横棒で表示\n○作成容易 ○各作業の日数が明確\n×作業間の相互関係が不明確\n×クリティカルパスが把握できない\nSカーブ→出来高累計をS字型曲線で管理"},{title:"管理図（X̄-R管理図）",content:"UCL=X̄+A₂·R̄ ｜ LCL=X̄-A₂·R̄\n異常判定：①管理限界線を超える\n②連続9点が中心線の片側\n③連続6点が増加/減少\n④連続14点が交互に増減"},{title:"工程能力指数Cp",content:"Cp=(規格上限-規格下限)/6σ\nCp≧1.33→優秀（十分な余裕）\nCp=1.00〜1.33→良好（余裕少ない）\nCp<1.00→能力不足（規格外れの恐れ）"},{title:"QC7つ道具",content:"①パレート図→不良の重点項目特定\n②特性要因図（魚の骨）→原因分析\n③ヒストグラム→データ分布\n④管理図→工程の時間的変化\n⑤散布図→2変数の相関\n⑥チェックシート→データ収集\n⑦層別→条件別に分類"},{title:"ヒストグラムの型",content:"正規分布型→工程安定\n二山型→異なる条件の混在\n絶壁型→データ選別（規格外除外）の疑い\n離れ小島型→異常値の存在\n歯抜け型→測定のまるめ誤差"},{title:"出来形管理基準",content:"土工の高さ：±30mm\n土工の幅：-50mm以内\nコンクリート厚さ：-30mm以内\n舗装上層路盤厚さ：-9mm以内\n法長：-100mm以内"},{title:"工期短縮手法",content:"クラッシング→CPの作業に資源追加（費用増）\nファストトラッキング→作業の並行化（リスク増）\n工法変更→機械化・大型化\n費用と工期のトレードオフ\n直接費↑・間接費↓の最適点を探す"},{title:"施工計画",content:"手順：事前調査→基本方針→詳細計画\n指定仮設→発注者指定（変更は承諾必要）\n任意仮設→受注者判断（変更自由）\n施工計画書は工事着手前に監督員に提出\nPDCA：計画→実行→検討→処置"},{title:"品質管理検査",content:"受入検査：スランプ・空気量・塩化物・温度・強度\n抜取検査→ロットからサンプルで合否判定\n全数検査→全て検査（コスト大）\n品確法→価格と品質が総合的に優れた調達"},{title:"ISO 9001品質管理",content:"品質マネジメントシステム（QMS）の国際規格\nPDCAサイクルに基づく継続的改善\n「品質管理の仕組みを保証」する規格\n製品の品質を直接保証するものではない\n7つの原則：顧客重視・リーダーシップ等"},{title:"建設機械の選定",content:"バックホウ→掘削（地表面より低い位置）\nブルドーザー→掘削・運搬（短距離60m以内）\nスクレーパー→掘削・積込み・運搬（中距離）\nダンプトラック→運搬（長距離）\n振動ローラー→締固め（砂質土に有効）"}]},{category:"安全管理",icon:"⛑️",color:"#e67e22",items:[{title:"足場の安全基準",content:"高さ2m以上→作業床設置義務\n作業床幅：40cm以上（一側足場20cm以上）\n手すり高さ：85cm以上＋中桟35〜50cm\n壁つなぎ（枠組）：垂直5m・水平5.5m以内\n手すり75cmは誤り→85cmが正解"},{title:"掘削作業の安全",content:"深さ2m以上→崩壊防止措置\n深さ1.5m以上→昇降設備の設置\n掘削面2m以上→地山の掘削作業主任者\n法面勾配：砂→35°以下、硬い粘土→75°以下\n点検：大雨・中震以上の地震後"},{title:"型枠支保工",content:"支柱の高さ3.5m以上→水平つなぎ2方向\n支柱の高さ2m以内ごとに水平つなぎ\n支柱の脚部→根がらみ、敷板使用\nコンクリート打込み時→偏圧防止\n組立て等作業主任者→規模に関わらず選任"},{title:"クレーン安全",content:"移動式3t以上→運転士免許\n1t以上3t未満→技能講習\n1t未満→特別教育\n玉掛け1t以上→技能講習\n定格荷重の超過は厳禁"},{title:"墜落制止用器具",content:"高さ6.75m超→フルハーネス型（原則）\n6.75m以下→胴ベルト型も可\n使用者→特別教育が必要\n2019年2月施行の改正法\n取付設備の強度確認も重要"},{title:"酸素欠乏危険作業",content:"酸素欠乏＝酸素濃度18%未満\n第2種→硫化水素10ppm以下も確認\n作業前に酸素濃度測定\n酸素欠乏危険作業主任者の選任\n特別教育の受講が必要"},{title:"安全衛生管理体制",content:"総括安全衛生管理者→100人以上\n安全管理者・衛生管理者・産業医→50人以上\n安全衛生推進者→10〜49人\n特定元方事業者→協議組織設置\n巡視→毎作業日1回以上"},{title:"高所作業車",content:"作業床の高さ10m以上→運転技能講習\n10m未満→特別教育\nアウトリガー→最大限張り出し\n作業床上で安全帯使用\n移動時→作業床に人を乗せない"},{title:"作業主任者が必要な作業",content:"型枠支保工の組立て・解体\n足場の組立て・解体（5m以上）\n地山の掘削（掘削面2m以上）\n土留め支保工の切りばり取付け・取外し\nコンクリート破砕器作業\n木造建築物の組立て等"},{title:"特別教育が必要な作業",content:"フルハーネス型墜落制止用器具（高さ6.75m超）\n酸素欠乏危険作業\nアーク溶接作業\n研削といしの取替え等\n1t未満のクレーン運転\nロープ高所作業"},{title:"新規入場者教育",content:"現場に新たに入場する都度実施（送り出し教育も）\n現場のルール・危険箇所・避難経路\n緊急連絡先・使用する保護具\n現場の安全衛生方針\n作業手順と注意事項"}]},{category:"法規",icon:"⚖️",color:"#8e44ad",items:[{title:"建設業許可",content:"大臣許可→2以上の都道府県に営業所\n知事許可→1つの都道府県のみ\n有効期間→5年\n一般建設業 vs 特定建設業\n軽微な工事→500万円未満（一式は1,500万円未満）"},{title:"技術者制度",content:"主任技術者→すべての工事に配置\n監理技術者→下請総額4,500万円以上\n（建築一式7,000万円以上）\n専任→3,500万円以上（一式7,000万円以上）\n監理技術者資格証の携帯・提示義務"},{title:"労働基準法",content:"法定労働時間：1日8時間・週40時間\n時間外25%以上・休日35%以上・深夜25%以上\n月60時間超→50%以上\n36協定→所轄労働基準監督署長に届出\n年次有給休暇：6ヶ月勤務→10日"},{title:"騒音・振動規制",content:"騒音：85dB以下\n振動：75dB以下\n届出：作業開始7日前→市町村長\n第1号区域：7〜19時・10時間以内・日祝禁止\n連続6日以内"},{title:"建設リサイクル法",content:"対象：コンクリート・アスファルト・木材\n解体→80㎡以上｜新築→500㎡以上\n土木→1億円以上\n届出：7日前→都道府県知事\n再資源化：コンクリ90%・木材70%"},{title:"廃棄物処理法",content:"排出事業者→元請業者（下請ではない）\nマニフェスト制度で管理\nB2・D票→90日以内\nE票→180日以内\n保存期間→5年間"},{title:"道路占用vs道路使用",content:"道路占用許可→道路法・道路管理者\n道路使用許可→道路交通法・警察署長\n占用＝継続的使用（電柱等）\n使用＝一時的作業（工事等）\n両方必要な場合→一括申請可"},{title:"一括下請負の禁止",content:"公共工事→全面禁止（承諾の有無に関わらず）\n民間工事→書面による事前承諾があれば可能\n一括下請負＝請け負った工事の全部を他人に請負わせること\n実質的な関与がないと一括下請負に該当\n違反→許可取消しの対象"},{title:"施工体制台帳",content:"特定建設業者が作成義務\n下請総額4,500万円以上の場合に作成\n記載事項：下請業者名・工事内容・技術者氏名等\n工事現場に備え付ける\n施工体系図を見やすい場所に掲示"},{title:"建設業法の時間外労働上限",content:"原則：月45時間・年360時間\n特別条項：年720時間以内\n月100時間未満（休日含む）\n2〜6ヶ月平均80時間以内\n2024年4月から建設業にも適用開始"}]},{category:"環境管理・測量",icon:"🌿",color:"#1abc9c",items:[{title:"建設副産物の3R",content:"リデュース（発生抑制）→最優先\nリユース（再使用）→2番目\nリサイクル（再生利用）→3番目\n優先順位を問われることが多い\n建設発生土は産業廃棄物に該当しない"},{title:"特別管理産業廃棄物",content:"廃石綿（アスベスト廃棄物）\n廃PCB（ポリ塩化ビフェニル）\n引火性廃油（揮発油類等）\n通常の産廃より厳格な管理・処理\n特別管理産業廃棄物管理責任者の選任"},{title:"石綿（アスベスト）対策",content:"解体前に事前調査→結果を報告義務\n石綿作業主任者の選任\n特殊健康診断の実施\n飛散防止措置：隔離・湿潤化・負圧管理\n大気汚染防止法・石綿障害予防規則で規制"},{title:"騒音・振動対策の手順",content:"発生源対策→低騒音型・低振動型機械の使用\n伝搬経路対策→防音壁（5〜15dB低減）・防音シート\n受音側対策→二重窓等\nこの順序で検討する\n住民への事前説明と苦情対応体制が重要"},{title:"水質汚濁防止",content:"コンクリート洗浄水→pH調整（中和）必要\n濁水→沈殿処理等が必要\n水質汚濁防止法→特定施設からの排水規制\n排水基準は建設工事にも適用\n上乗せ基準（地域差）もある"},{title:"環境影響評価（環境アセスメント）",content:"大規模事業の環境への影響を事前に調査・予測・評価\n住民・知事等の意見聴取手続き\n対象事業：道路・ダム・発電所等（規模要件あり）\n事前に行う（事後ではない）\n環境影響評価法に規定"},{title:"トータルステーション（TS）",content:"角度と距離を同時に測定する機器\n精度：角度1〜5秒、距離±(2mm+2ppm×D)\n据付手順：整準→求心→視準\n近年はGNSS測量も普及\nRTK測位→リアルタイムcm精度"},{title:"水準測量",content:"標高差を求める測量\n許容誤差（1級）：往復差2.5mm√S\n直接水準測量→レベルと標尺を使用\n間接水準測量→角度と距離から計算\n器械高・目標高の測定ミスに注意"},{title:"建設汚泥と建設発生土",content:"建設汚泥→産業廃棄物（適正処理義務）\n建設発生土→産業廃棄物に該当しない\n両者の法的扱いの違いは頻出\n建設汚泥：場所打ち杭・シールド等で発生\n建設発生土：普通の掘削土砂"},{title:"フロン・PCBの規制",content:"フロン排出抑制法→解体時のフロン回収義務\nPCB特措法→処分期限内に適正処理義務\nPCBは1972年に製造禁止\n変圧器・コンデンサに含まれることがある\n違反には罰則あり"}]}]
;

{ id:4, cat:"土質・基礎", diff:"★★★", q:"土の粒度に関する記述として正しいものはどれか。", choices:["A: 均等係数Ucが大きいほど粒径が均一である","B: 粒径が0.075mm以下の土を砂と分類する","C: 均等係数Uc≧10であれば粒度分布が良い（良級配）と判定する","D: 粘土の粒径は0.075mm以下と定義される"], ans:2, exp:"均等係数Uc=D60/D10で、Uc≧10で良級配。Ucが大きいほど粒径の範囲が広い（均一ではない）。粘土は0.005mm以下、0.075mm以下全体は細粒分（シルト＋粘土）。" },
{ id:5, cat:"土質・基礎", diff:"★★☆", q:"土の間隙比eに関する記述として正しいものはどれか。", choices:["A: 間隙比e＝間隙の体積/土粒子の体積","B: 間隙比e＝土粒子の体積/間隙の体積","C: 間隙比eは常に1以下の値をとる","D: 間隙比eと間隙率nは同じ値である"], ans:0, exp:"間隙比e=Vv/Vs（間隙の体積/土粒子の体積）。eは1を超えることもある（軟弱粘土等）。間隙率n=Vv/V（間隙の体積/全体積）で、n=e/(1+e)の関係がある。" },
{ id:6, cat:"土質・基礎", diff:"★★★", q:"土の含水比試験に関する記述として誤っているものはどれか。", choices:["A: 含水比w＝水の質量/土粒子の質量×100で表す","B: 炉乾燥温度は110±5℃が標準である","C: 含水比は0〜100%の範囲に限られる","D: 有機質土では炉乾燥温度を下げることがある"], ans:2, exp:"含水比は100%を超えることがある（C=誤り）。含水比は水の質量を土粒子の質量で割った値なので、水が土粒子より重い場合（軟弱粘土等）は100%超になる。" },
{ id:7, cat:"土質・基礎", diff:"★★☆", q:"CBR試験に関する記述として正しいものはどれか。", choices:["A: CBR値は路床の支持力を表す指標である","B: CBR値が大きいほど支持力は小さい","C: 設計CBRは現場CBRの平均値を採用する","D: CBR試験はハンマーを落下させて行う"], ans:0, exp:"CBR（California Bearing Ratio）は路床・路盤の支持力を評価する指標（A=正）。値が大きいほど支持力が高い。設計CBRは小さい方から数えた値を採用し、平均値ではない。" },
{ id:8, cat:"土質・基礎", diff:"★★★", q:"軟弱地盤対策工法に関する記述として誤っているものはどれか。", choices:["A: サンドドレーン工法は圧密排水を促進する工法である","B: プレロード工法は載荷重により事前に圧密沈下を促進する","C: バイブロフローテーション工法は粘性土地盤の締固めに有効である","D: 深層混合処理工法はセメント系固化材で地盤を改良する"], ans:2, exp:"バイブロフローテーション工法は砂質土地盤の締固めに有効であり、粘性土地盤には適用が困難（C=誤り）。粘性土にはサンドドレーン、プレロード等の圧密促進工法が有効。" },
{ id:9, cat:"土質・基礎", diff:"★★☆", q:"直接基礎の設計に関する記述として正しいものはどれか。", choices:["A: 直接基礎は支持層が深い場合に適用する","B: フーチングの根入れ深さは凍結深さ以上とする","C: 基礎底面の接地圧は常に均一分布である","D: 直接基礎には偏心荷重が作用しない"], ans:1, exp:"直接基礎のフーチングは凍結深さ以上の根入れが必要（B=正）。直接基礎は支持層が浅い場合に適用。接地圧は荷重条件により台形分布等になる場合がある。" },
{ id:10, cat:"土質・基礎", diff:"★★★", q:"場所打ち杭の工法として正しくないものはどれか。", choices:["A: オールケーシング工法","B: リバースサーキュレーション工法","C: アースドリル工法","D: バイブロハンマー工法"], ans:3, exp:"バイブロハンマー工法は既製杭の打込み工法であり、場所打ち杭の工法ではない（D=正しくない）。場所打ち杭はオールケーシング・リバース・アースドリルが代表的。" },
{ id:11, cat:"土質・基礎", diff:"★★☆", q:"杭基礎の支持力に関する記述として正しいものはどれか。", choices:["A: 支持杭の支持力は周面摩擦力のみで決まる","B: 摩擦杭は先端を支持層に到達させる必要がある","C: 杭の許容支持力は先端支持力と周面摩擦力の合計を安全率で除した値である","D: 負の周面摩擦力は杭の支持力を増大させる"], ans:2, exp:"杭の許容支持力Ra=(先端支持力Rp+周面摩擦力Rf)/安全率（C=正）。支持杭は先端支持力が主体、摩擦杭は周面摩擦力が主体。負の摩擦力（ネガティブフリクション）は支持力を低下させる。" },
{ id:12, cat:"土質・基礎", diff:"★★★", q:"土圧に関する記述として誤っているものはどれか。", choices:["A: 主働土圧は壁が土から離れる方向に変位したときの土圧である","B: 受働土圧は壁が土に向かって変位したときの土圧である","C: 静止土圧は主働土圧より小さい","D: 受働土圧は主働土圧より大きい"], ans:2, exp:"静止土圧は壁が変位しない状態の土圧で、主働土圧より大きい（C=誤り）。大小関係は受働土圧＞静止土圧＞主働土圧。クーロン・ランキンの土圧論も整理しておく。" },
{ id:13, cat:"土質・基礎", diff:"★★☆", q:"地盤の液状化に関する記述として正しいものはどれか。", choices:["A: 粘性土地盤で発生しやすい","B: 地下水位が高い飽和砂質地盤で発生しやすい","C: 地震の規模が小さいほど発生しやすい","D: N値が大きいほど発生しやすい"], ans:1, exp:"液状化は地下水位が高い飽和した緩い砂質地盤で地震時に発生しやすい（B=正）。N値が小さい（緩い）砂地盤ほど危険。粘性土は一般に液状化しにくい。" },
{ id:14, cat:"土質・基礎", diff:"★★★", q:"圧密試験に関する記述として誤っているものはどれか。", choices:["A: 圧密試験は粘性土の圧縮特性を調べる試験である","B: 圧密降伏応力は過去に受けた最大有効応力に相当する","C: 圧密係数Cvは圧密速度を表す指標である","D: 砂質土は粘性土より圧密に要する時間が長い"], ans:3, exp:"砂質土は透水性が高いため圧密は瞬時に完了し、粘性土より時間が短い（D=誤り）。粘性土の圧密には長期間かかり、これが軟弱地盤の沈下問題の原因。" },
{ id:15, cat:"土質・基礎", diff:"★★☆", q:"盛土の施工管理に関する記述として正しいものはどれか。", choices:["A: 1層の仕上り厚さは50cm以下とする","B: 締固めは最適含水比付近で行うのが効率的である","C: 盛土材料として有機質土が最も適している","D: 締固め回数は多いほど常に効果が上がる"], ans:1, exp:"締固めは最適含水比wopt付近で行うと最大乾燥密度γdmaxが得られ最も効率的（B=正）。1層仕上り厚は30cm以下が一般的。有機質土は盛土材料に不適。過度の締固めはオーバーコンパクション（過転圧）となり逆効果。" },
{ id:16, cat:"土質・基礎", diff:"★★★", q:"ボーリング調査に関する記述として正しいものはどれか。", choices:["A: ロータリーボーリングは回転力で掘削する方法である","B: ボーリングの孔径は標準で200mm以上とする","C: オールコアボーリングでは試料の採取はできない","D: ボーリング孔は調査後そのまま放置してよい"], ans:0, exp:"ロータリーボーリングはビットを回転させて掘削する最も一般的な方法（A=正）。標準孔径は66mm（標準貫入試験用）。オールコアは連続した試料を採取可能。調査後は適切に埋め戻す。" },
{ id:17, cat:"土質・基礎", diff:"★★☆", q:"土の透水係数に関する記述として正しいものはどれか。", choices:["A: 粘土の透水係数は砂の透水係数より大きい","B: 透水係数が大きいほど水が通りにくい","C: 砂礫の透水係数は10⁻¹〜10⁻³cm/s程度である","D: 透水係数は温度の影響を受けない"], ans:2, exp:"砂礫の透水係数は10⁻¹〜10⁻³cm/s程度（C=正）。粘土は10⁻⁶〜10⁻⁸cm/s程度で砂より極めて小さい。透水係数が大きいほど水が通りやすく、温度の影響も受ける。" },
