{ id:18, cat:"土質・基礎", diff:"★★★", q:"サンドコンパクションパイル工法に関する記述として正しいものはどれか。", choices:["A: 砂杭を造成して地盤の密度を増加させる工法である","B: 粘性土地盤には適用できない","C: 砂杭の直径は一般に2m以上である","D: 振動や騒音がほとんど発生しない"], ans:0, exp:"サンドコンパクションパイル（SCP）工法は振動や衝撃により砂杭を造成し、周辺地盤の密度を増加させる工法（A=正）。粘性土にも適用可。砂杭径は通常0.4〜0.7m程度。振動・騒音は発生する。" },
{ id:19, cat:"土質・基礎", diff:"★★☆", q:"PHC杭に関する記述として正しいものはどれか。", choices:["A: PHCとはPretensioned High-strength Concreteの略である","B: PHC杭は場所打ち杭の一種である","C: 杭の継手にはすべて溶接を用いる","D: PHC杭は遠心力により成形される"], ans:3, exp:"PHC杭（Pretensioned spun High-strength Concrete杭）は遠心力締固めにより製造される既製コンクリート杭（D=正）。Aの略称にspunが抜けている。場所打ちではなく工場製作品。継手は溶接の他、機械式継手もある。" },
{ id:20, cat:"土質・基礎", diff:"★★★", q:"スウェーデン式サウンディング試験に関する記述として誤っているものはどれか。", choices:["A: 最大荷重1kNまで載荷して貫入量を測定する","B: 貫入しない場合はハンドルを回転させて貫入させる","C: 深い地盤（15m超）の調査に最も適している","D: 主に軟弱地盤の調査に用いられる"], ans:2, exp:"スウェーデン式サウンディング試験（SWS）は深度10m程度までの比較的浅い軟弱地盤調査に適しており、深い地盤（15m超）には適さない（C=誤り）。深い地盤にはボーリング調査が適切。" },
{ id:21, cat:"土質・基礎", diff:"★★☆", q:"地盤改良工法のうち、置換工法の説明として正しいものはどれか。", choices:["A: 軟弱土をセメントで固化する工法","B: 軟弱土を良質土に入れ替える工法","C: 地盤に砂の柱を造成する工法","D: 盛土荷重で事前に沈下させる工法"], ans:1, exp:"置換工法は軟弱な土層を掘削除去し、良質な砂や砕石に入れ替える工法（B=正）。Aは固化処理工法、Cはサンドドレーン等、Dはプレロード工法の説明。" },
{ id:22, cat:"土質・基礎", diff:"★★★", q:"一面せん断試験に関する記述として正しいものはどれか。", choices:["A: せん断面が予め決められている試験である","B: 排水条件を自由に制御できる","C: 三軸圧縮試験より信頼性が高い","D: 供試体は円柱形でなければならない"], ans:0, exp:"一面せん断試験はせん断面が水平面として予め決められている（A=正）。排水条件の制御は三軸圧縮試験の方が優れており、一般に三軸圧縮試験の方が信頼性が高い。供試体は角柱形が一般的。" },
{ id:23, cat:"土質・基礎", diff:"★★☆", q:"土の締固め試験に関する記述として正しいものはどれか。", choices:["A: JIS A 1210に規定されている","B: 突固め回数が少ないほど最大乾燥密度は大きくなる","C: 試料は一度使用したものを再利用する","D: 締固め曲線は直線となる"], ans:0, exp:"土の締固め試験はJIS A 1210（突固めによる締固め試験）に規定（A=正）。突固め回数・エネルギーが大きいほど最大乾燥密度は大きくなる。各点で新しい試料を使用。締固め曲線は山型の曲線。" },
{ id:24, cat:"土質・基礎", diff:"★★★", q:"粘土のクリープ現象に関する記述として正しいものはどれか。", choices:["A: 荷重を除去すると直ちに変形が回復する","B: 一定応力のもとで時間とともに変形が進行する現象である","C: 砂質土で特に顕著に見られる","D: 短期間で完了するため設計上は無視できる"], ans:1, exp:"クリープは一定応力のもとで時間経過とともに変形が進行する現象（B=正）。粘性土で顕著に見られ、荷重除去後も完全には回復しない。長期間にわたり進行するため、設計上考慮が必要な場合がある。" },
{ id:25, cat:"土質・基礎", diff:"★★☆", q:"鋼管杭の施工に関する記述として正しいものはどれか。", choices:["A: 中掘り工法では杭の中空部を掘削しながら沈設する","B: 鋼管杭は腐食の心配がないため防食処理は不要である","C: 打撃工法は市街地で最も推奨される工法である","D: 鋼管杭の継手は重ね継手が一般的である"], ans:0, exp:"中掘り工法は鋼管杭の中空部にオーガーを挿入して掘削しながら杭を沈設する工法（A=正）。鋼管は腐食するため防食処理が必要。打撃工法は騒音・振動が大きく市街地では制約あり。継手は溶接が一般的。" },
{ id:26, cat:"土質・基礎", diff:"★★★", q:"有効応力の原理に関する記述として正しいものはどれか。", choices:["A: 全応力＝有効応力＋間隙水圧","B: 全応力＝有効応力−間隙水圧","C: 有効応力＝全応力＋間隙水圧","D: 間隙水圧＝有効応力＋全応力"], ans:0, exp:"テルツァーギの有効応力の原理：全応力σ＝有効応力σ'＋間隙水圧u（A=正）。土のせん断強度や圧縮は有効応力に支配される。この原理は土質力学の最も基本的な概念。" },
{ id:27, cat:"土質・基礎", diff:"★★☆", q:"地盤のN値と基礎形式の選定に関する記述として最も適切なものはどれか。", choices:["A: N値が50以上の層が浅い位置にあれば直接基礎が適用できる","B: N値に関係なく直接基礎を第一選択とする","C: 杭基礎はN値が50以上の地盤でないと適用できない","D: N値が0の層があっても直接基礎で問題ない"], ans:0, exp:"支持層（N値50以上等の硬い層）が浅い位置にあれば直接基礎が適用可能（A=正）。支持層が深い場合は杭基礎を検討。杭はN値50以上の層に先端を根入れさせるのが一般的。" },
{ id:28, cat:"土質・基礎", diff:"★★★", q:"ウェルポイント工法に関する記述として正しいものはどれか。", choices:["A: 地下水位を低下させる排水工法の一つである","B: 粘性土地盤に最も有効である","C: 揚水量の制限がないため大規模掘削に最適である","D: 吸引揚程に限界がないため深い掘削にも適用できる"], ans:0, exp:"ウェルポイント工法は真空吸引により地下水位を低下させる排水工法（A=正）。砂質土で有効で、粘性土には不向き。吸引揚程は約6m程度が限界であり、それ以上はディープウェル工法を使用。" },
{ id:29, cat:"土質・基礎", diff:"★★☆", q:"盛土の法面勾配に関する記述として正しいものはどれか。", choices:["A: 盛土高が高くなるほど法面勾配を急にできる","B: 土質や盛土高に応じて適切な法面勾配を設定する","C: 法面勾配は一律1:1.5と定められている","D: 砂質土より粘性土の方が急な法面勾配にできる"], ans:1, exp:"盛土の法面勾配は土質・盛土高に応じて適切に設定する（B=正）。高い盛土ほど安定性確保のため緩い勾配が必要。勾配は一律ではなく土質により異なる。砂質土と粘性土では適切な勾配が異なる。" },
{ id:30, cat:"土質・基礎", diff:"★★★", q:"根切り工事における矢板工法に関する記述として誤っているものはどれか。", choices:["A: 鋼矢板は止水性に優れている","B: 親杭横矢板工法は止水性が低い","C: ソイルセメント壁は遮水性に優れている","D: 鋼矢板の根入れ長は常に掘削深さの1/2でよい"], ans:3, exp:"鋼矢板の根入れ長は一律掘削深さの1/2ではなく、土質条件・荷重条件に応じた計算により決定する（D=誤り）。土圧や水圧、地質条件により必要根入れ長は大きく変わる。" },
{ id:31, cat:"土質・基礎", diff:"★★☆", q:"RI計器による土の密度試験に関する記述として正しいものはどれか。", choices:["A: 放射性同位元素を利用して密度と含水量を測定する","B: 測定に長時間かかるため現場では使われない","C: 突砂法と同じ原理の試験である","D: 室内試験でのみ使用される"], ans:0, exp:"RI計器は放射性同位元素（ガンマ線・中性子線）を利用して現場で短時間に湿潤密度と含水量を測定できる（A=正）。現場での迅速な品質管理に広く利用されている。" },
{ id:32, cat:"土質・基礎", diff:"★★★", q:"安定処理に関する記述として正しいものはどれか。", choices:["A: セメント安定処理は有機質土に最も効果的である","B: 石灰安定処理は含水比の高い粘性土に有効である","C: 安定処理材の添加量は土質に関係なく一定である","D: 安定処理後の強度は時間とともに低下する"], ans:1, exp:"石灰安定処理は含水比が高い粘性土の脱水・改質に有効（B=正）。セメント安定処理は有機質土には効果が低い（腐植酸がセメントの硬化を阻害）。添加量は土質により異なり、強度は時間とともに増加する。" },
{ id:33, cat:"土質・基礎", diff:"★★☆", q:"ベーン試験に関する記述として正しいものはどれか。", choices:["A: 主に砂質土の強度を測定する試験である","B: 十字形の羽根を地盤に挿入して回転させ、せん断強さを求める","C: 標準貫入試験と同じ装置を使用する","D: 室内でのみ実施可能な試験である"], ans:1, exp:"ベーン試験は十字形の羽根（ベーン）を軟弱な粘性土地盤に挿入し回転させて非排水せん断強さを求める原位置試験（B=正）。砂質土には適さず、粘性土の強度測定に特化している。" },
{ id:34, cat:"土質・基礎", diff:"★★★", q:"杭の載荷試験に関する記述として正しいものはどれか。", choices:["A: 押込み載荷試験では杭頭に荷重を載荷して沈下量を測定する","B: 載荷試験は杭の施工後に行うことはできない","C: 引抜き試験では先端支持力のみが測定できる","D: 水平載荷試験は杭の鉛直支持力を測定する"], ans:0, exp:"押込み載荷試験は杭頭にジャッキ等で荷重を載荷し、沈下量を測定して支持力を確認する（A=正）。施工後の確認のために行う。引抜き試験は周面摩擦力を、水平載荷試験は水平抵抗力を測定する。" },
{ id:35, cat:"土質・基礎", diff:"★★☆", q:"土工における法面保護工に関する記述として正しいものはどれか。", choices:["A: 植生工は切土法面には適用できない","B: モルタル吹付工は法面の風化防止に有効である","C: 法面排水工は法面保護には含まれない","D: コンクリート張工は透水性に優れている"], ans:1, exp:"モルタル・コンクリート吹付工は法面の風化・侵食防止に有効（B=正）。植生工は切土法面にも適用可能。法面排水工は法面保護の重要な一部。コンクリート張工は不透水。" },
{ id:36, cat:"土質・基礎", diff:"★★★", q:"地すべり対策工に関する記述として正しいものはどれか。", choices:["A: 抑止工は地すべりの原因を取り除く工法である","B: 排水工は抑制工に分類される","C: 杭工は抑制工に分類される","D: 抑制工と抑止工を併用してはならない"], ans:1, exp:"地すべり対策は抑制工（原因除去：排水工・排土工等）と抑止工（構造物で抵抗：杭工・アンカー工等）に分類。排水工は抑制工（B=正）、杭工は抑止工。通常は両者を併用する。" },
{ id:37, cat:"土質・基礎", diff:"★★☆", q:"粒度試験に関する記述として正しいものはどれか。", choices:["A: ふるい分析は粒径0.075mm以上の粗粒分に適用する","B: 沈降分析は粒径2mm以上の粗粒分に適用する","C: 粒度試験の結果は含水比曲線で表す","D: ふるい分析と沈降分析は同時に行うことはできない"], ans:0, exp:"ふるい分析は粒径0.075mm以上の粗粒分に、沈降分析（ストークスの法則利用）は0.075mm以下の細粒分に適用する（A=正）。結果は粒径加積曲線で表す。両方を組み合わせて全粒度を把握する。" },
{ id:38, cat:"土質・基礎", diff:"★★★", q:"アンカー工法に関する記述として誤っているものはどれか。", choices:["A: グラウンドアンカーは地盤中に定着させたテンドンで引張力を伝達する","B: 永久アンカーは防食処理が必要である","C: アンカーの緊張力は確認試験で検証する","D: アンカー体は不動地盤中に設ける必要はない"], ans:3, exp:"アンカー体（定着部）は必ず不動地盤（すべり面の外側等）に設置しなければならない（D=誤り）。不動地盤に定着させることで初めて引止め効果が発揮される。" },
{ id:39, cat:"コンクリート", diff:"★★★", q:"コンクリートの水セメント比（W/C）に関する記述として誤っているものはどれか。", choices:["A: W/Cが小さいほど圧縮強度は大きくなる","B: 海洋構造物に使用するコンクリートのW/Cは55%以下とする","C: W/Cが大きいほど乾燥収縮が大きくなる","D: W/Cが小さいほど凍結融解抵抗性が向上する"], ans:1, exp:"海洋構造物のW/Cの上限は45%以下。55%は一般的な構造物の基準で、海洋環境ではより厳しい基準が適用されます。B=誤り。" },
{ id:40, cat:"コンクリート", diff:"★★☆", q:"寒中コンクリートに関する記述として正しいものはどれか。", choices:["A: 日平均気温が4℃以下になることが予想されるとき適用する","B: コンクリートの練上がり温度は5℃以下とする","C: 打込み後の養生温度は2℃以下に保持する","D: 養生終了の目安は圧縮強度1N/mm²に達したとき"], ans:0, exp:"寒中コンクリートは日平均気温4℃以下が予想される場合に適用（A=正）。練上がり温度は10〜20℃が目安。養生温度は5℃以上保持。養生終了目安は圧縮強度5N/mm²以上。" },
{ id:41, cat:"コンクリート", diff:"★★★", q:"普通ポルトランドセメントの湿潤養生期間として正しいものはどれか（日平均気温15℃以上の場合）。", choices:["A: 3日以上","B: 5日以上","C: 7日以上","D: 9日以上"], ans:1, exp:"土木学会コンクリート標準示方書：普通ポルトランドセメント→15℃以上で5日、10℃以上で7日、5℃以上で9日。早強は15℃以上で3日。" },
{ id:42, cat:"コンクリート", diff:"★★☆", q:"コンクリートのスランプに関する記述として正しいものはどれか。", choices:["A: スランプ値が大きいほど硬練りのコンクリートである","B: スランプの許容差は指定スランプ8cm以上で±2.5cmである","C: スランプ試験はコンクリートの強度を測定する試験である","D: スランプコーンの高さは20cmである"], ans:1, exp:"スランプ8cm以上の場合の許容差は±2.5cm（B=正）。スランプが大きいほど軟練り。スランプ試験はワーカビリティー（施工性）の指標。スランプコーンの高さは30cm。" },
{ id:43, cat:"コンクリート", diff:"★★★", q:"コンクリートの空気量に関する記述として誤っているものはどれか。", choices:["A: AEコンクリートの空気量は一般に4〜7%程度である","B: 空気量が増加すると凍結融解抵抗性が向上する","C: 空気量が1%増加するごとに圧縮強度は約4〜6%低下する","D: 空気量の許容差は±2.5%である"], ans:3, exp:"空気量の許容差は±1.5%（D=誤り）。AEコンクリートの標準空気量は4.5%で±1.5%が許容範囲。空気量の増加は耐凍害性を向上させるが、強度は低下する。" },
{ id:44, cat:"コンクリート", diff:"★★☆", q:"セメントの種類と特性に関する記述として正しいものはどれか。", choices:["A: 早強ポルトランドセメントは普通に比べ初期強度の発現が早い","B: 高炉セメントB種はアルカリシリカ反応の抑制効果がない","C: 中庸熱ポルトランドセメントは水和熱が最も大きい","D: フライアッシュセメントは初期強度が最も高い"], ans:0, exp:"早強ポルトランドセメントはC₃S（けい酸三カルシウム）が多く、初期強度の発現が早い（A=正）。高炉セメントB種はASR抑制効果あり。中庸熱は水和熱が小さい。フライアッシュは初期強度が低い。" },
{ id:45, cat:"コンクリート", diff:"★★★", q:"コンクリートの中性化に関する記述として誤っているものはどれか。", choices:["A: 大気中のCO₂がコンクリート中に浸入してpHを低下させる","B: 中性化が鉄筋位置まで達すると鉄筋腐食が始まる","C: W/Cが大きいほど中性化は遅い","D: かぶり厚さが大きいほど鉄筋位置までの中性化に時間がかかる"], ans:2, exp:"W/Cが大きいほど組織が粗くなりCO₂が浸入しやすいため中性化は早い（C=誤り）。対策はW/Cを小さくし、かぶりを大きくすること。中性化深さは√tに比例する。" },
{ id:46, cat:"コンクリート", diff:"★★☆", q:"コンクリートの配合に関する記述として正しいものはどれか。", choices:["A: 単位水量が多いほど乾燥収縮が小さくなる","B: 細骨材率（s/a）とは全骨材に占める細骨材の容積百分率である","C: 単位セメント量の下限値は設定されていない","D: AE減水剤を使用すると単位水量は増加する"], ans:1, exp:"細骨材率s/aは全骨材の絶対容積に対する細骨材の絶対容積の百分率（B=正）。単位水量が多いほど乾燥収縮は大きい。単位セメント量は最小値が定められている。AE減水剤は単位水量を低減する。" },
{ id:47, cat:"コンクリート", diff:"★★★", q:"鉄筋のかぶり厚さに関する記述として正しいものはどれか。", choices:["A: 土中に設置する構造物のかぶりは40mm以上である","B: 水中に設置する構造物のかぶりは70mm以上である（土木学会）","C: かぶり厚さは鉄筋表面からコンクリート表面までの距離である","D: B及びCのどちらも正しい"], ans:3, exp:"水中のかぶりは70mm以上（土木学会基準）。かぶり厚さは鉄筋表面からコンクリート表面までの最短距離。BもCも正しいのでD=正解。土中は60mm以上。" },
{ id:48, cat:"コンクリート", diff:"★★☆", q:"コンクリートの養生に関する記述として誤っているものはどれか。", choices:["A: 湿潤養生はセメントの水和反応に必要な水分を保持するために行う","B: 膜養生は養生剤を塗布して水分の蒸発を防ぐ方法である","C: 養生温度が高いほど長期強度は必ず高くなる","D: 蒸気養生はプレキャスト製品の製造等に用いられる"], ans:2, exp:"養生温度が高いと初期強度は早く発現するが、長期強度は必ずしも高くならず、かえって低下する場合がある（C=誤り）。これは急速な水和により組織が粗くなることが原因。" },
{ id:49, cat:"コンクリート", diff:"★★★", q:"コンクリートの塩害に関する記述として正しいものはどれか。", choices:["A: 塩害は海岸から離れた内陸部では発生しない","B: 塩化物イオンが鉄筋位置まで浸透すると不動態被膜が破壊される","C: 塩害を受けたコンクリートは中性化しない","D: 塩害対策としてW/Cを大きくすることが有効である"], ans:1, exp:"塩化物イオン（Cl⁻）が鉄筋位置まで浸透すると鉄筋の不動態被膜を破壊し腐食が始まる（B=正）。凍結防止剤により内陸でも発生。塩害と中性化は独立事象。対策はW/Cを小さくする。" },
{ id:50, cat:"コンクリート", diff:"★★☆", q:"コンクリートの骨材に関する記述として正しいものはどれか。", choices:["A: 粗骨材の最大寸法は部材最小断面の1/4以下とする","B: 骨材のアルカリシリカ反応は骨材中の反応性鉱物が原因である","C: 砕石は川砂利に比べてワーカビリティーに優れる","D: 骨材の吸水率は大きいほど品質が良い"], ans:1, exp:"アルカリシリカ反応（ASR）は骨材中の反応性シリカ鉱物とセメント中のアルカリが反応して膨張ひび割れを生じる（B=正）。粗骨材最大寸法は部材最小断面の1/5以下。砕石は角張りがありワーカビリティーは劣る。" },
{ id:51, cat:"コンクリート", diff:"★★★", q:"暑中コンクリートに関する記述として誤っているものはどれか。", choices:["A: 日平均気温が25℃を超える場合に適用する","B: 練上がり温度は35℃以下を標準とする","C: コールドジョイントが発生しやすくなる","D: 養生期間は寒中コンクリートより短くてよい"], ans:3, exp:"暑中コンクリートでは水分の蒸発が早いため、養生期間は通常より短くしてよいわけではなく、むしろ湿潤養生を十分に行う必要がある（D=誤り）。高温により水和が速いが乾燥ひび割れの危険が増す。" },
{ id:52, cat:"コンクリート", diff:"★★☆", q:"コンクリートの打込みに関する記述として正しいものはどれか。", choices:["A: コンクリートの自由落下高さは制限されていない","B: 打込みの1層の厚さは40〜50cm以下を標準とする","C: コンクリートは材料分離を起こさないように打ち込む","D: BとCのどちらも正しい"], ans:3, exp:"打込みの1層の厚さは40〜50cm以下とし、材料分離を起こさないように打ち込む（D=正）。自由落下高さは1.5m以下が標準。シュート使用時は縦シュートが望ましい。" },
{ id:53, cat:"コンクリート", diff:"★★★", q:"コンクリートの打継目に関する記述として誤っているものはどれか。", choices:["A: 打継目はせん断力の小さい位置に設ける","B: 水平打継目では旧コンクリート表面のレイタンスを除去する","C: 打継目にはモルタルを敷いてから新しいコンクリートを打ち込む","D: 打継目の位置はできるだけ多く設ける方がよい"], ans:3, exp:"打継目は弱点となりやすいので、できるだけ少なくし、設ける場合はせん断力の小さい位置に配置する（D=誤り）。旧面のレイタンス除去とモルタル敷きは一体性確保のために重要。" },
{ id:54, cat:"コンクリート", diff:"★★☆", q:"コンクリートの圧縮強度試験に関する記述として正しいものはどれか。", choices:["A: 供試体は直径10cm×高さ20cmの円柱形が標準である","B: 材齢28日の圧縮強度を設計基準強度として用いる","C: 供試体の数は1回の試験につき1本でよい","D: AとBのどちらも正しい"], ans:3, exp:"圧縮強度試験の標準供試体はφ10cm×20cmの円柱形で、材齢28日強度を設計基準強度とする（D=正）。供試体は1回の試験に3本作製し、その平均値を試験値とする。" },
{ id:55, cat:"コンクリート", diff:"★★★", q:"ガス圧接継手に関する記述として正しいものはどれか。", choices:["A: ふくらみの直径は鉄筋径の1.4倍以上必要である","B: 異径の鉄筋は圧接できない","C: 圧接面のグラインダー研磨は不要である","D: ふくらみの長さは鉄筋径の2.0倍以上必要である"], ans:0, exp:"ガス圧接のふくらみの直径は鉄筋径の1.4倍以上、長さは1.1倍以上が合格基準（A=正）。異径鉄筋も細い方の径差が7mm以下なら圧接可能。圧接面はグラインダー研磨が必要。" },
{ id:56, cat:"コンクリート", diff:"★★☆", q:"コンクリートの乾燥収縮に関する記述として正しいものはどれか。", choices:["A: 単位水量が少ないほど乾燥収縮は大きい","B: 乾燥収縮はひび割れの主要な原因の一つである","C: 乾燥収縮は環境の湿度に影響されない","D: 骨材量が多いほど乾燥収縮は大きい"], ans:1, exp:"乾燥収縮はコンクリートのひび割れの最も一般的な原因の一つ（B=正）。単位水量が多いほど収縮は大きい。湿度が低いほど収縮が進む。骨材量が多いほど収縮は抑制される。" },
{ id:57, cat:"コンクリート", diff:"★★★", q:"コンクリートのクリープに関する記述として誤っているものはどれか。", choices:["A: 持続荷重のもとで時間とともに変形が増加する現象である","B: 応力が大きいほどクリープ変形は大きい","C: 載荷時の材齢が若いほどクリープは大きい","D: W/Cが小さいほどクリープは大きい"], ans:3, exp:"W/Cが小さいほど組織が密でクリープは小さい（D=誤り）。クリープは持続荷重下での変形増加現象で、応力が大きく材齢が若いほど大きくなる。プレストレストコンクリートの設計で特に重要。" },
{ id:58, cat:"コンクリート", diff:"★★☆", q:"AE剤の主な効果として正しいものはどれか。", choices:["A: 初期強度を増大させる","B: 凝結時間を遅延させる","C: 微細な独立気泡を連行しワーカビリティーと耐凍害性を向上させる","D: セメントの水和熱を低減させる"], ans:2, exp:"AE剤はコンクリート中に微細な独立気泡を均一に分布させ、ワーカビリティーの向上と凍結融解抵抗性の向上を実現する（C=正）。ただし空気量増加による強度低下に注意。" },
{ id:59, cat:"コンクリート", diff:"★★★", q:"鉄筋の重ね継手に関する記述として正しいものはどれか。", choices:["A: 継手位置は応力の大きい箇所に設ける","B: 重ね継手の長さは鉄筋径に関係なく一定である","C: 同一断面に集中して設けることが望ましい","D: 重ね継手の長さは鉄筋径の20倍以上を基本とする"], ans:3, exp:"重ね継手の長さは鉄筋径の20倍以上（コンクリート強度等により変動）を基本とする（D=正）。継手位置は応力の小さい箇所に設け、同一断面への集中は避ける。" },
{ id:60, cat:"コンクリート", diff:"★★☆", q:"コンクリートの混和材料に関する記述として正しいものはどれか。", choices:["A: 減水剤はセメント粒子を分散させて所要の流動性を得るものである","B: 膨張材はコンクリートの収縮を促進させる","C: 防錆剤はコンクリートの強度を向上させる","D: 急結剤はコンクリートの凝結を遅らせる"], ans:0, exp:"減水剤はセメント粒子を分散させ、少ない水量で所要のワーカビリティーを得る混和剤（A=正）。膨張材は収縮を補償。防錆剤は鉄筋腐食防止。急結剤は凝結を早める（吹付けコンクリート等に使用）。" },
{ id:61, cat:"コンクリート", diff:"★★★", q:"マスコンクリートに関する記述として正しいものはどれか。", choices:["A: 部材寸法が大きく、セメントの水和熱による温度上昇が問題となるコンクリートである","B: 高強度コンクリートと同義である","C: 中庸熱セメントの使用は不適切である","D: 内部と表面の温度差は特に管理する必要がない"], ans:0, exp:"マスコンクリートはダムや橋脚等の大きな部材で、水和熱による温度上昇と内外温度差に起因する温度ひび割れが問題となる（A=正）。対策として中庸熱・低熱セメントの使用、パイプクーリング等がある。" },
{ id:62, cat:"コンクリート", diff:"★★☆", q:"コンクリートポンプによる圧送に関する記述として正しいものはどれか。", choices:["A: 輸送管径が大きいほど圧力損失が大きい","B: スランプが小さいほど圧送性が良い","C: 圧送前に先送りモルタルを圧送する","D: 水平換算距離は実際の距離より短くなる"], ans:2, exp:"コンクリートポンプ圧送前には輸送管内面を潤滑するため先送りモルタルを圧送する（C=正）。管径が大きいと圧力損失は小さい。適切なスランプが必要。垂直距離は水平の約3〜4倍に換算。" },
{ id:63, cat:"コンクリート", diff:"★★★", q:"プレストレストコンクリートに関する記述として正しいものはどれか。", choices:["A: コンクリートに引張力を導入して曲げに抵抗する","B: PC鋼材によりコンクリートにプレストレス（圧縮力）を導入する","C: ポストテンション方式はコンクリート打込み前に緊張する","D: 鉄筋コンクリートよりひび割れが発生しやすい"], ans:1, exp:"プレストレストコンクリート（PC）はPC鋼材でコンクリートに圧縮力（プレストレス）を導入し、引張応力を打ち消して曲げに抵抗する（B=正）。ポストテンションはコンクリート硬化後に緊張。ひび割れは発生しにくい。" },
{ id:64, cat:"コンクリート", diff:"★★☆", q:"コンクリートの凍害に関する記述として正しいものはどれか。", choices:["A: 凍害はコンクリート中の水分が凍結融解を繰り返すことで生じる","B: 空気量を減らすことで凍害を防止できる","C: W/Cが大きいほど凍結融解抵抗性は高い","D: スケーリングは内部の劣化で表面には影響しない"], ans:0, exp:"凍害はコンクリート中の水分の凍結融解の繰り返しにより組織が破壊される現象（A=正）。対策はAEコンクリート（空気量4.5%程度）の使用。W/Cを小さくする。スケーリングは表面の剥離現象。" },
{ id:65, cat:"コンクリート", diff:"★★★", q:"コンクリートの締固めに関する記述として正しいものはどれか。", choices:["A: 内部振動機の挿入間隔は60cm以下とする","B: 振動時間は長いほどよく、制限はない","C: 再振動は行ってはならない","D: 内部振動機は斜めに挿入して使用する"], ans:0, exp:"内部振動機（バイブレータ）の挿入間隔は50〜60cm以下が標準（A=正）。過度の振動は材料分離の原因。再振動は適切に行えばコンクリートの品質向上に有効。振動機は鉛直に挿入する。" },
{ id:66, cat:"コンクリート", diff:"★★☆", q:"コンクリートの運搬に関する記述として正しいものはどれか。", choices:["A: 練混ぜから打込み終了までの時間は外気温25℃以上で2時間以内","B: 練混ぜから打込み終了までの時間は外気温25℃以上で1.5時間以内","C: トラックアジテータのドラムは停止させて運搬する","D: 運搬中にコンクリートに加水してよい"], ans:1, exp:"練混ぜから打込み終了までの時間は、外気温25℃以上で1.5時間以内、25℃未満で2時間以内（B=正）。アジテータドラムは回転させて材料分離を防ぐ。運搬中の加水は厳禁。" },
{ id:67, cat:"コンクリート", diff:"★★★", q:"高強度コンクリートに関する記述として正しいものはどれか。", choices:["A: 設計基準強度が50N/mm²を超えるコンクリートを指す","B: W/Cは一般のコンクリートより大きい","C: 自己収縮が小さいのが特徴である","D: 高性能AE減水剤の使用が一般的である"], ans:3, exp:"高強度コンクリートには高性能AE減水剤を使用して低W/Cと高い流動性を両立させる（D=正）。一般に設計基準強度50〜60N/mm²以上。W/Cは小さい。自己収縮が大きいことが課題。" },
{ id:68, cat:"コンクリート", diff:"★★☆", q:"水中コンクリートに関する記述として正しいものはどれか。", choices:["A: スランプは5〜8cmとする","B: W/Cは50%以下を標準とする","C: トレミー管は水面上に先端を出して打ち込む","D: 水中不分離性混和剤は使用しない"], ans:1, exp:"水中コンクリートのW/Cは50%以下を標準とする（B=正）。スランプは13〜18cm程度。トレミー管は先端を常にコンクリート中に挿入（2m以上）。水中不分離性混和剤の使用が有効。" },
{ id:69, cat:"コンクリート", diff:"★★★", q:"コンクリートのアルカリシリカ反応（ASR）の抑制対策として正しいものはどれか。", choices:["A: 高アルカリセメントを使用する","B: 高炉セメントB種を使用する","C: W/Cを大きくする","D: 空気量を減少させる"], ans:1, exp:"ASR対策として高炉セメントB種（スラグ量40%以上）の使用が有効（B=正）。低アルカリ型セメントの使用も有効。高アルカリは逆効果。W/Cや空気量はASR対策とは直接関係しない。" },
{ id:70, cat:"コンクリート", diff:"★★☆", q:"型枠の存置期間に関する記述として正しいものはどれか。", choices:["A: 型枠は打込み後直ちに取り外してよい","B: 柱・梁側面は圧縮強度3.5N/mm²以上で取り外し可能","C: スラブ下の支保工は所定の圧縮強度に達するまで存置する","D: BとCのどちらも正しい"], ans:3, exp:"型枠の取り外しは所定の強度に達してから行う。柱・梁等の鉛直面は圧縮強度3.5N/mm²以上、スラブ下の支保工はより高い強度基準（設計基準強度の85%以上等）に達するまで存置する（D=正）。" },
{ id:71, cat:"コンクリート", diff:"★★★", q:"コンクリートの塩化物含有量に関する記述として正しいものはどれか。", choices:["A: フレッシュコンクリート中の塩化物イオン量は0.30kg/m³以下と規定されている","B: 海砂は洗浄せずにそのまま使用できる","C: 塩化物含有量は硬化後に測定する","D: 塩化物イオンは強度に影響するが耐久性には影響しない"], ans:0, exp:"JIS A 5308によりフレッシュコンクリート中の塩化物イオン量は0.30kg/m³以下（A=正）。海砂は十分に洗浄して塩分を除去。測定はフレッシュ時に行う。塩化物は鉄筋腐食による耐久性低下の原因。" },
{ id:72, cat:"コンクリート", diff:"★★☆", q:"コンクリートの強度特性に関する記述として正しいものはどれか。", choices:["A: 引張強度は圧縮強度の約1/10〜1/13である","B: 曲げ強度は圧縮強度より大きい","C: 引張強度と圧縮強度はほぼ同じである","D: W/Cが大きいほど圧縮強度は大きくなる"], ans:0, exp:"コンクリートの引張強度は圧縮強度の約1/10〜1/13と極めて小さい（A=正）。そのため鉄筋で引張力を負担させる。曲げ強度は圧縮強度の1/5〜1/7程度。W/Cが大きいほど圧縮強度は低下する。" },
{ id:73, cat:"コンクリート", diff:"★★★", q:"コンクリートの非破壊試験に関する記述として正しいものはどれか。", choices:["A: シュミットハンマーは反発度からコンクリートの圧縮強度を推定する","B: 超音波法はコンクリート中の鉄筋位置を直接測定する","C: 電磁波レーダー法はコンクリートの強度を測定する","D: 赤外線法はコンクリートの中性化深さを測定する"], ans:0, exp:"シュミットハンマー（リバウンドハンマー）はコンクリート表面の反発度から圧縮強度を推定する非破壊試験（A=正）。電磁波レーダーは鉄筋位置探査。赤外線は浮き・剥離の検出に使用。" },
{ id:74, cat:"コンクリート", diff:"★★☆", q:"フライアッシュセメントに関する記述として正しいものはどれか。", choices:["A: 初期強度の発現が早い","B: 水和熱が大きい","C: 長期強度の増進が期待できる","D: ワーカビリティーが劣る"], ans:2, exp:"フライアッシュセメントは石炭灰を混合したセメントで、ポゾラン反応により長期強度の増進が期待できる（C=正）。初期強度は低い。水和熱は小さい。球形粒子によりワーカビリティーは良好。" },
{ id:75, cat:"コンクリート", diff:"★★★", q:"コンクリートのひび割れに関する記述として誤っているものはどれか。", choices:["A: 乾燥収縮ひび割れは部材表面から発生することが多い","B: 温度ひび割れはマスコンクリートで発生しやすい","C: 沈みひび割れはコンクリート打込み後の沈降により発生する","D: ひび割れの発生はすべて施工不良が原因である"], ans:3, exp:"ひび割れの原因は施工不良だけでなく、乾燥収縮・温度変化・荷重・化学反応など多様である（D=誤り）。設計段階での配慮（配筋量・目地設置等）も必要。" },
{ id:76, cat:"コンクリート", diff:"★★☆", q:"レディーミクストコンクリート（JIS A 5308）に関する記述として正しいものはどれか。", choices:["A: 呼び強度は配合強度と同じ値である","B: 荷卸し地点で品質を確認する","C: 運搬時間に制限はない","D: 品質検査は工場出荷時のみ行う"], ans:1, exp:"レディーミクストコンクリートの品質は荷卸し地点で確認する（B=正）。呼び強度は設計基準強度に基づく値で、配合強度はばらつきを考慮してこれより大きい。運搬時間は制限あり。" },
{ id:77, cat:"コンクリート", diff:"★★★", q:"コンクリートの化学的侵食に関する記述として正しいものはどれか。", choices:["A: 硫酸塩はコンクリートを膨張・劣化させる","B: 酸性環境はコンクリートに影響を与えない","C: 海水中のMgSO₄はコンクリートに無害である","D: 化学的侵食は鉄筋のみに影響する"], ans:0, exp:"硫酸塩（特にMgSO₄やNa₂SO₄）はセメント水和物と反応してエトリンガイトを生成し、膨張・劣化を引き起こす（A=正）。酸性環境もコンクリートを溶解。化学的侵食はコンクリート自体を劣化させる。" },
{ id:78, cat:"コンクリート", diff:"★★☆", q:"コンクリートの単位水量に関する記述として正しいものはどれか。", choices:["A: 単位水量はできるだけ大きくすることが望ましい","B: 単位水量の上限は185kg/m³以下が目安である","C: 単位水量が多いほど乾燥収縮は小さくなる","D: 単位水量は強度に影響しない"], ans:1, exp:"単位水量は185kg/m³以下が目安（B=正）。単位水量はできるだけ小さくすることが望ましく、多いほど乾燥収縮が大きく強度が低下する。AE減水剤等で単位水量を低減する。" },
{ id:79, cat:"コンクリート", diff:"★★★", q:"吹付けコンクリートに関する記述として正しいものはどれか。", choices:["A: 乾式と湿式があり、トンネルでは主に湿式が用いられる","B: 急結剤は使用しない","C: リバウンド（はね返り）は発生しない","D: 圧縮強度が通常のコンクリートより常に高い"], ans:0, exp:"吹付けコンクリートは乾式と湿式があり、NATMトンネルでは品質管理に優れた湿式が主流（A=正）。急結剤を添加して早期強度を確保。リバウンド（はね返り）のロスが発生する。" },
{ id:80, cat:"コンクリート", diff:"★★☆", q:"コンクリートの養生温度と強度の関係として正しいものはどれか。", choices:["A: 養生温度が低いほど初期強度の発現は遅い","B: 養生温度が低いほど最終的な強度は低い","C: 養生温度は強度に影響しない","D: 養生温度が高いほど長期強度は必ず高くなる"], ans:0, exp:"養生温度が低いと水和反応が遅くなり初期強度の発現は遅い（A=正）。ただし低温で養生した方が最終的には密実な組織となり長期強度は高くなることがある。高温養生は初期強度は高いが長期強度が伸びない場合がある。" },
{ id:81, cat:"コンクリート", diff:"★★★", q:"コンクリートの促進中性化試験に関する記述として正しいものはどれか。", choices:["A: CO₂濃度を高めた環境に供試体を置いて中性化深さの進行を調べる","B: 中性化深さの測定にはフェノールフタレイン溶液を使用する","C: AとBの両方とも正しい","D: 試験は通常1日で完了する"], ans:2, exp:"促進中性化試験はCO₂濃度5%程度の環境に供試体を置いて中性化の進行を促進させる試験。中性化深さの測定にはフェノールフタレイン1%溶液を使用し、赤紫色に呈色しない部分が中性化している。AとBの両方正しい（C=正）。" },
{ id:82, cat:"コンクリート", diff:"★★☆", q:"早強ポルトランドセメントの湿潤養生期間として正しいものはどれか（日平均気温15℃以上の場合）。", choices:["A: 1日以上","B: 3日以上","C: 5日以上","D: 7日以上"], ans:1, exp:"早強ポルトランドセメントの湿潤養生期間は15℃以上で3日（B=正）。普通ポルトランドセメントの5日より短い。早強は初期水和が速く短期間で強度が発現するため養生期間を短縮できる。" },
{ id:83, cat:"コンクリート", diff:"★★★", q:"コンクリート構造物の補修工法に関する記述として正しいものはどれか。", choices:["A: ひび割れ注入工法はエポキシ樹脂やセメントペーストを注入する","B: 断面修復工法は表面被覆のみで断面を増加させない","C: 電気防食工法はコンクリートの強度を回復させる","D: 表面被覆工法は構造的な補強に有効である"], ans:0, exp:"ひび割れ注入工法はエポキシ樹脂やセメント系材料をひび割れに注入して一体性を回復する工法（A=正）。断面修復は劣化部分を除去して充填。電気防食は鉄筋腐食を防止。表面被覆は劣化因子の浸入防止。" },
{ id:84, cat:"施工管理", diff:"★★★", q:"ネットワーク工程表において、クリティカルパスの説明として正しいものはどれか。", choices:["A: 最も工期が短い経路","B: 総余裕時間（TF）がゼロの作業を連ねた経路","C: フリーフロート（FF）がゼロの作業を連ねた経路","D: 作業員が最も多い経路"], ans:1, exp:"クリティカルパスはTF=0の作業を連ねた最長経路で、工期を決定する。この経路上の作業が1日遅れると全体工期が1日延びる。" },
{ id:85, cat:"施工管理", diff:"★★☆", q:"品質管理における工程能力指数Cpの評価として正しいものはどれか。", choices:["A: Cp≧1.33→工程能力不足","B: Cp<1.00→工程能力充分","C: Cp≧1.33→工程能力充分（優秀）","D: Cp=1.00〜1.33→工程能力不足"], ans:2, exp:"Cp=(規格上限-規格下限)/6σ。Cp≧1.33→優秀・充分（C=正）、1.00〜1.33→良好、Cp<1.00→能力不足で規格外れの恐れ。" },
{ id:86, cat:"施工管理", diff:"★★★", q:"アスファルト舗装の締固め度の管理基準として正しいものはどれか。", choices:["A: 基準密度の90%以上（表層・基層）","B: 基準密度の92%以上","C: 基準密度の94%以上（表層・基層）","D: 基準密度の97%以上"], ans:2, exp:"舗装施工便覧により表層・基層の締固め度は基準密度の94%以上（C=正）。90%は土工の締固め管理基準と混同しないよう注意。" },
{ id:87, cat:"施工管理", diff:"★★☆", q:"ネットワーク工程表のフリーフロート（FF）に関する記述として正しいものはどれか。", choices:["A: FFは後続作業の最遅開始時刻から当該作業の最早完了時刻を引いた値","B: FFは後続作業の最早開始時刻から当該作業の最早完了時刻を引いた値","C: FFはTFより大きくなることがある","D: FFがゼロの作業は必ずクリティカルパス上にある"], ans:1, exp:"FF=後続作業の最早開始時刻−当該作業の最早完了時刻（B=正）。FFは常にTF以下。FFがゼロでもTFが正の場合はクリティカルパス上ではない。" },
{ id:88, cat:"施工管理", diff:"★★★", q:"ネットワーク工程表のダミー（破線矢印）に関する記述として正しいものはどれか。", choices:["A: ダミーは所要日数を持つ作業である","B: ダミーは作業の先行関係のみを表す","C: ダミーは省略してもよい","D: ダミーには資源が必要である"], ans:1, exp:"ダミーは所要日数ゼロの仮想作業で、作業間の論理的な先行関係のみを表す（B=正）。実作業ではないため資源は不要だが、工程の正確な表現に不可欠で省略はできない。" },
{ id:89, cat:"施工管理", diff:"★★☆", q:"バーチャート（横線式工程表）の特徴として誤っているものはどれか。", choices:["A: 各作業の所要日数が明確である","B: 作成が比較的容易である","C: 作業間の相互関係が明確に表現できる","D: 全体の工程が一目で分かる"], ans:2, exp:"バーチャートは各作業を横棒で表示するため視覚的に分かりやすいが、作業間の相互関係（先行・後続）が明確に表現できない（C=誤り）。相互関係の表現にはネットワーク工程表が適する。" },
{ id:90, cat:"施工管理", diff:"★★★", q:"工程管理のPDCAサイクルに関する記述として正しいものはどれか。", choices:["A: P(Plan)→D(Do)→C(Check)→A(Action)の順で繰り返す","B: PDCAは一度回せば十分である","C: Check（検討）の段階は省略してもよい","D: PDCAサイクルは品質管理にのみ適用される"], ans:0, exp:"PDCAサイクルは計画(P)→実行(D)→検討(C)→処置(A)の順で継続的に繰り返す（A=正）。工程管理・品質管理・安全管理すべてに適用。一度では不十分で継続的改善が目的。" },
{ id:91, cat:"施工管理", diff:"★★☆", q:"出来形管理基準に関する記述として正しいものはどれか。", choices:["A: 土工の高さの許容差は±30mmである","B: 土工の高さの許容差は±50mmである","C: 土工の幅の許容差は±30mmである","D: コンクリート厚さの許容差は±50mmである"], ans:0, exp:"国交省の出来形管理基準（土工）：高さ±30mm、幅−50mm以内（A=正）。コンクリート厚さは−30mm以内。数値は正確に覚える必要がある。" },
{ id:92, cat:"施工管理", diff:"★★★", q:"ヒストグラムの型と工程の状態に関する記述として正しいものはどれか。", choices:["A: 正規分布型は工程が安定していることを示す","B: 二山型は工程が安定していることを示す","C: 絶壁型はデータの選別が行われていないことを示す","D: 離れ小島型は工程が安定していることを示す"], ans:0, exp:"ヒストグラムが正規分布型（釣鐘型）であれば工程が安定している（A=正）。二山型は異なる条件の混在、絶壁型はデータの選別（規格外の除外）の疑い、離れ小島型は異常値の存在を示す。" },
{ id:93, cat:"施工管理", diff:"★★☆", q:"特性要因図（フィッシュボーン図）に関する記述として正しいものはどれか。", choices:["A: 不良の原因を系統的に整理・分析するために用いる","B: 数値データの分布を表示するために用いる","C: 工程の時間的変化を管理するために用いる","D: 不良項目を出現頻度順に並べるために用いる"], ans:0, exp:"特性要因図（石川ダイアグラム）は結果（特性）に影響する原因（要因）を魚の骨状に系統的に整理する図（A=正）。Bはヒストグラム、Cは管理図、Dはパレート図の説明。" },
{ id:94, cat:"施工管理", diff:"★★★", q:"パレート図に関する記述として正しいものはどれか。", choices:["A: 不良項目を出現頻度の小さい順に棒グラフで表示する","B: 不良項目を出現頻度の大きい順に棒グラフで表示し、累積曲線を加える","C: パレート図では全項目を等しく対策する","D: パレート図は時系列変化の管理に使用する"], ans:1, exp:"パレート図は不良項目を出現頻度の大きい順（左から）に棒グラフで表示し、累積曲線を付加する（B=正）。上位項目（重点項目）に対策を集中するのが効果的。パレートの法則（80:20の法則）に基づく。" },
{ id:95, cat:"施工管理", diff:"★★☆", q:"散布図に関する記述として正しいものはどれか。", choices:["A: 2つの変数間の関係を調べるために用いる","B: 不良品数の時間的推移を表す","C: データの度数分布を表す","D: 原因と結果を系統的に整理する"], ans:0, exp:"散布図は2つの変数（例：温度と強度）の関係を点で表し、相関関係を視覚的に判断する図（A=正）。正の相関・負の相関・無相関を判定できる。" },
{ id:96, cat:"施工管理", diff:"★★★", q:"X̄-R管理図の異常判定に関する記述として誤っているものはどれか。", choices:["A: 点が管理限界線の外に出た場合は異常と判定する","B: 連続9点が中心線の片側に並んだ場合は要注意","C: 連続6点が増加または減少した場合は要注意","D: 点が中心線の近くに多く集まる場合は異常と判定する"], ans:3, exp:"点が中心線の近くに集中するのは工程が安定している証拠であり異常ではない（D=誤り）。管理外の判定は①管理限界線を超える②9点連続片側③6点連続増加/減少等のルールによる。" },
{ id:97, cat:"施工管理", diff:"★★☆", q:"施工計画書に記載すべき事項として含まれないものはどれか。", choices:["A: 工程計画","B: 品質管理計画","C: 施工業者の経営状況","D: 安全管理計画"], ans:2, exp:"施工計画書には工事概要・工程計画・品質管理計画・安全管理計画・施工方法等を記載するが、施工業者の経営状況は含まれない（C=正）。主任技術者名や安全衛生体制は記載する。" },
{ id:98, cat:"施工管理", diff:"★★★", q:"工程短縮（クラッシング）に関する記述として正しいものはどれか。", choices:["A: クリティカルパス以外の作業を短縮すると工期が短くなる","B: クリティカルパス上の作業に資源を追加して工期を短縮する","C: クラッシングでは費用は変わらない","D: すべての作業を同時に短縮するのが最も効果的"], ans:1, exp:"クラッシングはクリティカルパス上の作業に人員・機械等の資源を追加投入して工期を短縮する手法（B=正）。CP以外の作業を短縮しても工期は変わらない。費用（直接費）は増加する。" },
{ id:99, cat:"施工管理", diff:"★★☆", q:"仮設計画に関する記述として正しいものはどれか。", choices:["A: 指定仮設は受注者が自由に変更できる","B: 任意仮設は受注者の判断で計画・変更できる","C: 仮設工は施工計画に含まれない","D: 仮設工は永久構造物と同じ安全率を適用しない"], ans:1, exp:"任意仮設は受注者の判断で計画・施工方法を変更できる（B=正）。指定仮設は発注者が設計を指定するため、変更には発注者の承諾が必要。仮設工は施工計画の重要な構成要素。" },
{ id:100, cat:"施工管理", diff:"★★★", q:"Sカーブ（出来高累計曲線）に関する記述として正しいものはどれか。", choices:["A: 工事全体の出来高の累計をS字型の曲線で表す","B: 直線で表されるのが理想的である","C: 工期の最初と最後の進捗が最も大きい","D: 出来高は常に予定通りに進む"], ans:0, exp:"Sカーブは工事の出来高（進捗率）の累計を時間軸で表したもので、通常S字型の曲線となる（A=正）。工期の最初と最後は進捗が緩やかで、中間期に進捗が大きい。予定と実績の比較で進捗管理を行う。" },
{ id:101, cat:"施工管理", diff:"★★☆", q:"土工の施工管理において、含水比管理が重要な理由として正しいものはどれか。", choices:["A: 含水比は締固め効果に大きく影響するため","B: 含水比は気温にのみ影響するため","C: 含水比が高いほど常に締固め効果が良いため","D: 含水比は品質管理の対象外であるため"], ans:0, exp:"土の締固めは含水比により効果が大きく異なり、最適含水比付近で最大乾燥密度が得られるため、含水比管理は締固め管理の基本（A=正）。含水比が高すぎても低すぎても締固め効果は低下する。" },
{ id:102, cat:"施工管理", diff:"★★★", q:"公共工事における施工計画書の提出に関する記述として正しいものはどれか。", choices:["A: 施工計画書は工事着手前に提出する義務はない","B: 施工計画書は工事着手前に監督員に提出する","C: 施工計画書は工事完了後に提出すればよい","D: 施工計画書の内容は変更できない"], ans:1, exp:"共通仕様書により施工計画書は工事着手前に監督員に提出する（B=正）。工事内容の変更等があった場合は変更施工計画書を提出する。" },
{ id:103, cat:"施工管理", diff:"★★☆", q:"QC7つ道具に含まれないものはどれか。", choices:["A: パレート図","B: 管理図","C: アローダイアグラム","D: 散布図"], ans:2, exp:"QC7つ道具はパレート図・特性要因図・ヒストグラム・管理図・散布図・チェックシート・層別（C=正しくない）。アローダイアグラムはネットワーク工程表で、新QC7つ道具に含まれる。" },
{ id:104, cat:"施工管理", diff:"★★★", q:"レディーミクストコンクリートの受入れ検査項目として正しい組み合わせはどれか。", choices:["A: スランプ・空気量・塩化物含有量・圧縮強度","B: スランプ・空気量のみ","C: 圧縮強度のみ","D: W/C・s/a・単位セメント量"], ans:0, exp:"レディーミクストコンクリートの受入れ検査はスランプ・空気量・塩化物含有量・コンクリート温度、及び供試体による圧縮強度試験が基本（A=正）。荷卸し地点で実施する。" },
{ id:105, cat:"施工管理", diff:"★★☆", q:"工期と費用の関係に関する記述として正しいものはどれか。", choices:["A: 直接費は工期を短縮するほど減少する","B: 間接費は工期が長くなるほど増加する","C: 総費用は常に工期に比例する","D: 最適工期は直接費が最大となる工期である"], ans:1, exp:"間接費（現場管理費等）は工期に比例して増加する（B=正）。直接費は工期短縮のために資源を追加すると増加。総費用（直接費+間接費）が最小となる工期が最適工期。" },
{ id:106, cat:"施工管理", diff:"★★★", q:"測定値のばらつきに関する記述として正しいものはどれか。", choices:["A: 標準偏差σが大きいほどばらつきは小さい","B: 変動係数Cv=σ/X̄×100で表す","C: 範囲R=最大値−最小値はばらつきを表す指標ではない","D: ばらつきは管理できないものである"], ans:1, exp:"変動係数Cv=標準偏差σ/平均値X̄×100（%）でばらつきを表す（B=正）。σが大きいほどばらつきは大きい。R=最大値−最小値もばらつきの指標。品質管理でばらつきを低減することが重要。" },
{ id:107, cat:"施工管理", diff:"★★☆", q:"施工計画における機械選定に関する記述として正しいものはどれか。", choices:["A: 機械の組合せは作業能力のバランスを考慮する","B: 最も高価な機械を選定するのが常に正しい","C: 機械の選定は施工計画に含まれない","D: 現場条件に関係なく標準的な機械を使用する"], ans:0, exp:"機械の組合せは各機械の作業能力（施工速度）のバランスを考慮し、ボトルネックが生じないように計画する（A=正）。コスト・現場条件・工期を総合的に勘案して選定。" },
{ id:108, cat:"施工管理", diff:"★★★", q:"原価管理に関する記述として正しいものはどれか。", choices:["A: 実行予算は契約後に作成する実際の施工に基づく予算である","B: 原価管理は工事完了後に行えば十分である","C: 直接工事費には現場管理費が含まれる","D: 下請業者への支払いは原価管理の対象外である"], ans:0, exp:"実行予算は契約金額をもとに実際の施工方法・条件を反映して作成する施工業者の予算（A=正）。原価管理は工事中に随時実施。現場管理費は間接工事費。下請支払いも原価管理の対象。" },
{ id:109, cat:"施工管理", diff:"★★☆", q:"建設工事における環境管理の対象として含まれないものはどれか。", choices:["A: 騒音・振動対策","B: 粉じん対策","C: 水質汚濁防止","D: 従業員の給与管理"], ans:3, exp:"環境管理は騒音・振動・粉じん・水質汚濁・土壌汚染等の環境負荷を低減する管理（D=含まれない）。従業員の給与管理は労務管理の範疇。" },
{ id:110, cat:"施工管理", diff:"★★★", q:"工事記録の作成に関する記述として正しいものはどれか。", choices:["A: 工事写真は施工段階ごとに撮影し記録として保存する","B: 工事記録は完了検査時のみに必要である","C: 出来形管理は目視のみで記録は不要である","D: 品質記録は受注者が保管する義務はない"], ans:0, exp:"工事写真は施工の各段階（着工前・施工中・完成）で撮影し、写真管理基準に基づき記録・保存する（A=正）。工事記録は施工中の管理に不可欠で、出来形・品質の記録は受注者に保管義務がある。" },
{ id:111, cat:"施工管理", diff:"★★☆", q:"情報化施工に関する記述として正しいものはどれか。", choices:["A: TS（トータルステーション）による出来形管理が含まれる","B: 情報化施工はトンネル工事にのみ適用される","C: ICT活用は施工の効率化に寄与しない","D: GNSS（衛星測位）は建設現場では使用できない"], ans:0, exp:"情報化施工はTS・GNSS・3Dデータ等のICTを活用した施工管理で、出来形管理の効率化・高精度化に寄与する（A=正）。土工・舗装等幅広い工種に適用されている。" },
{ id:112, cat:"施工管理", diff:"★★★", q:"設計変更に関する記述として正しいものはどれか。", choices:["A: 設計変更は受注者が自由に行うことができる","B: 条件明示事項と異なる場合は設計変更の対象となり得る","C: 設計変更は一切認められない","D: 設計変更があっても工期は変更されない"], ans:1, exp:"設計図書の条件明示事項と現場条件が異なる場合は、監督員との協議を経て設計変更の対象となり得る（B=正）。受注者が勝手に変更はできず、発注者との協議が必要。工期も変更対象となる。" },
{ id:113, cat:"施工管理", diff:"★★☆", q:"チェックシートの用途として正しいものはどれか。", choices:["A: データを収集・整理するための用紙である","B: 2つの変数間の相関関係を調べる","C: 工程の時間的変化を監視する","D: 不良原因を系統的に分類する"], ans:0, exp:"チェックシートはデータの収集・記録を効率的に行うための定型用紙（A=正）。Bは散布図、Cは管理図、Dは特性要因図の用途。QC7つ道具の一つ。" },
{ id:114, cat:"施工管理", diff:"★★★", q:"管理図の管理限界線の計算に関する記述として正しいものはどれか。", choices:["A: UCL=X̄+3σ（σは標準偏差）の考え方に基づく","B: 管理限界線は規格限界線と同じである","C: 管理限界線は一度設定すると変更できない","D: 管理限界線は任意に設定してよい"], ans:0, exp:"管理図の管理限界線は平均値±3σの考え方に基づき、99.7%のデータがこの範囲に入る（A=正）。X̄-R管理図ではUCL=X̄+A₂R̄の係数を使用。規格限界線とは異なる概念で、データに基づき設定する。" },
{ id:115, cat:"施工管理", diff:"★★☆", q:"層別に関する記述として正しいものはどれか。", choices:["A: データを原因別・条件別に分類して特徴を把握する手法である","B: 層別はデータの収集方法の一つである","C: 層別はグラフの一種である","D: 層別を行うとデータの総数が増える"], ans:0, exp:"層別はデータを機械別・作業者別・時間帯別等の条件で分類し、各層の特徴や違いを把握する手法（A=正）。QC7つ道具の一つで、他の手法（ヒストグラム等）と組み合わせて使用すると効果的。" },
{ id:116, cat:"施工管理", diff:"★★★", q:"ファストトラッキングに関する記述として正しいものはどれか。", choices:["A: 本来は順序関係のある作業を一部並行して実施する手法","B: クリティカルパス上の作業に資源を追加する手法","C: 工期延長を申請する手法","D: 作業を全て直列で行う手法"], ans:0, exp:"ファストトラッキングは本来順序的に行う作業を一部重複（並行）させて工期を短縮する手法（A=正）。リスク（手戻り等）が増加する可能性がある。Bはクラッシングの説明。" },
{ id:117, cat:"施工管理", diff:"★★☆", q:"公共工事の品質確保の促進に関する法律の基本理念として正しいものはどれか。", choices:["A: 価格のみで競争すべきである","B: 価格と品質が総合的に優れた調達を実現すべきである","C: 品質は確保しなくてもよい","D: 民間工事には適用されない"], ans:1, exp:"品確法の基本理念は「価格と品質が総合的に優れた調達」の実現（B=正）。総合評価落札方式の導入根拠。価格のみの競争（ダンピング）を防止し、技術力を適正に評価する。" },
{ id:118, cat:"施工管理", diff:"★★★", q:"抜取検査に関する記述として正しいものはどれか。", choices:["A: ロットからサンプルを抜き取って検査し、ロット全体の合否を判定する","B: 全数検査と同じ精度が保証される","C: 抜取数は常に1個でよい","D: 抜取検査では不良品がロットに含まれないことを保証する"], ans:0, exp:"抜取検査はロットからランダムにサンプルを抜き取り、サンプルの検査結果からロット全体の合否を判定する方法（A=正）。全数検査より効率的だが、不良品が含まれるリスクはゼロにはならない。" },
{ id:119, cat:"施工管理", diff:"★★☆", q:"建設機械の作業能力に関する記述として正しいものはどれか。", choices:["A: 作業効率は常に100%で計画する","B: 土量換算係数を考慮して計画する","C: 機械の組合せは考慮不要である","D: 現場条件は作業能力に影響しない"], ans:1, exp:"建設機械の施工計画では土量換算係数（ほぐし率L、締固め率C）を考慮する（B=正）。作業効率は現場条件により70〜90%程度で、100%は不可。機械の組合せ（バランス）も重要。" },
{ id:120, cat:"施工管理", diff:"★★★", q:"国交省の「土木工事施工管理基準」に定める品質管理基準に関する記述として正しいものはどれか。", choices:["A: 品質管理基準は試験項目・試験方法・試験基準値等を規定している","B: 品質管理基準は推奨事項であり遵守義務はない","C: 品質管理は受注者の判断で省略できる","D: 品質管理基準は民間工事にのみ適用される"], ans:0, exp:"土木工事施工管理基準は試験項目・試験方法・試験基準値・試験頻度等を規定しており、公共工事の品質管理の基本（A=正）。受注者は基準に従い品質管理を実施する義務がある。" },
{ id:121, cat:"施工管理", diff:"★★☆", q:"イベント（結合点）の最早結合点時刻と最遅結合点時刻に関する記述として正しいものはどれか。", choices:["A: 最早結合点時刻は後退計算で求める","B: 最遅結合点時刻は前進計算で求める","C: 両者が等しい結合点はクリティカルパス上にある","D: 両者の差は常に正の値となる"], ans:2, exp:"最早結合点時刻と最遅結合点時刻が等しい結合点はクリティカルパス上にある（C=正）。最早は前進計算、最遅は後退計算で求める。両者の差がゼロの経路がクリティカルパス。" },
{ id:122, cat:"安全管理", diff:"★★☆", q:"足場に関する労働安全衛生規則の規定として誤っているものはどれか。", choices:["A: 高さ2m以上の箇所では作業床を設ける","B: 足場の作業床の幅は40cm以上","C: 手すりの高さは75cm以上","D: 枠組足場の壁つなぎは垂直5m・水平5.5m以内"], ans:2, exp:"手すりの高さは85cm以上が正しい。75cmは誤り（C=誤り）。さらに中桟（35〜50cm）または幅木（10cm以上）の設置も必要。" },
{ id:123, cat:"安全管理", diff:"★★★", q:"移動式クレーンの運転資格として正しいものはどれか。", choices:["A: つり上げ荷重1t以上→運転士免許","B: つり上げ荷重3t以上→運転士免許","C: つり上げ荷重5t以上→運転士免許","D: つり上げ荷重0.5t以上→技能講習"], ans:1, exp:"3t以上→移動式クレーン運転士免許（B=正）。1t以上3t未満→小型移動式クレーン運転技能講習。0.5t以上1t未満→特別教育。" },
{ id:124, cat:"安全管理", diff:"★★☆", q:"掘削作業の安全管理に関する記述として誤っているものはどれか。", choices:["A: 深さ2m以上で地山崩壊防止措置が必要","B: 深さ1.5m以上で昇降設備を設置","C: 掘削面高さ2m以上で掘削作業主任者を選任","D: 深さ1m以上で必ず矢板を設置する"], ans:3, exp:"矢板等の土留め設置は一律深さ1mではなく、地質・深さに応じて判断する（D=誤り）。地盤が安定していれば法面掘削で対応できる場合もある。" },
{ id:125, cat:"安全管理", diff:"★★★", q:"型枠支保工の安全基準に関する記述として正しいものはどれか。", choices:["A: 支柱の高さが3.5m以上の場合は水平つなぎを2方向に設ける","B: 型枠支保工の組立・解体に作業主任者の選任は不要","C: コンクリートの打込み中は型枠支保工の点検は不要","D: パイプサポートを3本以上継いで使用できる"], ans:0, exp:"型枠支保工は支柱高さ3.5m以上の場合、高さ2m以内ごとに水平つなぎを2方向に設ける（A=正）。組立・解体は作業主任者の選任が必要。打込み中は随時点検。パイプサポートの継手は2本まで。" },
{ id:126, cat:"安全管理", diff:"★★☆", q:"高さ2m以上の高所作業に関する記述として正しいものはどれか。", choices:["A: 作業床を設けることが困難な場合は安全帯（墜落制止用器具）を使用する","B: 高所作業では保護帽の着用は任意である","C: 安全ネットの設置は義務ではない","D: 高所作業に特別な資格は不要である"], ans:0, exp:"高さ2m以上の高所作業では作業床設置が原則。困難な場合は墜落制止用器具（フルハーネス型安全帯等）を使用する（A=正）。保護帽の着用は義務。墜落防止ネットも有効な対策。" },
{ id:127, cat:"安全管理", diff:"★★★", q:"特定元方事業者の義務として正しいものはどれか。", choices:["A: 協議組織の設置及び運営","B: 下請事業者の経営管理","C: 作業場所の巡視は月1回で足りる","D: 安全衛生教育は元方事業者が直接実施する必要はない"], ans:0, exp:"特定元方事業者の義務：①協議組織の設置・運営（A=正）、②作業場所の巡視（毎作業日1回以上）、③安全衛生教育に対する指導・援助。下請の経営管理は義務に含まれない。" },
{ id:128, cat:"安全管理", diff:"★★☆", q:"酸素欠乏危険作業に関する記述として正しいものはどれか。", choices:["A: 酸素濃度が18%未満の状態を酸素欠乏という","B: 酸素欠乏のおそれがある場所では作業開始前に測定を行う","C: AとBのどちらも正しい","D: 酸素欠乏は屋外では発生しない"], ans:2, exp:"酸素欠乏は酸素濃度18%未満の状態。作業開始前に酸素濃度等の測定を行い、換気等の措置を講じる。AもBも正しい（C=正）。マンホール・地下室等で発生し得る。" },
{ id:129, cat:"安全管理", diff:"★★★", q:"安全管理体制に関する記述として正しいものはどれか。", choices:["A: 総括安全衛生管理者は常時使用する労働者50人以上で選任","B: 安全管理者は常時使用する労働者50人以上で選任","C: 衛生管理者は常時使用する労働者100人以上で選任","D: 産業医は常時使用する労働者100人以上で選任"], ans:1, exp:"安全管理者・衛生管理者・産業医は50人以上で選任義務（B=正）。総括安全衛生管理者は建設業では100人以上。安全衛生推進者は10〜49人の事業場で選任。" },
{ id:130, cat:"安全管理", diff:"★★☆", q:"玉掛け作業の資格に関する記述として正しいものはどれか。", choices:["A: つり上げ荷重1t以上のクレーンの玉掛けには技能講習修了が必要","B: 玉掛け作業に資格は不要","C: つり上げ荷重に関係なく特別教育のみで足りる","D: 玉掛け作業は運転士免許があれば別途資格は不要"], ans:0, exp:"つり上げ荷重1t以上のクレーンに係る玉掛け作業には玉掛け技能講習修了が必要（A=正）。1t未満は特別教育で足りる。運転士免許とは別に玉掛け資格が必要。" },
{ id:131, cat:"安全管理", diff:"★★★", q:"建設工事における墜落・転落災害防止に関する記述として正しいものはどれか。", choices:["A: 開口部には囲い・手すり・覆い等の措置を講じる","B: 6.75m以上の高所ではフルハーネス型墜落制止用器具を使用する","C: AとBのどちらも正しい","D: 墜落防止措置は高さ5m以上から必要である"], ans:2, exp:"開口部には墜落防止の囲い等が必要。2019年2月より高さ6.75m超はフルハーネス型使用が原則（特別教育も必要）。AもBも正しい（C=正）。墜落防止措置は高さ2m以上から必要。" },
{ id:132, cat:"安全管理", diff:"★★☆", q:"車両系建設機械の安全管理に関する記述として正しいものはどれか。", choices:["A: 作業計画を定め関係労働者に周知する","B: 誘導員の配置は任意である","C: 運転者は免許があれば安全教育は不要","D: 機械の能力を超えた使用は緊急時には許される"], ans:0, exp:"車両系建設機械を使用する場合は作業計画を定め、関係労働者に周知する義務がある（A=正）。誘導員の配置が必要な場合あり。安全教育は常に必要。能力超過使用は禁止。" },
{ id:133, cat:"安全管理", diff:"★★★", q:"有機溶剤作業に関する記述として正しいものはどれか。", choices:["A: 局所排気装置または全体換気装置を設置する","B: 有機溶剤作業主任者の選任は不要","C: 保護具の使用は推奨事項であり義務ではない","D: 有機溶剤の作業環境測定は実施不要"], ans:0, exp:"有機溶剤を使用する屋内作業場では局所排気装置または全体換気装置の設置が義務（A=正）。有機溶剤作業主任者の選任、保護具の使用、作業環境測定もすべて義務。" },
{ id:134, cat:"安全管理", diff:"★★☆", q:"建設現場における感電防止対策として正しいものはどれか。", choices:["A: 仮設電線には漏電遮断器を設置する","B: アースの接続は任意である","C: 雨天時の電気作業に特別な対策は不要","D: 高圧電線の近くでの作業に制限はない"], ans:0, exp:"仮設電線には漏電遮断器（感度電流30mA以下、動作時間0.1秒以内）の設置が義務（A=正）。アースは確実に接続。雨天時は絶縁対策を強化。高圧電線近くでは離隔距離の確保が必要。" },
{ id:135, cat:"安全管理", diff:"★★★", q:"新規入場者教育に関する記述として正しいものはどれか。", choices:["A: 建設現場に新たに入場する作業員に対して実施する安全衛生教育","B: 1年に1回まとめて実施すればよい","C: 元請は下請の新規入場者教育に関与しない","D: 現場のルールや危険箇所の説明は不要"], ans:0, exp:"新規入場者教育は現場に新たに入場する作業員に対し、現場のルール・危険箇所・緊急連絡先等を教育する（A=正）。入場の都度実施。元請は統括管理の一環として指導。" },
{ id:136, cat:"安全管理", diff:"★★☆", q:"安全施工サイクルに関する記述として正しいものはどれか。", choices:["A: 毎日の安全朝礼・作業前点検・安全巡回等を日々繰り返す活動","B: 月に1回実施すれば足りる","C: 安全施工サイクルは大規模工事のみに適用される","D: 危険予知活動（KY活動）は安全施工サイクルに含まれない"], ans:0, exp:"安全施工サイクルは安全朝礼・KY活動・作業前点検・安全巡回・安全工程打合せ等を毎日繰り返す活動（A=正）。工事規模に関係なく実施。KY活動は重要な構成要素。" },
{ id:137, cat:"安全管理", diff:"★★★", q:"熱中症対策に関する記述として正しいものはどれか。", choices:["A: WBGT値（暑さ指数）は熱中症予防の指標として用いられる","B: 水分補給は喉が渇いてからで十分","C: 休憩は不要で連続作業が効率的","D: 熱中症は気温30℃以下では発生しない"], ans:0, exp:"WBGT値（湿球黒球温度）は熱中症予防の代表的指標（A=正）。こまめな水分・塩分補給と休憩の確保が重要。熱中症は高湿度環境では気温30℃以下でも発生し得る。" },
{ id:138, cat:"安全管理", diff:"★★☆", q:"ガス溶接作業に関する記述として正しいものはどれか。", choices:["A: ガス溶接技能講習修了者が行う","B: 資格なしで誰でも行える","C: 酸素ボンベとアセチレンボンベの近くで火気使用は問題ない","D: 溶接作業に消火器の準備は不要"], ans:0, exp:"ガス溶接作業はガス溶接技能講習修了者が行う（A=正）。ボンベの取扱いは安全距離の確保が必要で、火気厳禁。作業場所には消火器等の消火設備を準備する。" },
{ id:139, cat:"安全管理", diff:"★★★", q:"リスクアセスメントに関する記述として正しいものはどれか。", choices:["A: 危険性・有害性の特定→リスクの見積り→対策の検討の手順で実施","B: 対策後の確認は不要","C: リスクアセスメントは法的義務ではなく努力義務のみ","D: 作業員の意見は反映しない"], ans:0, exp:"リスクアセスメントは①危険性・有害性の特定②リスクの見積り（重篤度×発生可能性）③リスク低減対策の検討・実施の手順（A=正）。労安法で努力義務だが建設業では実質的に必須。作業員参加が効果的。" },
{ id:140, cat:"安全管理", diff:"★★☆", q:"保護帽（ヘルメット）に関する記述として正しいものはどれか。", choices:["A: 飛来・落下物用と墜落時保護用の種類がある","B: 保護帽は5年以内に交換する必要はない","C: あごひもは締めなくてよい","D: 保護帽の検定は存在しない"], ans:0, exp:"保護帽は飛来・落下物用と墜落時保護用に区分される（A=正）。使用期間は一般に3〜5年で交換。あごひもは確実に締める。国家検定に合格したものを使用。" },
{ id:141, cat:"安全管理", diff:"★★★", q:"労働災害における度数率の計算式として正しいものはどれか。", choices:["A: 度数率＝（死傷者数÷延実労働時間数）×1,000,000","B: 度数率＝（死傷者数÷労働者数）×100","C: 度数率＝（労働損失日数÷延実労働時間数）×1,000","D: 度数率＝（死亡者数÷労働者数）×1,000"], ans:0, exp:"度数率は100万延実労働時間あたりの死傷者数で労働災害の頻度を表す。度数率＝死傷者数÷延実労働時間数×1,000,000（A=正）。Cは強度率の計算式。" },
{ id:142, cat:"安全管理", diff:"★★☆", q:"ずい道（トンネル）工事の安全管理に関する記述として正しいものはどれか。", choices:["A: 可燃性ガスの濃度測定を行い、爆発の危険がないことを確認する","B: 換気は任意である","C: 坑内の照明は設置しなくてよい","D: 火災対策は地上と同じで特別な配慮は不要"], ans:0, exp:"トンネル工事では可燃性ガス（メタン等）の濃度測定を作業前に行い安全を確認する（A=正）。換気・照明は義務。坑内火災は避難困難のため特別な防火対策が必要。" },
{ id:143, cat:"安全管理", diff:"★★★", q:"クレーン作業における定格荷重に関する記述として正しいものはどれか。", choices:["A: 定格荷重はつり上げ荷重からフック等の質量を差し引いた値","B: 定格荷重はつり上げ荷重と同じ値","C: 定格荷重はジブの角度に関係なく一定","D: 定格荷重を超えた使用は安全率を考慮すれば許される"], ans:0, exp:"定格荷重＝つり上げ荷重−フック等の吊り具の質量（A=正）。ジブの角度・作業半径により変動する。定格荷重を超えた使用は転倒等の原因となり厳禁。" },
{ id:144, cat:"安全管理", diff:"★★☆", q:"危険予知活動（KY活動）の手順として正しいものはどれか。", choices:["A: 現状把握→本質追究→対策樹立→目標設定の4ラウンド法","B: 作業終了後に実施する反省活動","C: 管理者のみで実施し、作業員には結果のみ伝える","D: KY活動はイラストを使用してはならない"], ans:0, exp:"KY活動は4ラウンド法：①現状把握（どんな危険が）②本質追究（これが危険のポイント）③対策樹立（あなたならどうする）④目標設定（私たちはこうする）で実施（A=正）。作業前に全員参加で行う。" },
{ id:145, cat:"安全管理", diff:"★★★", q:"作業主任者の選任が必要な作業として正しくないものはどれか。", choices:["A: 足場の組立て等作業","B: 型枠支保工の組立て等作業","C: 鉄筋の組立て作業","D: 地山の掘削作業（掘削面の高さ2m以上）"], ans:2, exp:"鉄筋の組立て作業には作業主任者の選任義務はない（C=正しくない）。足場の組立て・型枠支保工の組立て・地山の掘削（掘削面2m以上）・土留め支保工は作業主任者が必要。" },
{ id:146, cat:"安全管理", diff:"★★☆", q:"架空電線に対する安全離隔距離に関する記述として正しいものはどれか。", choices:["A: 低圧（600V以下）では1m以上の離隔が目安","B: 架空電線の近くでの作業に制限はない","C: 高圧電線では距離に関係なく作業可能","D: 感電事故は乾燥時には発生しない"], ans:0, exp:"架空電線路に近接する作業では安全離隔距離の確保が必要。低圧（600V以下）で1m以上、高圧（7000V以下）で1.2m以上が目安（A=正）。監視員の配置や防護管の設置も有効。" },
{ id:147, cat:"安全管理", diff:"★★★", q:"労働安全衛生法における特別教育が必要な業務として正しいものはどれか。", choices:["A: フルハーネス型墜落制止用器具を使用する作業（高さ2m以上）","B: 普通自動車の運転","C: 事務作業","D: 5t未満の天井クレーンの運転"], ans:0, exp:"高さ2m以上の箇所でフルハーネス型墜落制止用器具を使用する作業には特別教育が必要（A=正）。2019年2月施行。他に酸素欠乏危険作業、アーク溶接、研削砥石の取替え等も特別教育対象。5t未満の天井クレーンも特別教育が必要。" },
{ id:148, cat:"安全管理", diff:"★★☆", q:"建設現場の安全パトロールに関する記述として正しいものはどれか。", choices:["A: 不安全状態・不安全行動を発見し是正することが目的","B: パトロールは年に1回実施すればよい","C: パトロール結果の記録は不要","D: 是正措置は翌月までに行えばよい"], ans:0, exp:"安全パトロールは不安全状態（設備の欠陥等）と不安全行動（保護具未着用等）を発見・是正する活動（A=正）。定期的（毎日〜毎週）に実施し、結果を記録。是正は直ちに行う。" },
{ id:149, cat:"安全管理", diff:"★★★", q:"土留め支保工の安全基準に関する記述として正しいものはどれか。", choices:["A: 切りばり・腹起しの取付けには土留め支保工作業主任者が必要","B: 支保工の点検は設置時のみ行えばよい","C: 切りばりにプレロードを与える必要はない","D: 雨水の排水対策は不要"], ans:0, exp:"土留め支保工の組立て・解体作業には土留め支保工作業主任者の選任が必要（A=正）。支保工は定期的・大雨後等に点検。切りばりのプレロード導入は変位防止に有効。排水対策も必要。" },
{ id:150, cat:"安全管理", diff:"★★☆", q:"安全衛生教育に関する記述として正しいものはどれか。", choices:["A: 雇入れ時の安全衛生教育はすべての労働者に対して行う","B: 教育の記録は保存する義務はない","C: 安全衛生教育は管理者のみに実施すればよい","D: 作業内容変更時の教育は不要"], ans:0, exp:"雇入れ時の安全衛生教育は業種・規模にかかわらずすべての労働者に対して実施義務がある（A=正）。記録は保存。作業内容変更時も教育が必要。全階層の労働者が対象。" },
{ id:151, cat:"安全管理", diff:"★★★", q:"高所作業車の安全基準に関する記述として正しいものはどれか。", choices:["A: 作業床の高さが10m以上の高所作業車は運転技能講習が必要","B: 高所作業車の作業範囲内に人を立ち入らせてよい","C: アウトリガーは張り出さなくてよい","D: 移動時に作業床に人を乗せて走行できる"], ans:0, exp:"作業床の高さ10m以上の高所作業車は運転技能講習修了者が操作（A=正）。10m未満は特別教育。作業範囲内は立入禁止。アウトリガーは最大限張り出す。移動時の作業床乗車は禁止。" },
{ id:152, cat:"安全管理", diff:"★★☆", q:"振動工具に関する安全対策として正しいものはどれか。", choices:["A: 振動工具の使用時間を制限する","B: 振動工具は長時間連続使用するのが効率的","C: 防振手袋の着用は不要","D: 振動障害は発生しない"], ans:0, exp:"振動工具（削岩機・ブレーカー等）は振動障害防止のため1日の使用時間を制限する（A=正）。防振手袋の着用、休憩の確保が必要。長時間使用は白ろう病等の振動障害の原因。" },
{ id:153, cat:"安全管理", diff:"★★★", q:"建設業における死亡災害の原因で最も多いものはどれか。", choices:["A: 墜落・転落","B: 交通事故","C: 飛来・落下","D: 崩壊・倒壊"], ans:0, exp:"建設業の死亡災害の原因は墜落・転落が最も多く、全体の約4割を占める（A=正）。次いで建設機械・崩壊等。高所作業の安全対策が最重要課題。" },
{ id:154, cat:"安全管理", diff:"★★☆", q:"酸素欠乏症等防止規則に関する記述として正しいものはどれか。", choices:["A: 酸素欠乏危険作業は第1種と第2種に区分される","B: 硫化水素は酸素欠乏危険作業と関係がない","C: 酸素濃度の測定は作業終了後に行う","D: 空気呼吸器の備付けは不要"], ans:0, exp:"酸素欠乏危険作業は第1種（酸素欠乏のおそれ）と第2種（酸素欠乏＋硫化水素のおそれ）に区分（A=正）。硫化水素は第2種に関連。測定は作業開始前に実施。空気呼吸器の備付けが必要。" },
{ id:155, cat:"安全管理", diff:"★★★", q:"解体工事の安全管理に関する記述として正しいものはどれか。", choices:["A: 事前に工作物の構造・周辺状況を調査し、作業計画を策定する","B: 解体工事に作業主任者の選任は不要","C: アスベスト含有の調査は任意である","D: 近隣への事前周知は法的義務ではない"], ans:0, exp:"解体工事は事前調査（構造・アスベスト含有等）→作業計画策定→周知が基本（A=正）。コンクリート造の解体等には作業主任者が必要。アスベスト調査は義務化（大気汚染防止法）。" },
{ id:156, cat:"安全管理", diff:"★★☆", q:"コンクリート造の工作物の解体作業に関する記述として正しいものはどれか。", choices:["A: 高さ5m以上の解体作業にはコンクリート造工作物解体等作業主任者が必要","B: 解体順序は下層から行う","C: 解体作業に作業計画は不要","D: 散水による粉じん対策は不要"], ans:0, exp:"高さ5m以上のコンクリート造工作物の解体にはコンクリート造の工作物の解体等作業主任者が必要（A=正）。解体は上層から行う。作業計画の策定と散水等の粉じん対策が必要。" },
{ id:157, cat:"安全管理", diff:"★★★", q:"建設工事における火災予防に関する記述として正しいものはどれか。", choices:["A: 溶接作業場所の周辺には消火器を配置する","B: 火気使用の許可制度は不要","C: 可燃物の近くでの溶接作業に制限はない","D: 防火管理者の選任は建設現場では不要"], ans:0, exp:"溶接・切断作業場所には消火器等の消火設備を配置する義務がある（A=正）。火気使用は許可制で管理。可燃物は除去または防火シート等で防護。防火管理体制の構築が必要。" },
{ id:158, cat:"安全管理", diff:"★★☆", q:"安全衛生責任者に関する記述として正しいものはどれか。", choices:["A: 統括安全衛生責任者を選任すべき事業者以外の請負人が選任する","B: 安全衛生責任者は元請のみが選任する","C: 安全衛生責任者の資格要件は特にない","D: 安全衛生責任者は現場に常駐する必要はない"], ans:0, exp:"安全衛生責任者は統括安全衛生責任者を選任すべき特定元方事業者以外の関係請負人が選任する（A=正）。各下請業者がそれぞれ選任し、元請の統括安全衛生責任者との連絡調整を行う。" },
{ id:159, cat:"安全管理", diff:"★★★", q:"地山の崩壊を防止するための措置として正しいものはどれか。", choices:["A: 地山の種類に応じた法面勾配を確保する","B: 地山の掘削は雨天でも同じ方法で行う","C: 法面の排水対策は不要","D: 点検は月1回で十分"], ans:0, exp:"地山の崩壊防止には地山の種類に応じた適切な法面勾配の確保が必要（A=正）。砂→35°以下、礫質→45°以下、岩盤→60〜75°等。大雨後は臨時点検を実施。法面の排水対策も重要。" },
{ id:160, cat:"建設業法", diff:"★★★", q:"建設業の許可に関する記述として誤っているものはどれか。", choices:["A: 2以上の都道府県に営業所→国土交通大臣許可","B: 特定建設業は下請け総額4,500万円以上の場合必要","C: 建設業許可の有効期間は5年","D: 請負金額500万円未満の工事はすべて許可不要"], ans:3, exp:"建築一式工事は1,500万円未満（または延床150㎡未満の木造住宅）が許可不要。「すべて500万円未満」は誤り（D=誤り）。建築一式以外は500万円未満が正しい。" },
{ id:161, cat:"建設業法", diff:"★★☆", q:"監理技術者の配置条件として正しいものはどれか。", choices:["A: 特定建設業者で下請総額3,000万円以上","B: 特定建設業者で下請総額4,500万円（建築一式7,000万円）以上","C: 請負金額1億円以上のすべての工事","D: すべての公共工事"], ans:1, exp:"特定建設業者が下請に発注する合計が4,500万円（建築一式7,000万円）以上の場合、監理技術者を配置（B=正）。3,000万円は旧基準。" },
{ id:162, cat:"建設業法", diff:"★★★", q:"施工体制台帳に関する記述として正しいものはどれか。", choices:["A: 特定建設業者が下請総額4,500万円以上の工事で作成義務あり","B: 一般建設業者にも施工体制台帳の作成義務がある","C: 施工体系図の掲示は不要","D: 下請業者の情報は記載不要"], ans:0, exp:"特定建設業者が元請として下請総額4,500万円以上（建築一式7,000万円以上）を発注する場合、施工体制台帳の作成義務あり（A=正）。施工体系図は現場の見やすい場所に掲示。" },
{ id:163, cat:"建設業法", diff:"★★☆", q:"主任技術者の配置に関する記述として正しいものはどれか。", choices:["A: 建設工事を施工する場合は必ず主任技術者を配置する","B: 主任技術者は元請のみが配置する義務がある","C: 軽微な工事には主任技術者は不要","D: 主任技術者の資格要件はない"], ans:0, exp:"建設業法により、すべての建設工事に主任技術者を配置する義務がある（A=正）。元請・下請を問わず配置。ただし監理技術者を置く場合は主任技術者に代えて配置する。" },
{ id:164, cat:"建設業法", diff:"★★★", q:"技術者の専任義務に関する記述として正しいものはどれか。", choices:["A: 請負代金3,500万円以上（建築一式7,000万円以上）の公共工事では技術者は専任","B: すべての工事で技術者は専任","C: 専任とは他の現場を兼務できることを意味する","D: 専任期間は工事着工後からでよい"], ans:0, exp:"請負代金3,500万円以上（建築一式7,000万円以上）の重要な建設工事では主任技術者・監理技術者は専任（A=正）。公共工事では原則専任。専任は他の現場との兼務不可。" },
{ id:165, cat:"建設業法", diff:"★★☆", q:"建設業の許可区分に関する記述として正しいものはどれか。", choices:["A: 一般建設業と特定建設業の2種類がある","B: 一般建設業は元請としての施工はできない","C: 特定建設業は下請のみが取得する","D: 許可区分は都道府県ごとに異なる"], ans:0, exp:"建設業許可は一般建設業と特定建設業の2種類（A=正）。一般建設業でも元請施工は可能だが、下請発注額が4,500万円以上の場合は特定建設業許可が必要。" },
{ id:166, cat:"建設業法", diff:"★★★", q:"建設工事の請負契約に関する記述として誤っているものはどれか。", choices:["A: 書面により契約を締結しなければならない","B: 不当に低い請負代金は禁止されている","C: 契約書に工期の記載は不要である","D: 一括下請負は原則として禁止されている"], ans:2, exp:"建設工事の請負契約書には工事内容・請負代金・工期・支払方法等を記載する義務があり、工期の記載は必要（C=誤り）。書面契約義務、不当低価格の禁止、一括下請負の原則禁止も重要。" },
{ id:167, cat:"建設業法", diff:"★★☆", q:"建設業許可の有効期間と更新に関する記述として正しいものはどれか。", choices:["A: 有効期間は5年で、更新は期間満了の30日前までに申請する","B: 有効期間は3年である","C: 更新手続きは不要で自動更新される","D: 有効期間は10年である"], ans:0, exp:"建設業許可の有効期間は5年で、引き続き建設業を営む場合は期間満了の30日前までに更新申請する（A=正）。更新しないと許可が失効する。" },
{ id:168, cat:"建設業法", diff:"★★★", q:"労働基準法における割増賃金に関する記述として正しいものはどれか。", choices:["A: 時間外労働→25%以上、休日労働→35%以上","B: 時間外労働→15%以上、休日労働→25%以上","C: 深夜労働（22〜5時）→15%以上","D: 月60時間超の時間外労働→35%以上"], ans:0, exp:"割増賃金率：時間外労働25%以上、休日労働35%以上、深夜労働25%以上（A=正）。月60時間超の時間外労働は50%以上。時間外＋深夜は50%以上。" },
{ id:169, cat:"建設業法", diff:"★★☆", q:"労働基準法の法定労働時間に関する記述として正しいものはどれか。", choices:["A: 1日8時間・1週40時間を超えて労働させてはならない（原則）","B: 1日10時間・1週48時間が法定労働時間","C: 建設業には法定労働時間の適用がない","D: 36協定なしでも時間外労働は可能"], ans:0, exp:"法定労働時間は1日8時間・1週40時間が原則（A=正）。時間外労働には36協定の締結と届出が必要。2024年4月より建設業にも時間外労働の上限規制が完全適用。" },
{ id:170, cat:"建設業法", diff:"★★★", q:"36協定に関する記述として正しいものはどれか。", choices:["A: 労使間で協定を締結し、労働基準監督署に届け出る","B: 36協定があれば時間外労働に上限はない","C: 建設業は36協定の適用外である","D: 36協定は口頭合意でよい"], ans:0, exp:"36協定（時間外・休日労働に関する協定）は労使間で書面により締結し、所轄労働基準監督署に届け出る（A=正）。時間外労働の上限は月45時間・年360時間（原則）。建設業にも適用。" },
{ id:171, cat:"建設業法", diff:"★★☆", q:"年次有給休暇に関する記述として正しいものはどれか。", choices:["A: 6ヶ月間継続勤務し、全労働日の8割以上出勤した労働者に10日付与","B: 入社日から有給休暇が発生する","C: 有給休暇の時効は1年である","D: パートタイム労働者には有給休暇はない"], ans:0, exp:"6ヶ月間継続勤務し全労働日の8割以上出勤した場合に年次有給休暇10日を付与（A=正）。以後1年ごとに増加（最大20日）。時効は2年。パート等にも比例付与される。" },
{ id:172, cat:"建設業法", diff:"★★★", q:"建設工事における一括下請負に関する記述として正しいものはどれか。", choices:["A: 公共工事での一括下請負は全面禁止","B: 民間工事ではいかなる場合も一括下請負が認められる","C: 一括下請負とは工事の一部を下請に出すこと","D: 発注者の書面による承諾があっても一括下請負はできない"], ans:0, exp:"公共工事では一括下請負は全面禁止（A=正）。民間工事では発注者の書面による事前承諾がある場合に限り認められる。一括下請負とは請け負った工事の全部又は主たる部分を他の業者に請け負わせること。" },
{ id:173, cat:"建設業法", diff:"★★☆", q:"建設業法における経営業務の管理責任者に関する記述として正しいものはどれか。", choices:["A: 建設業の経営業務について一定期間の経験を有する者","B: 経営業務の管理責任者は不要","C: 技術者と兼任はできない","D: 経験年数に関する要件はない"], ans:0, exp:"建設業許可の要件として、経営業務の管理責任者（建設業の経営について5年以上の経験等）を営業所に設置する（A=正）。一定の条件下で技術者との兼任は可能。" },
{ id:174, cat:"建設業法", diff:"★★★", q:"建設業法における工事現場への標識の掲示に関する記述として正しいものはどれか。", choices:["A: 建設業の許可を受けた者は現場に所定の標識を掲示する義務がある","B: 標識の掲示は任意である","C: 標識に主任技術者の氏名の記載は不要","D: 下請業者は標識掲示義務がない"], ans:0, exp:"建設業許可を受けた者は工事現場ごとに所定の標識（許可番号・主任技術者又は監理技術者の氏名等）を掲示する義務がある（A=正）。発注者の見やすい場所に掲示。" },
{ id:175, cat:"建設業法", diff:"★★☆", q:"建設工事の見積りに関する記述として正しいものはどれか。", choices:["A: 下請業者に見積りのための十分な期間を与える義務がある","B: 見積期間の制限はない","C: 見積書の提出は口頭でよい","D: 下請業者の見積り費用は元請が負担する"], ans:0, exp:"建設業法により元請業者は下請業者に見積りのための十分な期間（工事予定金額により1〜15日以上）を与える義務がある（A=正）。見積依頼は書面で行うことが望ましい。" },
{ id:176, cat:"建設業法", diff:"★★★", q:"監理技術者資格者証に関する記述として正しいものはどれか。", choices:["A: 発注者から請求があったときは監理技術者資格者証を提示する義務がある","B: 資格者証は携帯しなくてよい","C: 資格者証の有効期間は10年","D: 資格者証の更新は不要"], ans:0, exp:"監理技術者は資格者証を携帯し、発注者の請求があったときは提示する義務がある（A=正）。資格者証の有効期間は5年で更新が必要。監理技術者講習の受講も義務。" },
{ id:177, cat:"建設業法", diff:"★★☆", q:"建設業法上の建設工事の定義に関する記述として正しいものはどれか。", choices:["A: 建設業法では29業種の建設工事が定められている","B: 建設工事は10業種のみである","C: 電気工事は建設工事に含まれない","D: 建設工事の業種は地域により異なる"], ans:0, exp:"建設業法では土木一式・建築一式を含む29業種の建設工事が定められている（A=正）。電気工事・管工事・舗装工事等も含まれる。業種は全国共通。" },
{ id:178, cat:"建設業法", diff:"★★★", q:"元請下請関係における赤伝処理に関する記述として正しいものはどれか。", choices:["A: 下請代金からの一方的な差引きは建設業法上問題となり得る","B: 元請は自由に下請代金から費用を差し引ける","C: 赤伝処理は法的に推奨されている","D: 下請の同意は不要である"], ans:0, exp:"元請が下請代金から一方的に費用を差し引く「赤伝処理」は、不当な使用金の留保や不当な経費負担として建設業法上問題となり得る（A=正）。事前の合意と透明性が必要。" },
{ id:179, cat:"建設業法", diff:"★★☆", q:"労働安全衛生法における安全委員会に関する記述として正しいものはどれか。", choices:["A: 常時50人以上の労働者を使用する建設業の事業場で設置義務","B: 常時10人以上で設置義務","C: 安全委員会は年1回開催すればよい","D: 安全委員会のメンバーに労働者側の代表は含めない"], ans:0, exp:"安全委員会は常時50人以上の労働者を使用する一定の業種（建設業含む）の事業場で設置義務（A=正）。毎月1回以上開催。委員には労働者側の代表を含める。" },
{ id:180, cat:"建設業法", diff:"★★★", q:"建設業法の目的に関する記述として正しいものはどれか。", choices:["A: 建設工事の適正な施工確保と発注者の保護を図る","B: 建設業者の利益を最大化する","C: 建設労働者の賃金を規定する","D: 建設資材の価格を統制する"], ans:0, exp:"建設業法の目的は建設業の健全な発達、建設工事の適正な施工確保、発注者の保護を図り、公共の福祉の増進に寄与すること（A=正）。" },
{ id:181, cat:"建設業法", diff:"★★☆", q:"下請代金の支払いに関する記述として正しいものはどれか。", choices:["A: 元請は工事完成後、下請からの請求があれば50日以内に支払う","B: 支払期限に法的な制限はない","C: 手形期間に制限はない","D: 下請代金はすべて現金で支払う義務がある"], ans:0, exp:"元請は注文者から工事代金を受領した日から1ヶ月以内（かつ下請の引渡し申出から50日以内）に下請代金を支払う義務がある（A=正）。手形期間も制限あり。" },
{ id:182, cat:"建設業法", diff:"★★★", q:"建設キャリアアップシステム（CCUS）に関する記述として正しいものはどれか。", choices:["A: 技能者の就業履歴や保有資格を業界統一で蓄積するシステム","B: CCUSは元請業者の管理のためだけのシステム","C: 技能者のカード登録は不要","D: CCUSは公共工事にのみ適用される"], ans:0, exp:"建設キャリアアップシステム（CCUS）は技能者の就業履歴・保有資格・社会保険加入状況等を業界統一で蓄積し、技能者の処遇改善と現場管理の効率化を図るシステム（A=正）。" },
{ id:183, cat:"建設業法", diff:"★★☆", q:"労働基準法における解雇予告に関する記述として正しいものはどれか。", choices:["A: 少なくとも30日前に予告するか、30日分以上の平均賃金を支払う","B: 即日解雇に制限はない","C: 予告期間は7日前で足りる","D: 解雇予告は口頭でよい"], ans:0, exp:"使用者が労働者を解雇する場合、少なくとも30日前に予告するか、30日分以上の平均賃金（解雇予告手当）を支払う（A=正）。予告日数は平均賃金の支払いにより短縮可能。" },
{ id:184, cat:"建設業法", diff:"★★★", q:"特定建設業の許可基準として必要な財産的基礎の要件はどれか。", choices:["A: 資本金額が2,000万円以上かつ自己資本の額が4,000万円以上","B: 資本金額が500万円以上","C: 財産的基礎の要件はない","D: 資本金額が1億円以上"], ans:0, exp:"特定建設業の許可には①資本金2,000万円以上②自己資本4,000万円以上③欠損の額が資本金の20%以下④流動比率75%以上の4要件（A=正）。一般建設業は500万円以上の資産証明。" },
{ id:185, cat:"建設業法", diff:"★★☆", q:"公共工事の入札及び契約の適正化の促進に関する法律の趣旨として正しいものはどれか。", choices:["A: 入札・契約の透明性の確保、公正な競争の促進","B: 建設業者の保護","C: 最低価格での発注","D: 特定業者への優先発注"], ans:0, exp:"入契法は公共工事の入札・契約の透明性確保、公正な競争促進、適正な施工確保を目的とする（A=正）。施工体制台帳の作成義務拡大や、指名基準の公表等を規定。" },
{ id:186, cat:"建設業法", diff:"★★★", q:"建設業法改正（近年）における主な変更点として正しいものはどれか。", choices:["A: 技術者の専任義務の金額基準が3,500万円（建築一式7,000万円）に引き上げ","B: 許可の有効期間が10年に延長","C: 建設業の業種数が20に削減","D: 一括下請負が全面解禁"], ans:0, exp:"近年の建設業法改正で技術者の専任義務の金額基準が引き上げられた（A=正）。特定建設業の下請金額基準も4,000万円→4,500万円に改正。許可有効期間は5年のまま。" },
{ id:187, cat:"建設業法", diff:"★★☆", q:"労働者派遣法と建設業の関係に関する記述として正しいものはどれか。", choices:["A: 建設業務への労働者派遣は原則として禁止されている","B: 建設現場への派遣は自由にできる","C: 派遣労働者に建設作業をさせることは推奨されている","D: 派遣法は建設業に適用されない"], ans:0, exp:"労働者派遣法により建設業務への労働者派遣は原則禁止（A=正）。建設現場の作業は請負契約により行う。ただし事務作業等の非建設業務への派遣は可能。" },
{ id:188, cat:"建設業法", diff:"★★★", q:"工事完成検査に関する記述として正しいものはどれか。", choices:["A: 注文者は工事完成の通知を受けたら20日以内に検査を完了する","B: 検査は1年以内に行えばよい","C: 検査に合格しなくても引渡しを受ける義務がある","D: 検査方法は法で規定されていない"], ans:0, exp:"建設業法により注文者は請負人から工事完成の通知を受けた日から20日以内に完成検査を行う（A=正）。検査に合格後に引渡しを受け、代金を支払う。" },
{ id:189, cat:"建設業法", diff:"★★☆", q:"建設業における社会保険の加入に関する記述として正しいものはどれか。", choices:["A: 適用対象の事業所は健康保険・厚生年金保険・雇用保険に加入義務","B: 社会保険の加入は任意","C: 元請は下請の社会保険加入状況を確認する必要はない","D: 一人親方は社会保険に加入できない"], ans:0, exp:"建設業では適用対象の事業所に社会保険加入義務があり、未加入業者は建設業許可の更新で不利益を受ける（A=正）。元請は下請の加入状況確認が求められている。" },
{ id:190, cat:"建設業法", diff:"★★★", q:"建設工事紛争審査会に関する記述として正しいものはどれか。", choices:["A: 建設工事の請負契約に関する紛争の解決を行う機関","B: 建設業の許可を行う機関","C: 建設労働者の賃金を決定する機関","D: 建設資材の検査を行う機関"], ans:0, exp:"建設工事紛争審査会は建設業法に基づき設置される機関で、建設工事の請負契約に関する紛争（工事代金・工期・瑕疵等）のあっせん・調停・仲裁を行う（A=正）。中央と都道府県に設置。" },
{ id:191, cat:"建設業法", diff:"★★☆", q:"労働基準法における就業規則に関する記述として正しいものはどれか。", choices:["A: 常時10人以上の労働者を使用する事業場は就業規則を作成・届出する","B: 就業規則の作成は任意","C: 就業規則に賃金に関する事項は記載不要","D: 就業規則は労働者に周知する必要はない"], ans:0, exp:"常時10人以上の労働者を使用する事業場は就業規則を作成し、所轄労働基準監督署に届け出る義務がある（A=正）。賃金・労働時間・退職等の事項を記載。労働者への周知も義務。" },
{ id:192, cat:"建設業法", diff:"★★★", q:"公共工事標準請負契約約款に定める工期延長に関する記述として正しいものはどれか。", choices:["A: 天候不良等の不可抗力により工期内に完成できない場合、受注者は工期延長を請求できる","B: いかなる理由でも工期延長は認められない","C: 工期延長の費用はすべて受注者負担","D: 工期延長の請求は工事完了後に行う"], ans:0, exp:"天候不良等の不可抗力、設計変更、発注者の責に帰すべき事由等により工期内に完成できない場合、受注者は書面により工期延長を請求できる（A=正）。" },
{ id:193, cat:"建設業法", diff:"★★☆", q:"建設業における営業所の専任技術者に関する記述として正しいものはどれか。", choices:["A: 各営業所に許可業種ごとに専任の技術者を置く必要がある","B: 専任技術者は複数の営業所を兼務できる","C: 専任技術者と現場の主任技術者は常に兼務できる","D: 専任技術者の資格要件はない"], ans:0, exp:"各営業所に建設業許可業種ごとに専任の技術者を置く義務がある（A=正）。専任技術者は営業所に常勤し、他の営業所との兼務はできない。一定条件下を除き現場との兼務も制限がある。" },
{ id:194, cat:"建設業法", diff:"★★★", q:"公共工事におけるダンピング対策として正しいものはどれか。", choices:["A: 低入札価格調査制度や最低制限価格制度がある","B: 入札価格に下限はない","C: ダンピングは品質確保に問題はない","D: 公共工事ではダンピングは発生しない"], ans:0, exp:"ダンピング（不当廉売）対策として低入札価格調査制度（調査基準価格を下回る入札の調査）と最低制限価格制度がある（A=正）。ダンピングは品質低下・安全管理不足・下請へのしわ寄せの原因。" },
{ id:195, cat:"建設業法", diff:"★★☆", q:"建設業における外国人技能実習制度に関する記述として正しいものはどれか。", choices:["A: 技能実習生は実習計画に基づいて技能の習得を行う","B: 技能実習生を単純労働力として使用してよい","C: 実習期間に制限はない","D: 監理団体の関与は不要"], ans:0, exp:"技能実習制度は開発途上国への技術移転を目的とし、技能実習計画に基づいて技能の習得を行う（A=正）。単純労働力としての使用は制度の趣旨に反する。実習期間は最長5年。監理団体による指導が必要。" },
{ id:196, cat:"建設業法", diff:"★★★", q:"建設工事における契約保証に関する記述として正しいものはどれか。", choices:["A: 公共工事では契約保証金の納付または保証措置が求められる","B: 契約保証は不要","C: 契約保証金は請負代金の1%","D: 保証措置は元請のみの義務"], ans:0, exp:"公共工事では履行保証として契約保証金（請負代金の10%以上が一般的）の納付、または金融機関の保証等の措置が求められる（A=正）。受注者の債務不履行に対する発注者保護が目的。" },
{ id:197, cat:"建設業法", diff:"★★☆", q:"特定建設業と一般建設業の違いに関する記述として正しいものはどれか。", choices:["A: 特定建設業は下請に多額の工事を発注できるが、財産的基礎の要件が厳しい","B: 一般建設業と特定建設業で施工できる工事の規模に差はない","C: 特定建設業には下請保護の義務はない","D: 一般建設業の方が取得要件が厳しい"], ans:0, exp:"特定建設業は下請に4,500万円以上を発注する場合に必要で、財産的基礎の要件（資本金2,000万円以上等）が一般より厳しい（A=正）。下請保護の義務（適正な代金支払等）も重い。" },
{ id:198, cat:"道路・舗装", diff:"★★☆", q:"アスファルト舗装の構成順序として正しいものはどれか。", choices:["A: 表層→基層→路盤→路床","B: 路床→路盤→基層→表層","C: 表層→基層→上層路盤→下層路盤→路床","D: 路床→表層→基層→路盤"], ans:2, exp:"アスファルト舗装は上から表層→基層→上層路盤→下層路盤→路床の5層構成（C=正）。設計は路床の設計CBRと交通量に基づく。" },
{ id:199, cat:"道路・舗装", diff:"★★★", q:"アスファルト舗装の温度管理に関する記述として正しいものはどれか。", choices:["A: 合材製造温度は100〜120℃","B: 初転圧温度は110〜140℃","C: 仕上げ転圧温度は90℃以上","D: 敷均し温度は80℃以上"], ans:1, exp:"初転圧温度は110〜140℃（B=正）。合材製造160〜180℃、敷均し110℃以上、二次転圧70〜90℃、仕上げ転圧50℃以上が正しい数値。" },
{ id:200, cat:"道路・舗装", diff:"★★☆", q:"路床のCBR値に関する記述として正しいものはどれか。", choices:["A: 設計CBR≧3が最低基準","B: CBR値が小さいほど支持力が大きい","C: 路床とは路盤の上部のことである","D: CBR試験は舗装表面で行う"], ans:0, exp:"路床の設計CBR≧3が最低基準で、3未満の場合は路床改良が必要（A=正）。CBRが大きいほど支持力が大きい。路床は舗装直下約1mの土層。" },
{ id:201, cat:"道路・舗装", diff:"★★★", q:"タックコートとプライムコートに関する記述として誤っているものはどれか。", choices:["A: プライムコートは路盤の上に散布する","B: タックコートは舗装層間の接着のために散布する","C: プライムコートにはPK-3を使用する","D: タックコートにはPK-4を使用する"], ans:3, exp:"タックコートにはPK-4ではなくPK-3または乳剤（PKR-T等）が一般的に使用される場合もあるが、通常はPK-4ではない（D=誤り）。プライムコートにはPK-3（瀝青系）、タックコートにはPK-3またはゴム入り乳剤を使用。" },
{ id:202, cat:"道路・舗装", diff:"★★☆", q:"アスファルト舗装の転圧に使用する機械として正しい組み合わせはどれか。", choices:["A: 初転圧→ロードローラー、二次転圧→タイヤローラー","B: 初転圧→タイヤローラー、二次転圧→ロードローラー","C: すべてタンデムローラーで行う","D: すべてブルドーザーで行う"], ans:0, exp:"初転圧はロードローラー（鉄輪、10〜12t）、二次転圧はタイヤローラー（8〜20t）、仕上げ転圧はタンデムローラー（6〜10t）を使用（A=正）。" },
{ id:203, cat:"道路・舗装", diff:"★★★", q:"舗装の平坦性に関する記述として正しいものはどれか。", choices:["A: 高速道路の表層の平坦性はσ≦2.4mm","B: 平坦性は目視で判定する","C: プロフィロメーターは路盤の密度を測定する機器","D: 平坦性は品質管理の対象外"], ans:0, exp:"高速道路の表層はσ≦2.4mm（3mプロフィロメーター）が基準（A=正）。一般国道はσ≦2.4mm、その他はσ≦3.5mm程度。プロフィロメーターは路面の凹凸を測定する機器。" },
{ id:204, cat:"道路・舗装", diff:"★★☆", q:"路盤材料に関する記述として正しいものはどれか。", choices:["A: 下層路盤にはクラッシャーラン（C-40等）が用いられる","B: 上層路盤にはクラッシャーランのみが用いられる","C: 路盤材料にCBR値の要件はない","D: セメント安定処理は下層路盤には適用できない"], ans:0, exp:"下層路盤にはクラッシャーラン（C-40等）、上層路盤には粒度調整砕石（M-30等）またはセメント・瀝青安定処理材が用いられる（A=正）。路盤材料にはCBR要件がある。" },
{ id:205, cat:"道路・舗装", diff:"★★★", q:"アスファルトの針入度に関する記述として正しいものはどれか。", choices:["A: 針入度は25℃で100g荷重、5秒間で針が貫入した深さ（1/10mm単位）","B: 針入度が大きいほど硬いアスファルト","C: 舗装用アスファルトは針入度200以上を使用","D: 針入度試験は現場で行う"], ans:0, exp:"針入度試験は25℃、100g荷重、5秒間で測定（A=正）。針入度が大きいほど軟らかい。舗装用ストレートアスファルトは一般に40〜60または60〜80を使用。" },
{ id:206, cat:"道路・舗装", diff:"★★☆", q:"マーシャル安定度試験に関する記述として正しいものはどれか。", choices:["A: アスファルト混合物の安定度とフロー値を測定する試験","B: コンクリート舗装の強度を測定する試験","C: 路盤材料の粒度を測定する試験","D: 路床のCBRを測定する試験"], ans:0, exp:"マーシャル安定度試験はアスファルト混合物の供試体を60℃で載荷し、安定度（最大荷重）とフロー値（変形量）を測定する配合設計の基本試験（A=正）。" },
{ id:207, cat:"道路・舗装", diff:"★★★", q:"アスファルト舗装のわだち掘れに関する記述として正しいものはどれか。", choices:["A: 重交通道路の車輪通過部に生じる轍状の凹み","B: わだち掘れは低温時に発生しやすい","C: わだち掘れと混合物の配合は無関係","D: わだち掘れの測定は不要"], ans:0, exp:"わだち掘れは重交通荷重の繰り返しによる轍状の永久変形で、特に高温期に発生しやすい（A=正）。対策は耐流動性の高い混合物（改質アスファルト等）の使用。ホイールトラッキング試験で評価。" },
{ id:208, cat:"道路・舗装", diff:"★★☆", q:"道路構造令に関する記述として正しいものはどれか。", choices:["A: 道路の種類ごとに設計速度・車線幅員等の構造基準を定めている","B: 道路構造令は高速道路にのみ適用される","C: 車線幅員は全道路で一律3.5m","D: 設計速度は道路の種類に関係なく一律"], ans:0, exp:"道路構造令は道路法に基づき、道路の種類（高速自動車国道・一般国道等）や区分ごとに設計速度・車線幅員・曲線半径等の構造基準を定めている（A=正）。" },
{ id:209, cat:"道路・舗装", diff:"★★★", q:"橋面舗装に関する記述として正しいものはどれか。", choices:["A: 橋面防水層の上にアスファルト舗装を施す","B: 橋面舗装には特別な配慮は不要","C: 一般の道路舗装とまったく同じ構造でよい","D: 橋面舗装は10cm以上の厚さが必要"], ans:0, exp:"橋面舗装は橋梁床版上に防水層を設け、その上にアスファルト舗装を施す（A=正）。床版の防水・排水処理が重要。橋面の特殊性（たわみ・温度変化）に対応した舗装が必要。" },
{ id:210, cat:"道路・舗装", diff:"★★☆", q:"コンクリート舗装の目地に関する記述として正しいものはどれか。", choices:["A: 横収縮目地は8〜10m間隔で設ける","B: 目地は不要である","C: 膨張目地は500m間隔で設ける","D: ダウエルバーは膨張目地に使用しない"], ans:0, exp:"コンクリート舗装の横収縮目地は8〜10m間隔（A=正）。膨張目地は120m以下の間隔。ダウエルバーは横目地に設置し荷重伝達の役割を果たす。" },
{ id:211, cat:"道路・舗装", diff:"★★★", q:"排水性舗装に関する記述として正しいものはどれか。", choices:["A: 表層に空隙の多い混合物を用い、雨水を舗装内部に浸透させて排水する","B: 排水性舗装は路床まで水を浸透させる","C: 遮水層（不透水層）は不要","D: 空隙率は通常のアスファルト舗装と同じ"], ans:0, exp:"排水性舗装はポーラスアスファルト（空隙率20%程度）を表層に使用し、雨水を舗装内部に浸透させて基層上面の不透水層（遮水層）で排水する（A=正）。騒音低減効果もある。" },
{ id:212, cat:"道路・舗装", diff:"★★☆", q:"等値換算厚さ（TA法）に関する記述として正しいものはどれか。", choices:["A: 各舗装層の厚さに等値換算係数を乗じた値の合計で舗装の必要厚さを求める","B: 路床のCBRのみで舗装厚を決定する","C: 等値換算係数は全層で同じ値","D: TA法はコンクリート舗装にのみ適用する"], ans:0, exp:"TA法は各舗装層の厚さに等値換算係数（表層・基層は1.0、上層路盤は0.55等）を乗じた合計値で必要舗装厚さを求める方法（A=正）。CBRと交通量の組合せで必要TA値を算出。" },
{ id:213, cat:"道路・舗装", diff:"★★★", q:"半たわみ性舗装に関する記述として正しいものはどれか。", choices:["A: 空隙の多いアスファルト混合物にセメントミルクを浸透させた舗装","B: コンクリート舗装の一種","C: 一般道路のみに使用される","D: 耐流動性は通常のアスファルト舗装と同じ"], ans:0, exp:"半たわみ性舗装は開粒度アスファルト混合物の空隙にセメントミルクを浸透させた舗装で、アスファルトのたわみ性とセメントの剛性を併せ持つ（A=正）。交差点等の耐流動性が必要な箇所に有効。" },
{ id:214, cat:"道路・舗装", diff:"★★☆", q:"舗装のひび割れに関する記述として正しいものはどれか。", choices:["A: リフレクションクラックは下層のひび割れが上層に反映する現象","B: ひび割れは舗装の性能に影響しない","C: ひび割れの補修は不要","D: 疲労ひび割れは高温で発生しやすい"], ans:0, exp:"リフレクションクラック（反射ひび割れ）は下層（既設舗装等）のひび割れや目地が上層のオーバーレイに反映して生じる（A=正）。疲労ひび割れは繰り返し荷重で発生。ひび割れは雨水浸入の原因となり補修が必要。" },
{ id:215, cat:"道路・舗装", diff:"★★★", q:"改質アスファルトに関する記述として正しいものはどれか。", choices:["A: SBS等のポリマーを添加してアスファルトの性能を改善したもの","B: 改質アスファルトは通常のストレートアスファルトより安価","C: 改質により針入度は増加する","D: 改質アスファルトは排水性舗装に使用しない"], ans:0, exp:"改質アスファルトはSBS等のポリマーを添加して耐流動性・耐摩耗性・低温特性を改善したもの（A=正）。ストレートアスファルトより高価だが高性能。排水性舗装にも使用。" },
{ id:216, cat:"道路・舗装", diff:"★★☆", q:"路面のすべり抵抗に関する記述として正しいものはどれか。", choices:["A: すべり摩擦係数が大きいほどすべりにくい","B: 雨天時はすべり抵抗が増加する","C: すべり抵抗は舗装設計に考慮しない","D: 表層の骨材はすべり抵抗に影響しない"], ans:0, exp:"すべり摩擦係数が大きいほど路面はすべりにくく安全（A=正）。雨天時はすべり抵抗が低下。表層骨材のテクスチャ（粗さ）がすべり抵抗に大きく影響する。" },
{ id:217, cat:"道路・舗装", diff:"★★★", q:"アスファルト舗装の横継目に関する記述として正しいものはどれか。", choices:["A: 既設舗装端部をカットし、タックコートを塗布してから新設部を施工する","B: 横継目の重ね幅は5cm以内とする","C: 横継目の位置は車線中央が望ましい","D: 横継目の処理は不要"], ans:0, exp:"横継目は既設舗装端部を垂直にカットし、タックコートを塗布してから新設部を施工する（A=正）。隣接車線の横継目は1m以上ずらす。適切な処理をしないと段差や水の浸入の原因となる。" },
{ id:218, cat:"道路・舗装", diff:"★★☆", q:"粒度調整砕石（M-30）の用途として正しいものはどれか。", choices:["A: 上層路盤材料","B: 表層材料","C: 基層材料","D: アスファルト混合物の骨材"], ans:0, exp:"粒度調整砕石（M-30、M-25等）は上層路盤材料として使用される（A=正）。最大粒径30mmまたは25mmの砕石で、粒度を調整して締固め特性を向上させている。" },
{ id:219, cat:"道路・舗装", diff:"★★★", q:"FWD（Falling Weight Deflectometer）に関する記述として正しいものはどれか。", choices:["A: 舗装のたわみ量を測定して構造的健全性を評価する装置","B: 舗装の色を測定する装置","C: アスファルトの温度を測定する装置","D: 路面の騒音を測定する装置"], ans:0, exp:"FWD（重錘落下式たわみ測定装置）は路面に重錘を落下させてたわみ量を測定し、舗装の構造的健全性や支持力を評価する非破壊試験装置（A=正）。舗装の維持修繕計画に活用。" },
{ id:220, cat:"道路・舗装", diff:"★★☆", q:"舗装の打換え工法に関する記述として正しいものはどれか。", choices:["A: 既設舗装を全層撤去して新たに舗装する工法","B: 既設舗装の上に重ねて舗装する工法","C: 表面を削って再利用する工法","D: 路床のみを改良する工法"], ans:0, exp:"打換え工法は既設舗装を路盤または路床まで全層撤去し、新たに舗装を施工する工法（A=正）。Bはオーバーレイ工法、Cは切削オーバーレイまたはリサイクル工法の説明。" },
{ id:221, cat:"道路・舗装", diff:"★★★", q:"再生アスファルト舗装に関する記述として正しいものはどれか。", choices:["A: 既設アスファルト混合物を再利用して新たな混合物を製造する","B: 再生材の配合率に制限はない","C: 再生用添加剤は使用しない","D: プラント再生には加熱装置は不要"], ans:0, exp:"再生アスファルト舗装は切削・破砕した既設アスファルト混合物を再生用添加剤とともにプラントで加熱混合して新たな混合物を製造する（A=正）。配合率は品質基準の範囲内で設定。" },
{ id:222, cat:"道路・舗装", diff:"★★☆", q:"舗装の維持修繕に関する記述として正しいものはどれか。", choices:["A: パッチング→局部的なくぼみ等を部分的に補修する方法","B: シール材充填→構造的な補強方法","C: オーバーレイ→路床の改良方法","D: 維持修繕は舗装の寿命に影響しない"], ans:0, exp:"パッチングはポットホール（穴）やくぼみ等を部分的にアスファルト混合物で充填補修する方法（A=正）。シール材充填はひび割れ補修。オーバーレイは上層の重ね施工。適切な維持修繕は舗装寿命を延長。" },
{ id:223, cat:"道路・舗装", diff:"★★★", q:"SMA（砕石マスチック）舗装に関する記述として正しいものはどれか。", choices:["A: 粗骨材のかみ合わせ構造で高い耐流動性を持つ舗装","B: 空隙率が高く排水性に優れる","C: バインダーの量は通常の密粒舗装より少ない","D: わだち掘れに弱い"], ans:0, exp:"SMA舗装は粗骨材の骨格構造（かみ合わせ）とアスファルトモルタル（マスチック）で構成され、高い耐流動性と耐久性を持つ（A=正）。重交通道路や交差点に適用。" },
{ id:224, cat:"道路・舗装", diff:"★★☆", q:"道路の法定最高速度と舗装設計の関係として正しいものはどれか。", choices:["A: 設計速度が高いほど舗装の平坦性基準が厳しくなる","B: 設計速度と舗装設計は無関係","C: 低速道路ほど平坦性基準が厳しい","D: 舗装厚は設計速度のみで決まる"], ans:0, exp:"設計速度が高いほど走行安全性のため舗装の平坦性基準は厳しくなる（A=正）。高速道路はσ≦2.4mm。舗装厚は設計速度ではなく交通量と路床のCBRで決まる。" },
{ id:225, cat:"道路・舗装", diff:"★★★", q:"アスファルト混合物の抽出試験に関する記述として正しいものはどれか。", choices:["A: 混合物中のアスファルト量を求める試験","B: 混合物の温度を測定する試験","C: 骨材の強度を測定する試験","D: 混合物の色を判定する試験"], ans:0, exp:"抽出試験はアスファルト混合物から溶剤（トリクロロエチレン等）でアスファルトを抽出し、混合物中のアスファルト量（As量）を求める試験（A=正）。品質管理に使用。" },
{ id:226, cat:"道路・舗装", diff:"★★☆", q:"路肩の役割として正しいものはどれか。", choices:["A: 車道の側方余裕を確保し、故障車の退避スペースとなる","B: 路肩は車両通行のために設けられる","C: 路肩の幅員に基準はない","D: 路肩は舗装しない"], ans:0, exp:"路肩は車道の側方余裕の確保、故障車の退避、路面排水施設の設置スペース等の役割がある（A=正）。道路構造令で幅員基準が定められており、保護路肩は舗装する場合が多い。" },
{ id:227, cat:"道路・舗装", diff:"★★★", q:"交差点部の舗装に関する記述として正しいものはどれか。", choices:["A: 交差点部は停止・発進の繰り返しにより耐流動性の高い舗装が必要","B: 交差点部は通常区間と同じ舗装でよい","C: 交差点部の舗装は薄くてよい","D: カラー舗装は使用しない"], ans:0, exp:"交差点部は車両の停止・発進・低速走行の繰り返しによるわだち掘れが生じやすいため、改質アスファルトや半たわみ性舗装等の耐流動性の高い舗装が必要（A=正）。" },
{ id:228, cat:"河川・砂防", diff:"★★☆", q:"河川護岸の施工に関する記述として誤っているものはどれか。", choices:["A: 基礎工は洗掘に対して根入れ深さを確保する","B: 法覆工は下流側から上流側に向かって施工する","C: 練積みは空積みより強固である","D: 根固工は法尻部分を保護する"], ans:1, exp:"法覆工は上流側から下流側に向かって施工する（B=誤り）。逆施工だと目地部から洗掘されやすい。法尻から上方へ施工するのが基本。" },
{ id:229, cat:"河川・砂防", diff:"★★★", q:"砂防えん堤の水通しの位置として正しいものはどれか。", choices:["A: 本えん堤の両端部（袖部）","B: 本えん堤の中央部","C: 副えん堤の中央部","D: 前庭部（水叩き）"], ans:1, exp:"砂防えん堤の水通しは本えん堤の中央部（B=正）に設ける。袖部は水通しより高く設計し越流を防ぐ。副えん堤は前庭部の洗掘防止。" },
{ id:230, cat:"河川・砂防", diff:"★★☆", q:"重力式コンクリートダムに関する記述として正しいものはどれか。", choices:["A: ダムの自重で水圧に抵抗する形式","B: アーチ効果で水圧に抵抗する","C: 土や岩を材料とする","D: 鋼製の構造物である"], ans:0, exp:"重力式コンクリートダムはダム本体の自重（重力）で水圧に抵抗する形式（A=正）。Bはアーチ式ダム、Cはフィルダムの説明。広い谷に適し、施工実績が豊富。" },
{ id:231, cat:"河川・砂防", diff:"★★★", q:"フィルダムに関する記述として正しいものはどれか。", choices:["A: ゾーン型フィルダムは遮水性のコアとシェル（保護材）で構成される","B: フィルダムは狭い谷に適している","C: フィルダムの材料はセメントのみである","D: フィルダムに洪水吐きは不要"], ans:0, exp:"ゾーン型フィルダムは中央部に遮水性のコア（粘土等）、その両側にシェル（砂礫等）を配置した構造（A=正）。広い谷に適し、現場発生材を利用できる利点がある。洪水吐きは必須。" },
{ id:232, cat:"河川・砂防", diff:"★★☆", q:"河川堤防の構造に関する記述として正しいものはどれか。", choices:["A: 表法（川表）は堤体の河川側の法面である","B: 裏法（川裏）は堤体の河川側の法面である","C: 天端幅は一律1mと定められている","D: 堤防の高さは計画高水位と同じ"], ans:0, exp:"表法（川表）は河川側、裏法（川裏）は堤内地（居住地）側の法面（A=正）。天端幅は堤防の重要度により3〜6m程度。堤防高は計画高水位に余裕高を加えた高さ。" },
{ id:233, cat:"河川・砂防", diff:"★★★", q:"河川の計画高水位に関する記述として正しいものはどれか。", choices:["A: 計画高水位はその地点で計画の基本となる洪水の水位","B: 計画高水位は平常時の水位","C: 計画高水位は堤防天端の高さ","D: 計画高水位は地下水位のこと"], ans:0, exp:"計画高水位（HWL）は河川整備計画において基本となる洪水時の水位で、この水位に余裕高を加えて堤防の高さを決定する（A=正）。計画高水流量から水位を算出。" },
{ id:234, cat:"河川・砂防", diff:"★★☆", q:"護岸の種類に関する記述として正しいものはどれか。", choices:["A: 連節ブロックは屈とう性に優れ、法面の変形に追従しやすい","B: コンクリートブロック練積みは透水性が高い","C: かごマット工は止水性に優れている","D: 石積みは現在使用されていない"], ans:0, exp:"連節ブロックはブロック同士が連結されており屈とう性（柔軟性）に優れ、法面の変形に追従できる（A=正）。練積みは止水性が高い。かごマットは透水性がある。石積みも現在でも使用される。" },
{ id:235, cat:"河川・砂防", diff:"★★★", q:"RCD工法に関する記述として正しいものはどれか。", choices:["A: 超硬練りコンクリートをブルドーザーで敷均しローラーで締固める工法","B: 通常のコンクリートをポンプで圧送する工法","C: プレキャストコンクリートを組み立てる工法","D: RCDはReinforced Concrete Damの略"], ans:0, exp:"RCD工法（Roller Compacted Dam-concrete）は超硬練りコンクリート（スランプゼロ）をブルドーザーで敷均し、振動ローラーで締固める合理化施工法（A=正）。重力式ダムに適用。" },
{ id:236, cat:"河川・砂防", diff:"★★☆", q:"水制に関する記述として正しいものはどれか。", choices:["A: 水制は流水の方向・勢力を制御する構造物で、河岸侵食防止に有効","B: 水制は堤防の内部に設置する構造物","C: 水制は橋梁の一種","D: 水制はダムの付属施設"], ans:0, exp:"水制は河川の流水方向・勢力を制御して河岸の侵食を防止し、河道の安定を図る構造物（A=正）。透過型と不透過型があり、流れを制御して河床変動をコントロールする。" },
{ id:237, cat:"河川・砂防", diff:"★★★", q:"地すべり対策工のうち抑止工に分類されるものはどれか。", choices:["A: 排水ボーリング工","B: 排土工","C: 杭打ち工","D: 横ボーリング工"], ans:2, exp:"杭打ち工は構造物により地すべりの移動を抑止する抑止工（C=正）。排水ボーリング・排土工・横ボーリングは地すべりの原因を除去する抑制工に分類される。" },
{ id:238, cat:"河川・砂防", diff:"★★☆", q:"河川法における許可行為に関する記述として正しいものはどれか。", choices:["A: 河川区域内の工作物の新築には河川管理者の許可が必要","B: 河川区域内は自由に工事できる","C: 許可は口頭で申請できる","D: 河川区域の定義は河川法にない"], ans:0, exp:"河川法第26条により河川区域内の工作物の新築・改築・除去には河川管理者の許可が必要（A=正）。土地の占用（24条）、土石採取（25条）、掘削等（27条）も同様。" },
{ id:239, cat:"河川・砂防", diff:"★★★", q:"急傾斜地崩壊対策に関する記述として正しいものはどれか。", choices:["A: 急傾斜地崩壊危険区域では崩壊を助長する行為が制限される","B: 急傾斜地の指定は国土交通大臣のみが行う","C: 対策工事に法的根拠はない","D: 急傾斜地とは傾斜角10度以上の斜面"], ans:0, exp:"急傾斜地の崩壊による災害の防止に関する法律により、急傾斜地崩壊危険区域内では切土・盛土等の崩壊を助長する行為が制限される（A=正）。急傾斜地は傾斜角30度以上で高さ5m以上。" },
{ id:240, cat:"河川・砂防", diff:"★★☆", q:"堰（せき）に関する記述として正しいものはどれか。", choices:["A: 取水や水位調節のために河川を横断して設ける構造物","B: 堰は堤防の一種","C: 堰には可動部がない","D: 堰とダムの区別はない"], ans:0, exp:"堰は取水・水位調節・分水等のために河川を横断して設ける構造物（A=正）。ゲート（可動部）を有する可動堰と固定堰がある。河川法では堤防や堰は別の施設として区分。ダムとは高さ15m以上か否かで区別。" },
{ id:241, cat:"河川・砂防", diff:"★★★", q:"河川の洪水調節に関する記述として正しいものはどれか。", choices:["A: ダムによる洪水調節は洪水のピーク流量を低減させる","B: 洪水調節は下流への流量を増加させる","C: 遊水地は洪水調節機能を持たない","D: 放水路は洪水調節に関係ない"], ans:0, exp:"ダムの洪水調節は洪水を一時的に貯留してピーク流量を低減し、下流の安全を確保する（A=正）。遊水地も洪水を一時的に貯留。放水路は河川水を別水系に分派して流量を低減する。" },
{ id:242, cat:"河川・砂防", diff:"★★☆", q:"根固工に関する記述として正しいものはどれか。", choices:["A: 護岸の法尻部の洗掘を防止するために設ける","B: 堤防天端に設ける構造物","C: 堤防内部の排水施設","D: 橋脚の基礎構造物"], ans:0, exp:"根固工は護岸の法尻部（基礎工の前面）の洗掘を防止するために設置する（A=正）。捨石・コンクリートブロック等で構成され、流水による侵食から法覆工の基礎を保護する。" },
{ id:243, cat:"河川・砂防", diff:"★★★", q:"アーチ式ダムに関する記述として正しいものはどれか。", choices:["A: 水圧をアーチ効果により両岸の岩盤に伝達する形式","B: 広い谷に適している","C: 堤体のコンクリート量が最も多い形式","D: 岩盤の強度に関係なく建設可能"], ans:0, exp:"アーチ式ダムはダム体をアーチ状に湾曲させ、水圧を両岸の岩盤に伝達する形式（A=正）。狭い谷で両岸の岩盤が強固な場所に適する。コンクリート量は重力式より少ない。" },
{ id:244, cat:"河川・砂防", diff:"★★☆", q:"砂防施設における床固工の役割として正しいものはどれか。", choices:["A: 河床の低下を防止し、縦断勾配の安定を図る","B: 洪水流量を増加させる","C: 河道を狭める目的で設置する","D: 堤防の代わりに設置する"], ans:0, exp:"床固工は河床低下（浸食）を防止し、河川の縦断勾配を安定させるために設ける横断工作物（A=正）。砂防えん堤より低く、河床の安定化を主目的とする。" },
{ id:245, cat:"河川・砂防", diff:"★★★", q:"河川堤防の浸透対策に関する記述として正しいものはどれか。", choices:["A: ドレーン工は堤体内の浸透水を安全に排水する工法","B: 止水矢板は堤防内部の排水に使用する","C: 浸透対策は洪水後に実施する","D: 堤体の浸透は堤防の安定に影響しない"], ans:0, exp:"ドレーン工は堤体内に透水性の高い材料（砂礫等）を設置し、浸透水を安全に排水して堤体の安定を確保する工法（A=正）。止水矢板は浸透を遮断する対策。浸透は堤体の安定に大きく影響。" },
{ id:246, cat:"河川・砂防", diff:"★★☆", q:"河川の多自然川づくりに関する記述として正しいものはどれか。", choices:["A: 河川の持つ自然環境を保全・回復することを目的とした川づくり","B: 自然環境を完全に人工物に置き換える","C: 治水機能を無視して自然環境のみを重視する","D: コンクリートのみで河川を整備する"], ans:0, exp:"多自然川づくりは治水・利水機能を確保しつつ、河川の持つ自然環境（動植物の生息・生育環境）を保全・回復することを目的とした川づくり（A=正）。自然石・植生を活用した護岸等を採用。" },
{ id:247, cat:"河川・砂防", diff:"★★★", q:"ダムのコンジットゲートに関する記述として正しいものはどれか。", choices:["A: ダム堤体内に設けられた放流設備で洪水調節や利水放流に使用","B: ダムの上流側に設ける堰","C: ダム湖の水質浄化装置","D: ダムの基礎排水施設"], ans:0, exp:"コンジットゲートはダム堤体内に設けられたゲート付きの放流設備で、洪水調節放流や利水放流に使用される（A=正）。クレストゲート（越流式）と使い分ける。" },
{ id:248, cat:"河川・砂防", diff:"★★☆", q:"砂防法に関する記述として正しいものはどれか。", choices:["A: 砂防指定地内では一定の行為に都道府県知事の許可が必要","B: 砂防法は都市部にのみ適用される","C: 砂防指定地では自由に工事できる","D: 砂防法は明治時代に制定されたが現在は廃止"], ans:0, exp:"砂防法に基づく砂防指定地内では、土石の採取・施設の新改築等の一定の行為に都道府県知事の許可が必要（A=正）。砂防法は明治30年制定で現在も有効。山間部を中心に全国に指定地がある。" },
{ id:249, cat:"河川・砂防", diff:"★★★", q:"土石流対策施設に関する記述として正しいものはどれか。", choices:["A: 砂防えん堤は土石流の捕捉・減勢に有効","B: 導流工は土石流を停止させる施設","C: 遊砂地は土石流を加速させる施設","D: 土石流対策に砂防施設は不要"], ans:0, exp:"砂防えん堤は土石流を捕捉（堆積）し、流速を減勢する最も基本的な対策施設（A=正）。導流工は土石流を安全な方向に導く施設。遊砂地は土砂を堆積させる施設。" },
{ id:250, cat:"河川・砂防", diff:"★★☆", q:"樋門・樋管に関する記述として正しいものはどれか。", choices:["A: 堤防を横断して設けられ、農業用水の取水や内水排除に使用","B: 堤防の上に設ける構造物","C: 河川の水位測定施設","D: 堤防の法面保護施設"], ans:0, exp:"樋門・樋管は堤防を横断して設けられるゲート付きの管渠施設で、農業用水の取水、内水（堤内地の水）の排除等に使用される（A=正）。洪水時にはゲートを閉鎖して逆流を防止。" },
{ id:251, cat:"河川・砂防", diff:"★★★", q:"ダムの堆砂対策に関する記述として正しいものはどれか。", choices:["A: 排砂ゲートやバイパストンネルにより堆砂を排出する方法がある","B: ダムの堆砂は放置しても問題ない","C: 堆砂対策は建設時のみ検討すればよい","D: 堆砂はダムの貯水容量に影響しない"], ans:0, exp:"ダムの堆砂対策として排砂ゲート（黒部ダム等）、排砂バイパストンネル、浚渫等の方法がある（A=正）。堆砂はダムの貯水容量を減少させるため、継続的な管理が必要。" },
{ id:252, cat:"河川・砂防", diff:"★★☆", q:"河川水辺の国勢調査に関する記述として正しいものはどれか。", choices:["A: 河川の生物や河川空間の利用状況を定期的に調査する","B: 人口調査の一部である","C: 河川の水量のみを測定する","D: 河川管理者が実施する義務はない"], ans:0, exp:"河川水辺の国勢調査は河川の生物（魚類・植物・鳥類等）や河川空間の利用状況等を定期的に調査し、河川環境の把握と保全に役立てるもの（A=正）。河川管理者が実施。" },
{ id:253, cat:"河川・砂防", diff:"★★★", q:"土石流の発生条件に関する記述として正しいものはどれか。", choices:["A: 急勾配の渓流で大量の降雨があり、不安定な土砂が存在する場合に発生しやすい","B: 平坦な河川で発生しやすい","C: 乾燥時に発生しやすい","D: 土砂の堆積がない渓流で発生する"], ans:0, exp:"土石流は急勾配の渓流において、大量の降雨等により不安定に堆積した土砂が水と混合して流下する現象（A=正）。渓床勾配15度以上で発生しやすい。豪雨時や地震後に注意。" },
{ id:254, cat:"河川・砂防", diff:"★★☆", q:"河川の流量観測に関する記述として正しいものはどれか。", choices:["A: 水位−流量関係曲線（H-Q曲線）により水位から流量を推定できる","B: 流量は水位のみで正確に決定できる","C: 流量観測は年に1回実施すればよい","D: 流速計による観測は不可能"], ans:0, exp:"水位−流量関係曲線（H-Q曲線）を作成すれば、水位観測値から流量を推定できる（A=正）。曲線作成には流速計等による流量実測が必要。河床変動により曲線は変化するため定期的な検証が必要。" },
{ id:255, cat:"河川・砂防", diff:"★★★", q:"河川堤防の液状化対策に関する記述として正しいものはどれか。", choices:["A: 基礎地盤の液状化により堤防が沈下・変形する危険がある","B: 河川堤防は液状化の影響を受けない","C: 液状化対策は堤防本体のみで十分","D: 砂質の基礎地盤は液状化しない"], ans:0, exp:"飽和した砂質の基礎地盤が地震時に液状化すると堤防が沈下・変形・すべりを起こす危険がある（A=正）。対策として基礎地盤の締固め、排水工、固化処理等がある。2011年東日本大震災でも被害多数。" },
{ id:256, cat:"河川・砂防", diff:"★★☆", q:"河川工事における仮締切りに関する記述として正しいものはどれか。", choices:["A: 施工箇所を河川の流水から遮断するための仮設構造物","B: 永久構造物の一種","C: 仮締切りは不要で直接水中で施工する","D: 仮締切りの設計は不要"], ans:0, exp:"仮締切りは河川工事において施工箇所を流水から遮断し、ドライワーク（気中施工）を可能にする仮設構造物（A=正）。鋼矢板仮締切り等が一般的。出水期前に撤去する計画が必要。" },
{ id:257, cat:"河川・砂防", diff:"★★★", q:"流域治水に関する記述として正しいものはどれか。", choices:["A: 河川管理者だけでなく流域全体のあらゆる関係者が協働して治水に取り組む概念","B: 河川内の対策のみで治水を行う概念","C: ダムの建設のみで治水を行う概念","D: 治水は国の責任のみで行う"], ans:0, exp:"流域治水は気候変動を踏まえ、河川管理者だけでなく流域全体のあらゆる関係者（国・自治体・企業・住民）が協働して水害対策に取り組む考え方（A=正）。2020年に国交省が推進を表明。" },
{ id:258, cat:"環境・法規", diff:"★★☆", q:"建設リサイクル法における対象工事の規模要件として正しいものはどれか。", choices:["A: 解体工事→延床面積80㎡以上","B: 解体工事→延床面積50㎡以上","C: 新築工事→延床面積100㎡以上","D: 土木工事→請負代金5,000万円以上"], ans:0, exp:"建設リサイクル法：解体→80㎡以上、新築・増改築→500㎡以上、土木→1億円以上、修繕→1億円以上（A=正）。" },
{ id:259, cat:"環境・法規", diff:"★★★", q:"騒音規制法の特定建設作業の届出に関して正しいものはどれか。", choices:["A: 作業開始3日前までに都道府県知事へ届出","B: 作業開始7日前までに市町村長へ届出","C: 作業開始14日前までに市町村長へ届出","D: 作業完了後7日以内に届出"], ans:1, exp:"騒音規制法：特定建設作業は作業開始7日前までに市町村長へ届出（B=正）。規制基準85dB以下。" },
{ id:260, cat:"環境・法規", diff:"★★☆", q:"建設リサイクル法のコンクリート塊の再資源化目標として正しいものはどれか。", choices:["A: 80%以上","B: 90%以上","C: 70%以上","D: 95%以上"], ans:1, exp:"コンクリート塊の再資源化目標は90%以上（B=正）。アスファルト・コンクリートも90%以上。建設発生木材は70%以上。" },
{ id:261, cat:"環境・法規", diff:"★★★", q:"廃棄物処理法における産業廃棄物のマニフェスト制度に関する記述として正しいものはどれか。", choices:["A: 排出事業者はマニフェストにより産業廃棄物の処理を最終処分まで確認する義務がある","B: マニフェストは運搬業者のみが管理する","C: マニフェストの保存期間は1年","D: 電子マニフェストは認められていない"], ans:0, exp:"マニフェスト制度は排出事業者が産業廃棄物の処理を最終処分まで確認する制度（A=正）。B2票90日・D票90日・E票180日以内の返送確認。保存期間5年。電子マニフェストも利用可能。" },
{ id:262, cat:"環境・法規", diff:"★★☆", q:"建設工事の産業廃棄物における排出事業者に関する記述として正しいものはどれか。", choices:["A: 排出事業者は元請業者である","B: 排出事業者は下請業者である","C: 排出事業者は発注者である","D: 排出事業者は廃棄物処理業者"], ans:0, exp:"建設工事においては元請業者が排出事業者として産業廃棄物の処理責任を負う（A=正）。下請業者から発生した廃棄物も元請の責任。これは廃棄物処理法の重要な規定。" },
{ id:263, cat:"環境・法規", diff:"★★★", q:"振動規制法における特定建設作業の基準として正しいものはどれか。", choices:["A: 規制基準は75dB以下","B: 規制基準は85dB以下","C: 規制基準は65dB以下","D: 規制基準は90dB以下"], ans:0, exp:"振動規制法の特定建設作業の規制基準は75dB以下（A=正）。騒音規制法は85dB以下。セットで覚える：騒音85dB・振動75dB。" },
{ id:264, cat:"環境・法規", diff:"★★☆", q:"大気汚染防止法における粉じん対策に関する記述として正しいものはどれか。", choices:["A: アスベスト（石綿）を含む建材の解体には届出と飛散防止措置が必要","B: 粉じん対策は建設工事には適用されない","C: 散水による対策は認められない","D: 大気汚染防止法は工場のみに適用"], ans:0, exp:"大気汚染防止法により石綿含有建材の解体工事は事前届出と飛散防止措置（隔離・湿潤化等）が必要（A=正）。建設工事の粉じん（特定粉じん）も規制対象。散水は有効な対策。" },
{ id:265, cat:"環境・法規", diff:"★★★", q:"水質汚濁防止法に関する記述として正しいものはどれか。", choices:["A: 特定施設を設置する工場から公共用水域に排出する水の水質を規制する法律","B: 建設工事からの排水は規制対象外","C: 水質基準は全国一律で地域差はない","D: 測定義務はない"], ans:0, exp:"水質汚濁防止法は特定施設から公共用水域への排出水やバッチプラント等の水質を規制する法律（A=正）。建設工事でもコンクリートプラントや濁水処理施設は対象となり得る。上乗せ基準（地域差）もある。" },
{ id:266, cat:"環境・法規", diff:"★★☆", q:"建設リサイクル法の届出に関する記述として正しいものはどれか。", choices:["A: 工事着手の7日前までに都道府県知事に届け出る","B: 工事着手の3日前までに市町村長に届け出る","C: 工事完了後に届け出る","D: 届出は不要"], ans:0, exp:"建設リサイクル法の対象工事は工事着手の7日前までに都道府県知事に届け出る（A=正）。届出先は都道府県知事（騒音振動の「市町村長」と混同注意）。" },
{ id:267, cat:"環境・法規", diff:"★★★", q:"特別管理産業廃棄物に該当するものはどれか。", choices:["A: 廃石綿（アスベスト廃棄物）","B: コンクリートがら","C: アスファルトがら","D: 建設発生土"], ans:0, exp:"廃石綿等は特別管理産業廃棄物に該当し、通常の産業廃棄物よりも厳格な管理・処理が必要（A=正）。他にPCB廃棄物、引火性廃油等がある。コンクリートがら等は通常の産業廃棄物。" },
{ id:268, cat:"環境・法規", diff:"★★☆", q:"建設発生土に関する記述として正しいものはどれか。", choices:["A: 建設発生土は廃棄物処理法上の産業廃棄物には該当しない","B: 建設発生土はすべて産業廃棄物である","C: 建設発生土の処分に規制はない","D: 建設発生土は建設リサイクル法の対象"], ans:0, exp:"建設発生土（土砂）は廃棄物処理法上の産業廃棄物には該当しない（A=正）。ただし「資源有効利用促進法」や「建設発生土の取扱いに関する通知」等により適正な処理が求められる。汚染土壌は別途規制。" },
{ id:269, cat:"環境・法規", diff:"★★★", q:"石綿障害予防規則に関する記述として正しいものはどれか。", choices:["A: 解体工事前にアスベスト含有の事前調査を行い結果を報告する義務がある","B: アスベスト調査は任意","C: 石綿作業主任者の選任は不要","D: 作業員の健康診断は不要"], ans:0, exp:"石綿障害予防規則により解体工事前に石綿含有の事前調査を実施し、結果を労働基準監督署と自治体に報告する義務がある（A=正）。石綿作業主任者の選任、特殊健康診断も必要。" },
{ id:270, cat:"環境・法規", diff:"★★☆", q:"環境影響評価法に関する記述として正しいものはどれか。", choices:["A: 大規模な開発事業について環境への影響を事前に調査・予測・評価する手続き","B: すべての建設工事に環境アセスメントが必要","C: 環境アセスメントは事業完了後に行う","D: 住民意見の聴取は不要"], ans:0, exp:"環境影響評価法は道路・ダム等の大規模事業について環境への影響を事前に調査・予測・評価し、住民や知事等の意見を聴取する手続きを定めた法律（A=正）。対象事業は規模要件がある。" },
{ id:271, cat:"環境・法規", diff:"★★★", q:"騒音規制法における特定建設作業の作業時間の制限として正しいものはどれか。", choices:["A: 第1号区域：7〜19時、1日10時間以内","B: 第1号区域：6〜22時、1日14時間以内","C: 第2号区域：7〜19時、1日10時間以内","D: すべての区域で時間制限はない"], ans:0, exp:"騒音規制法の第1号区域は7〜19時で1日10時間以内、日祝休日作業禁止、連続6日以内（A=正）。第2号区域は6〜22時で1日14時間以内、日祝可。" },
{ id:272, cat:"環境・法規", diff:"★★☆", q:"土壌汚染対策法に関する記述として正しいものはどれか。", choices:["A: 有害物質を使用した工場の廃止時等に土壌汚染調査が義務付けられる","B: 土壌汚染の調査は任意","C: 建設工事で汚染が発見されても対策は不要","D: 土壌汚染は自然に解消される"], ans:0, exp:"土壌汚染対策法により有害物質使用特定施設の廃止時や一定規模以上の土地の形質変更時に土壌汚染調査が義務付けられる（A=正）。汚染が判明した場合は指定区域として管理・対策が必要。" },
{ id:273, cat:"環境・法規", diff:"★★★", q:"低騒音型・低振動型建設機械に関する記述として正しいものはどれか。", choices:["A: 国土交通省が指定する騒音・振動の低い建設機械","B: 低騒音型建設機械の使用は義務ではない","C: すべての建設機械が低騒音型に指定されている","D: 低騒音型は通常の機械より性能が低い"], ans:0, exp:"低騒音型・低振動型建設機械は国土交通省が指定する基準を満たした機械で、特定建設作業の規制区域での使用が推奨される（A=正）。公共工事では使用が原則とされる場合も多い。" },
{ id:274, cat:"環境・法規", diff:"★★☆", q:"建設工事における地下水対策に関する記述として正しいものはどれか。", choices:["A: 掘削工事による地下水位の低下は周辺井戸の枯渇等の影響を与える可能性がある","B: 地下水への影響は考慮不要","C: 揚水した地下水は直接河川に放流してよい","D: 地下水対策は法的に規制されていない"], ans:0, exp:"掘削工事等による地下水位の低下は周辺の井戸の枯渇、地盤沈下等の影響を与える可能性があるため適切な対策が必要（A=正）。揚水の放流は水質確認が必要。ビル用水法等による規制あり。" },
{ id:275, cat:"環境・法規", diff:"★★★", q:"建設副産物のリデュース・リユース・リサイクル（3R）に関する記述として正しいものはどれか。", choices:["A: リデュース（発生抑制）を最優先し、次にリユース（再使用）、リサイクル（再生利用）の順で取り組む","B: リサイクルを最優先する","C: 3Rに優先順位はない","D: リユースとは焼却処分のこと"], ans:0, exp:"3Rの優先順位はリデュース（発生抑制）→リユース（再使用）→リサイクル（再生利用）の順（A=正）。まず廃棄物の発生量を減らし、次に再使用を検討し、最後に再資源化を行う。" },
{ id:276, cat:"環境・法規", diff:"★★☆", q:"建設汚泥の処理に関する記述として正しいものはどれか。", choices:["A: 建設汚泥は産業廃棄物として適正に処理する必要がある","B: 建設汚泥は建設発生土と同じ扱い","C: 建設汚泥は現場内に自由に埋め立てできる","D: 建設汚泥は一般廃棄物である"], ans:0, exp:"建設汚泥（場所打ち杭工事やシールド工事等で発生する泥状の掘削物）は産業廃棄物として適正に処理する必要がある（A=正）。建設発生土（普通の土砂）とは法的な扱いが異なる。" },
{ id:277, cat:"環境・法規", diff:"★★★", q:"PCB（ポリ塩化ビフェニル）廃棄物に関する記述として正しいものはどれか。", choices:["A: PCB廃棄物は特別管理産業廃棄物として厳格に保管・処理する義務がある","B: PCBは現在も製造されている","C: PCB廃棄物は一般の産業廃棄物と同じ処理でよい","D: PCBの処分期限は定められていない"], ans:0, exp:"PCB廃棄物は特別管理産業廃棄物に該当し、PCB特措法により処分期限内に適正処理する義務がある（A=正）。PCBは1972年に製造禁止。変圧器やコンデンサに含まれることがある。" },
{ id:278, cat:"環境・法規", diff:"★★☆", q:"建設工事からの排水に関する記述として正しいものはどれか。", choices:["A: コンクリート打設時の洗浄水等はpH調整して排水する","B: 工事排水は無処理で河川に放流してよい","C: 濁水処理は義務ではない","D: 排水基準は建設工事には適用されない"], ans:0, exp:"コンクリート関連の洗浄水はアルカリ性（高pH）であるため、pH調整（中和）等の処理を行ってから排水する（A=正）。濁水も沈殿処理等が必要。排水基準は建設工事にも適用される。" },
{ id:279, cat:"環境・法規", diff:"★★★", q:"フロン排出抑制法に関する記述として正しいものはどれか。", choices:["A: 解体工事においてフロン類使用機器の事前確認と適正回収が義務付けられている","B: フロン類は大気中に放出してよい","C: 建設工事にフロン規制は関係ない","D: フロン類の回収は任意"], ans:0, exp:"フロン排出抑制法により建物解体時にはフロン類使用機器（エアコン等）の事前確認を行い、フロン類を適正に回収してから機器を撤去する義務がある（A=正）。違反には罰則あり。" },
{ id:280, cat:"環境・法規", diff:"★★☆", q:"建設工事における生態系への配慮として正しいものはどれか。", choices:["A: 希少種の生息が確認された場合は、工事方法の変更や移植等の保全措置を検討する","B: 生態系は工事の制約にならない","C: 動植物の調査は不要","D: 生態系の配慮は法的義務ではない"], ans:0, exp:"建設工事で希少種の生息が確認された場合は、施工時期の変更・工法の変更・移植等の保全措置を検討する（A=正）。環境影響評価法、種の保存法等により法的にも保護される場合がある。" },
{ id:281, cat:"トンネル・港湾", diff:"★★☆", q:"NATM工法に関する記述として正しいものはどれか。", choices:["A: 地山を支保構造の一部として利用する工法","B: 地山の変形を完全に拘束する工法","C: 鋼製支保工は使用しない","D: 計測管理は補助的手段"], ans:0, exp:"NATMは地山自体を支保構造の一部として利用し、吹付けコンクリート・ロックボルト・鋼製支保工で地山の安定を図る工法（A=正）。計測管理は必須。" },
{ id:282, cat:"トンネル・港湾", diff:"★★★", q:"トンネルの掘削工法に関する記述として正しいものはどれか。", choices:["A: 全断面掘削は良好な地山に適用し、ベンチカットは普通〜軟弱地山に適用する","B: 全断面掘削は軟弱地山に適用する","C: 導坑先進は良好な地山にのみ使用する","D: すべての地山で同じ工法を使用する"], ans:0, exp:"全断面掘削は地山が良好な場合に全断面を一度に掘削する工法。ベンチカットは上半と下半に分けて掘削する工法で普通〜やや不良な地山に適用（A=正）。" },
{ id:283, cat:"トンネル・港湾", diff:"★★☆", q:"ロックボルトの機能として正しいものはどれか。", choices:["A: 地山にボルトを打設して地山の自立を補強する","B: コンクリートの強度を高める","C: 排水機能がある","D: 照明設備を固定する"], ans:0, exp:"ロックボルトは掘削後の地山にボルトを打設して周辺地山を補強し、アーチ効果等により地山の自立を促進する一次支保工（A=正）。長さは通常3〜6m。" },
{ id:284, cat:"トンネル・港湾", diff:"★★★", q:"シールドトンネルの泥水式と土圧式に関する記述として正しいものはどれか。", choices:["A: 泥水式は砂礫地盤に有利、土圧式は粘性土地盤に有利","B: 泥水式は粘性土に最適、土圧式は岩盤に最適","C: 両者に適用地盤の違いはない","D: 泥水式は水中でないと使用できない"], ans:0, exp:"泥水式シールドは泥水圧で切羽を安定させ砂礫や玉石地盤に有利。土圧式は掘削土砂で切羽を安定させ粘性土やシルト地盤に有利（A=正）。" },
{ id:285, cat:"トンネル・港湾", diff:"★★☆", q:"セグメントに関する記述として正しいものはどれか。", choices:["A: シールドトンネルの覆工を構成する部材","B: 山岳トンネルの覆工コンクリート","C: 仮設材の一種","D: 掘削機の刃先"], ans:0, exp:"セグメントはシールドトンネルの覆工（トンネル壁体）を構成する部材で、RC・鋼製・合成セグメント等がある（A=正）。リング状に組み立ててトンネルを構築する。" },
{ id:286, cat:"トンネル・港湾", diff:"★★★", q:"トンネルの計測管理（A計測）に含まれる測定項目として正しいものはどれか。", choices:["A: 天端沈下・内空変位・地表面沈下","B: コンクリートの圧縮強度のみ","C: 照度測定のみ","D: 騒音測定のみ"], ans:0, exp:"NATMにおけるA計測（必須計測）は天端沈下・内空変位・地表面沈下等の測定（A=正）。B計測（選択計測）には地中変位・支保工応力・ロックボルト軸力等がある。" },
{ id:287, cat:"トンネル・港湾", diff:"★★☆", q:"吹付けコンクリートの役割として正しいものはどれか。", choices:["A: 掘削直後の地山を被覆して風化・緩みを防止し、支保機能を発揮する","B: トンネルの照明機能","C: 排水機能のみ","D: 内装仕上げ材"], ans:0, exp:"吹付けコンクリートは掘削直後の地山表面に吹き付けて地山の風化・緩みを防止し、一次支保工として地山の安定に寄与する（A=正）。厚さは5〜20cm程度。" },
{ id:288, cat:"トンネル・港湾", diff:"★★★", q:"トンネルの補助工法に関する記述として正しいものはどれか。", choices:["A: フォアパイリングは切羽前方の地山を先受けして安定を確保する工法","B: 補助工法はNATMでは使用しない","C: 薬液注入は補助工法に含まれない","D: 補助工法は全区間で必ず実施する"], ans:0, exp:"フォアパイリング（先受け工）は切羽前方に鋼管等を打設して地山を先受けし、切羽や天端の安定を確保する補助工法（A=正）。薬液注入（止水・地盤改良）も補助工法の一つ。地山条件に応じて必要な区間に適用。" },
{ id:289, cat:"トンネル・港湾", diff:"★★☆", q:"開削トンネルに関する記述として正しいものはどれか。", choices:["A: 地表から掘削して構造物を築造し、埋め戻す工法","B: 山岳部でのみ使用する工法","C: シールド機を使用する工法","D: 深度100m以上でないと適用できない"], ans:0, exp:"開削トンネル（開削工法）は地表から掘削して箱型の構造物を築造し、埋め戻す工法（A=正）。都市部の浅い位置のトンネルに多用される。土留め工を用いて施工する。" },
{ id:290, cat:"トンネル・港湾", diff:"★★★", q:"海岸保全施設における離岸堤と突堤に関する記述として正しいものはどれか。", choices:["A: 離岸堤は汀線に平行、突堤は汀線に直角に設置","B: 離岸堤は汀線に直角、突堤は汀線に平行に設置","C: どちらも汀線に平行に設置","D: どちらも汀線に直角に設置"], ans:0, exp:"離岸堤は汀線に平行に設置して波のエネルギーを減衰させ、突堤は汀線にほぼ直角に設置して漂砂を捕捉し海岸侵食を防止する（A=正）。" },
{ id:291, cat:"トンネル・港湾", diff:"★★☆", q:"港湾のケーソン式岸壁に関する記述として正しいものはどれか。", choices:["A: 鉄筋コンクリート製の箱型構造物を海底に据え付ける工法","B: 木製の杭を打ち込む工法","C: 鋼矢板を打ち込む工法","D: 自然石を積み上げる工法"], ans:0, exp:"ケーソン式岸壁はRC製の大型箱型構造物（ケーソン）をドライドック等で製作し、現地に曳航・据付して中詰め・蓋コンクリートで完成させる工法（A=正）。重力式係船岸の代表的工法。" },
{ id:292, cat:"トンネル・港湾", diff:"★★★", q:"養浜工法に関する記述として正しいものはどれか。", choices:["A: 砂を補給して海岸線を維持・回復する自然に優しい工法","B: コンクリートで海岸を覆う工法","C: 海水を排水して海岸を広げる工法","D: 海底をコンクリートで固める工法"], ans:0, exp:"養浜は侵食された海岸に砂を人工的に補給して砂浜を回復・維持する工法（A=正）。自然環境への影響が小さく、生物の生息環境の保全にも有利だが、継続的な砂の供給が必要。" },
{ id:293, cat:"トンネル・港湾", diff:"★★☆", q:"港湾の防波堤の機能として正しいものはどれか。", choices:["A: 港内の静穏度を確保するために外洋からの波を遮断する","B: 船舶が接岸する施設","C: 荷役作業を行う施設","D: 航路の水深を確保する施設"], ans:0, exp:"防波堤は外洋からの波浪を遮断して港内の静穏度を確保し、船舶の安全な停泊と港内施設の保護を図る構造物（A=正）。接岸施設は岸壁・桟橋。水深確保は浚渫工事。" },
{ id:294, cat:"トンネル・港湾", diff:"★★★", q:"消波ブロック（テトラポッド等）の設置目的として正しいものはどれか。", choices:["A: 波のエネルギーを減衰させて堤体や海岸を保護する","B: 船舶を係留する","C: 海底の地盤改良を行う","D: 海水を淡水化する"], ans:0, exp:"消波ブロックは波浪のエネルギーを減衰させて堤体（防波堤・護岸等）や海岸を波の作用から保護する（A=正）。ブロック間の空隙に波が入り込むことでエネルギーを消散。" },
{ id:295, cat:"トンネル・港湾", diff:"★★☆", q:"矢板式岸壁に関する記述として正しいものはどれか。", choices:["A: 鋼矢板を控え工（タイロッド＋控え壁）で支持する構造","B: ケーソンを使用する構造","C: 捨石で構築する構造","D: 自重のみで安定する構造"], ans:0, exp:"矢板式岸壁は鋼矢板を海底に打設し、背面の土圧をタイロッドと控え壁（控え工）で支持する構造（A=正）。比較的水深の浅い場所に適用。施工が比較的容易。" },
{ id:296, cat:"トンネル・港湾", diff:"★★★", q:"人工リーフに関する記述として正しいものはどれか。", choices:["A: 海面下に没水構造物を設置して波を減衰させる施設","B: 海面上に突出する構造物","C: 離岸堤と同じ構造","D: 景観上の目的のみで設置する"], ans:0, exp:"人工リーフは海面下に幅広く没水構造物を設置して波を減衰させる施設（A=正）。海面上に出ないため景観への影響が少なく、水面利用（遊泳等）にも支障が少ない。" },
{ id:297, cat:"トンネル・港湾", diff:"★★☆", q:"TBM（Tunnel Boring Machine）工法に関する記述として正しいものはどれか。", choices:["A: 回転するカッターで岩盤を掘削するトンネル掘進機","B: 発破工法の一種","C: 軟弱地盤専用の工法","D: 手掘りの一種"], ans:0, exp:"TBM工法は回転するカッターヘッドで岩盤を機械的に掘削するトンネル掘進機による工法（A=正）。NATMの発破工法に代わる機械掘削工法。騒音・振動が少なく急速施工が可能。" },
{ id:298, cat:"トンネル・港湾", diff:"★★★", q:"沈埋トンネルに関する記述として正しいものはどれか。", choices:["A: 陸上で製作した函体を水底に沈設して連結するトンネル工法","B: 山岳部で使用する工法","C: シールド機で掘進する工法","D: 開削工法と同じ工法"], ans:0, exp:"沈埋トンネルは陸上のドック等で鋼製またはRC製の函体（エレメント）を製作し、水底に掘削した溝に曳航・沈設・連結するトンネル工法（A=正）。海峡横断等に使用。" },
{ id:299, cat:"トンネル・港湾", diff:"★★☆", q:"浚渫工事に関する記述として正しいものはどれか。", choices:["A: 航路や泊地の所定水深を確保するために海底等の土砂を掘削・除去する工事","B: 護岸を築造する工事","C: 埋立て工事と同じ","D: 堤防を築造する工事"], ans:0, exp:"浚渫（しゅんせつ）工事は航路・泊地・船だまり等の所定水深を確保するために海底の土砂を掘削・除去する工事（A=正）。グラブ浚渫船・ポンプ浚渫船等を使用。" },
{ id:300, cat:"トンネル・港湾", diff:"★★★", q:"海上工事における潜水作業に関する記述として正しいものはどれか。", choices:["A: 高気圧作業安全衛生規則に基づき、潜水士免許を持つ者が行う","B: 潜水作業に特別な資格は不要","C: 減圧症の危険はない","D: 潜水時間に制限はない"], ans:0, exp:"潜水作業は高気圧作業安全衛生規則に基づき潜水士免許を持つ者が行う（A=正）。減圧症（潜水病）防止のため、潜水深度に応じた浮上速度・減圧停止の管理が必要。潜水時間にも制限がある。" },
{ id:301, cat:"R6過去問", diff:"★★★", q:"土の粒度試験において、粒径0.075mm以下の細粒分の粒度を求めるために用いる試験方法はどれか。", choices:["A: ふるい分析","B: 沈降分析","C: 突固めによる締固め試験","D: CBR試験"], ans:1, exp:"粒径0.075mm以下の細粒分（シルト・粘土）の粒度はストークスの法則を利用した沈降分析で求める（B=正）。0.075mm以上はふるい分析。" },
{ id:302, cat:"R6過去問", diff:"★★☆", q:"コンクリートの配合設計における単位水量の上限として適切なものはどれか。", choices:["A: 165kg/m³以下","B: 175kg/m³以下","C: 185kg/m³以下","D: 195kg/m³以下"], ans:2, exp:"単位水量は185kg/m³以下が標準的な上限値（C=正）。単位水量が多いほど乾燥収縮・ブリーディングが増加し品質が低下する。" },
{ id:303, cat:"R6過去問", diff:"★★★", q:"場所打ち杭のオールケーシング工法に関する記述として誤っているものはどれか。", choices:["A: ケーシングチューブを揺動・圧入しながら掘削する","B: 掘削は主にハンマーグラブで行う","C: 地下水位の高い砂質地盤にも適用できる","D: 安定液（ベントナイト泥水）を常に使用する"], ans:3, exp:"オールケーシング工法はケーシングチューブで孔壁を保護するため安定液は必ずしも使用しない（D=誤り）。安定液を使用するのはリバースサーキュレーション工法やアースドリル工法。" },
{ id:304, cat:"R6過去問", diff:"★★☆", q:"鋼材の溶接欠陥として正しくないものはどれか。", choices:["A: ブローホール","B: アンダーカット","C: スランプロス","D: 溶込み不良"], ans:2, exp:"スランプロスはコンクリートの経時変化でありスランプが低下する現象で、溶接欠陥ではない（C=正しくない）。ブローホール・アンダーカット・溶込み不良は代表的な溶接欠陥。" },
{ id:305, cat:"R6過去問", diff:"★★★", q:"河川堤防の浸透に対する安全性照査で検討すべき事項として誤っているものはどれか。", choices:["A: 堤体のパイピングの発生","B: 基礎地盤のボイリングの発生","C: のり面のすべり破壊","D: 堤体のアルカリシリカ反応"], ans:3, exp:"アルカリシリカ反応はコンクリートの劣化現象であり、河川堤防（土構造物）の浸透安全性とは関係ない（D=誤り）。パイピング・ボイリング・すべり破壊が検討事項。" },
{ id:306, cat:"R6過去問", diff:"★★☆", q:"アスファルト舗装の転圧に関する記述として正しいものはどれか。", choices:["A: 初転圧はタイヤローラーで行う","B: 二次転圧はロードローラーで行う","C: 初転圧はヘアクラックが生じない範囲で高い温度で行う","D: 仕上げ転圧は最も高い温度で行う"], ans:2, exp:"初転圧はヘアクラック（微細なひび割れ）が生じない範囲でできるだけ高い温度（110〜140℃）で行う（C=正）。初転圧はロードローラー、二次転圧はタイヤローラーが正しい。" },
{ id:307, cat:"R6過去問", diff:"★★★", q:"NATM工法における計測管理のうちA計測（日常管理計測）に含まれないものはどれか。", choices:["A: 天端沈下","B: 内空変位","C: ロックボルトの軸力","D: 地表面沈下"], ans:2, exp:"ロックボルトの軸力はB計測（精密計測）に分類される（C=含まれない）。A計測は天端沈下・内空変位・地表面沈下の3項目で日常的に実施する。" },
{ id:308, cat:"R6過去問", diff:"★★☆", q:"品質管理に用いるヒストグラムの形状が二山型を示す場合の原因として最も適切なものはどれか。", choices:["A: 測定誤差が大きい","B: 異なる2つの母集団が混在している","C: 規格外のデータを除去した","D: サンプル数が少ない"], ans:1, exp:"ヒストグラムが二山型の場合、異なる条件（異なる機械・異なる材料等）の2つの母集団が混在している可能性が高い（B=正）。層別して原因を調査する。" },
{ id:309, cat:"R6過去問", diff:"★★★", q:"建設業法における特定建設業の許可が必要となる下請代金の合計額として正しいものはどれか。", choices:["A: 3,000万円以上","B: 4,000万円以上","C: 4,500万円以上","D: 5,000万円以上"], ans:2, exp:"特定建設業の許可は下請代金の合計額が4,500万円以上（建築一式は7,000万円以上）の場合に必要（C=正）。2022年改正で4,000万円から引き上げ。" },
